<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="40%"  stop-color="#888"/>
      <stop offset="60%"  stop-color="#888"/>
      <stop offset="100%" stop-color="#3A3A3A"/>
    </linearGradient>
    <linearGradient id="cab" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3830"/>
      <stop offset="100%" stop-color="#0E0C0A"/>
    </linearGradient>
    <radialGradient id="cone" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#5A5248"/>
      <stop offset="60%"  stop-color="#2C2820"/>
      <stop offset="100%" stop-color="#141210"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="195" rx="48" ry="5" fill="#00000030"/>
  <!-- Speaker cabinet on top of pole -->
  <rect x="52" y="12" width="96" height="80" rx="8" fill="url(#cab)"/>
  <rect x="52"  y="12"  width="10" height="10" rx="2" fill="#555" opacity="0.7"/>
  <rect x="138" y="12"  width="10" height="10" rx="2" fill="#555" opacity="0.7"/>
  <rect x="52"  y="82"  width="10" height="10" rx="2" fill="#555" opacity="0.7"/>
  <rect x="138" y="82"  width="10" height="10" rx="2" fill="#555" opacity="0.7"/>
  <!-- Grille -->
  <rect x="58" y="18" width="84" height="74" rx="4" fill="#1A1810"/>
  <!-- HF horn at top of cab -->
  <path d="M 64 24 L 136 24 L 130 46 L 70 46 Z" fill="#252018"/>
  <path d="M 72 28 L 128 28 L 124 44 L 76 44 Z" fill="#111" opacity="0.6"/>
  <!-- LF woofer -->
  <circle cx="100" cy="72" r="28" fill="url(#cone)"/>
  <circle cx="100" cy="72" r="20" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="72" r="12" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="72" r="8"  fill="#252018"/>
  <!-- Top pole mount socket -->
  <rect x="88" y="90"  width="24" height="14" rx="4" fill="#444"/>
  <rect x="90" y="92"  width="20" height="10" rx="3" fill="#666"/>
  <!-- Main pole -->
  <rect x="93" y="104" width="14" height="72" rx="7" fill="url(#pole)"/>
  <!-- Knuckle clamp in middle -->
  <rect x="86" y="136" width="28" height="14" rx="6" fill="#444"/>
  <rect x="88" y="138" width="24" height="10" rx="5" fill="#666"/>
  <!-- Pole base -->
  <rect x="86" y="176" width="28" height="14" rx="6" fill="#444"/>
  <rect x="88" y="178" width="24" height="10" rx="5" fill="#666"/>
  <!-- Tripod base (3 legs) -->
  <line x1="100" y1="188" x2="52"  y2="196" stroke="#555" stroke-width="6" stroke-linecap="round"/>
  <line x1="100" y1="188" x2="100" y2="198" stroke="#555" stroke-width="6" stroke-linecap="round"/>
  <line x1="100" y1="188" x2="148" y2="196" stroke="#555" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="52"  cy="197" rx="6" ry="3" fill="#222"/>
  <ellipse cx="100" cy="199" rx="6" ry="3" fill="#222"/>
  <ellipse cx="148" cy="197" rx="6" ry="3" fill="#222"/>
</svg>
