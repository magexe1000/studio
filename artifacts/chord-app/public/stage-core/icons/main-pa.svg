<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cab" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3830"/>
      <stop offset="100%" stop-color="#0C0A08"/>
    </linearGradient>
    <radialGradient id="woofer" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#5A5248"/>
      <stop offset="60%"  stop-color="#2C2820"/>
      <stop offset="100%" stop-color="#141210"/>
    </radialGradient>
    <radialGradient id="horn" cx="45%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#484440"/>
      <stop offset="100%" stop-color="#1A1816"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="60" ry="6" fill="#00000030"/>
  <!-- Cabinet — tall, narrow PA column -->
  <rect x="38" y="14" width="124" height="176" rx="8" fill="url(#cab)"/>
  <!-- Corner protectors -->
  <rect x="38"  y="14"  width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <rect x="150" y="14"  width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <rect x="38"  y="178" width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <rect x="150" y="178" width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <!-- Handle on top -->
  <path d="M 78 14 Q 78 6 100 6 Q 122 6 122 14" fill="none" stroke="#555" stroke-width="5" stroke-linecap="round"/>
  <!-- Grille -->
  <rect x="44" y="20" width="112" height="170" rx="4" fill="#1A1810"/>
  <!-- HF Horn (top section) — trapezoidal -->
  <path d="M 56 28 L 144 28 L 134 72 L 66 72 Z" fill="url(#horn)"/>
  <path d="M 70 36 L 130 36 L 124 64 L 76 64 Z" fill="#111" opacity="0.6"/>
  <!-- Horn radial lines -->
  <line x1="100" y1="28" x2="100" y2="72" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
  <line x1="76"  y1="28" x2="70"  y2="72" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
  <line x1="124" y1="28" x2="130" y2="72" stroke="#2A2A2A" stroke-width="1" opacity="0.4"/>
  <!-- Divider strip -->
  <rect x="44" y="72" width="112" height="6" rx="2" fill="#2A2820"/>
  <!-- Main woofer -->
  <circle cx="100" cy="136" r="56" fill="url(#woofer)"/>
  <circle cx="100" cy="136" r="44" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="136" r="32" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="136" r="20" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="136" r="16" fill="#252018"/>
  <circle cx="96"  cy="132" r="5"  fill="#888" opacity="0.2"/>
  <!-- Input panel bottom -->
  <rect x="72" y="182" width="56" height="8" rx="3" fill="#222"/>
  <circle cx="86"  cy="186" r="3.5" fill="#555"/>
  <circle cx="100" cy="186" r="3.5" fill="#555"/>
  <circle cx="114" cy="186" r="3.5" fill="#555"/>
</svg>
