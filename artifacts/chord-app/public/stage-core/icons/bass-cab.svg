<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cab" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#2A2E28"/>
      <stop offset="50%"  stop-color="#141610"/>
      <stop offset="100%" stop-color="#080A06"/>
    </linearGradient>
    <radialGradient id="cone" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#485040"/>
      <stop offset="60%"  stop-color="#242C20"/>
      <stop offset="100%" stop-color="#101410"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="94" ry="6" fill="#00000030"/>
  <!-- Cabinet (wider than tall — typical bass cab) -->
  <rect x="4" y="40" width="192" height="150" rx="8" fill="url(#cab)"/>
  <!-- Handle center top -->
  <path d="M 80 40 Q 80 30 100 30 Q 120 30 120 40" fill="none" stroke="#555" stroke-width="6" stroke-linecap="round"/>
  <!-- Corner protectors -->
  <rect x="4"   y="40"  width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <rect x="182" y="40"  width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <rect x="4"   y="176" width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <rect x="182" y="176" width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <!-- Grille -->
  <rect x="10" y="46" width="180" height="138" rx="4" fill="#181C14"/>
  <!-- Two large side-by-side speakers (2×15 style) -->
  <!-- Left speaker -->
  <circle cx="58"  cy="115" r="44" fill="url(#cone)"/>
  <circle cx="58"  cy="115" r="34" fill="none" stroke="#1C2018" stroke-width="2.5" opacity="0.5"/>
  <circle cx="58"  cy="115" r="24" fill="none" stroke="#1C2018" stroke-width="2.5" opacity="0.5"/>
  <circle cx="58"  cy="115" r="14" fill="none" stroke="#1C2018" stroke-width="2.5" opacity="0.5"/>
  <circle cx="58"  cy="115" r="18" fill="#202818"/>
  <circle cx="54"  cy="111" r="6"  fill="#808080" opacity="0.15"/>
  <!-- Right speaker -->
  <circle cx="142" cy="115" r="44" fill="url(#cone)"/>
  <circle cx="142" cy="115" r="34" fill="none" stroke="#1C2018" stroke-width="2.5" opacity="0.5"/>
  <circle cx="142" cy="115" r="24" fill="none" stroke="#1C2018" stroke-width="2.5" opacity="0.5"/>
  <circle cx="142" cy="115" r="14" fill="none" stroke="#1C2018" stroke-width="2.5" opacity="0.5"/>
  <circle cx="142" cy="115" r="18" fill="#202818"/>
  <circle cx="138" cy="111" r="6"  fill="#808080" opacity="0.15"/>
  <!-- Input jack panel bottom center -->
  <rect x="86" y="178" width="28" height="10" rx="3" fill="#222"/>
  <circle cx="100" cy="183" r="4" fill="#555"/>
</svg>
