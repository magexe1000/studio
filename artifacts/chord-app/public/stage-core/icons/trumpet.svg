<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E8CC60"/>
      <stop offset="40%"  stop-color="#C8A020"/>
      <stop offset="100%" stop-color="#8A6408"/>
    </linearGradient>
    <linearGradient id="bell" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#D4B840"/>
      <stop offset="50%"  stop-color="#F0D870"/>
      <stop offset="100%" stop-color="#D4B840"/>
    </linearGradient>
    <radialGradient id="valve" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#E0C858"/>
      <stop offset="100%" stop-color="#9A7010"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="192" rx="88" ry="8" fill="#00000028"/>
  <!-- Main tube body (horizontal) -->
  <!-- Mouthpiece -->
  <path d="M 18 104 L 44 104 L 44 108 Q 42 112 38 112 L 18 112 Q 10 112 10 108 Q 10 104 18 104 Z" fill="url(#brass)"/>
  <ellipse cx="14" cy="108" rx="6" ry="4.5" fill="#C8A020"/>
  <!-- Tube from mouthpiece -->
  <rect x="44" y="103" width="28" height="10" rx="5" fill="url(#brass)"/>
  <!-- Lead pipe return loop -->
  <path d="M 72 103 Q 82 88 96 88 Q 110 88 110 100 L 110 118 Q 110 130 96 130 Q 82 130 72 118" fill="none" stroke="url(#brass)" stroke-width="10" stroke-linecap="round"/>
  <path d="M 72 103 Q 82 88 96 88 Q 110 88 110 100 L 110 118 Q 110 130 96 130 Q 82 130 72 118" fill="none" stroke="#E8D060" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <!-- Valve block -->
  <rect x="106" y="90" width="46" height="36" rx="4" fill="#B8900C"/>
  <rect x="108" y="92" width="42" height="32" rx="3" fill="#D4AA20"/>
  <!-- Three valves -->
  <rect x="112" y="86" width="10" height="44" rx="5" fill="url(#valve)"/>
  <rect x="112" y="84" width="10" height="10" rx="3" fill="#EEE"/>
  <rect x="112" y="118" width="10" height="10" rx="3" fill="#888"/>
  <rect x="126" y="86" width="10" height="44" rx="5" fill="url(#valve)"/>
  <rect x="126" y="84" width="10" height="10" rx="3" fill="#EEE"/>
  <rect x="126" y="118" width="10" height="10" rx="3" fill="#888"/>
  <rect x="140" y="86" width="10" height="44" rx="5" fill="url(#valve)"/>
  <rect x="140" y="84" width="10" height="10" rx="3" fill="#EEE"/>
  <rect x="140" y="118" width="10" height="10" rx="3" fill="#888"/>
  <!-- Tube from valves to bell -->
  <rect x="148" y="103" width="18" height="10" rx="5" fill="url(#brass)"/>
  <path d="M 166 103 Q 176 95 182 88 Q 190 78 192 68" fill="none" stroke="url(#brass)" stroke-width="10" stroke-linecap="round"/>
  <path d="M 166 103 Q 176 95 182 88 Q 190 78 192 68" fill="none" stroke="#E8D060" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <!-- Bell -->
  <path d="M 185 52 Q 192 48 196 54 Q 200 64 194 76 Q 188 88 180 92 L 170 90 Q 178 80 184 70 Q 188 60 185 52 Z" fill="url(#bell)"/>
  <!-- Water key -->
  <circle cx="76" cy="128" r="4" fill="#C8A020"/>
  <circle cx="76" cy="128" r="2" fill="#E8C830"/>
  <!-- Finger ring -->
  <ellipse cx="100" cy="116" rx="8" ry="5" fill="none" stroke="#C8A020" stroke-width="3"/>
  <!-- Shine on bell -->
  <path d="M 172 62 Q 176 56 182 54" stroke="#FFE890" stroke-width="3" fill="none" opacity="0.45" stroke-linecap="round"/>
</svg>
