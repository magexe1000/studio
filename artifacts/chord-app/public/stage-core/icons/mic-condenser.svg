<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4A4A4A"/>
      <stop offset="40%"  stop-color="#B8B8B8"/>
      <stop offset="60%"  stop-color="#B8B8B8"/>
      <stop offset="100%" stop-color="#4A4A4A"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#888040"/>
      <stop offset="35%"  stop-color="#D4C060"/>
      <stop offset="65%"  stop-color="#D4C060"/>
      <stop offset="100%" stop-color="#888040"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#505050"/>
      <stop offset="50%"  stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#505050"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="18" ry="5" fill="#00000028"/>
  <!-- Connector base -->
  <rect x="88" y="172" width="24" height="22" rx="6" fill="#303030"/>
  <!-- Body tube -->
  <rect x="76" y="68" width="48" height="108" rx="10" fill="url(#body)"/>
  <!-- Logo / label band -->
  <rect x="76" y="118" width="48" height="20" rx="2" fill="#1A1A1A" opacity="0.5"/>
  <text x="100" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#D0C060" opacity="0.85">AKG</text>
  <!-- Ring separating cap from body -->
  <rect x="74" y="64" width="52" height="10" rx="4" fill="url(#ring)"/>
  <!-- Capsule gold body -->
  <rect x="74" y="14" width="52" height="56" rx="10" fill="url(#cap)"/>
  <!-- Capsule mesh pattern -->
  <path d="M 76 28 Q 100 26 124 28" stroke="#806030" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M 76 36 Q 100 34 124 36" stroke="#806030" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M 76 44 Q 100 42 124 44" stroke="#806030" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M 76 52 Q 100 50 124 52" stroke="#806030" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M 76 60 Q 100 58 124 60" stroke="#806030" stroke-width="1.2" fill="none" opacity="0.55"/>
  <line x1="100" y1="14" x2="100" y2="64" stroke="#806030" stroke-width="1" opacity="0.4"/>
  <line x1="88"  y1="15" x2="88"  y2="64" stroke="#806030" stroke-width="1" opacity="0.3"/>
  <line x1="112" y1="15" x2="112" y2="64" stroke="#806030" stroke-width="1" opacity="0.3"/>
  <!-- Capsule sheen -->
  <path d="M 80 22 Q 84 16 90 14" stroke="#F0E090" stroke-width="2.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- Side highlight on body -->
  <line x1="80" y1="72" x2="80" y2="172" stroke="#E0E0E0" stroke-width="2" opacity="0.18" stroke-linecap="round"/>
</svg>
