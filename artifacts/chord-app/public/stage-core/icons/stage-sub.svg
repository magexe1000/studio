<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cab" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#2C302A"/>
      <stop offset="50%"  stop-color="#141814"/>
      <stop offset="100%" stop-color="#080A08"/>
    </linearGradient>
    <radialGradient id="cone" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#484C40"/>
      <stop offset="60%"  stop-color="#222820"/>
      <stop offset="100%" stop-color="#0C1008"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="94" ry="6" fill="#00000030"/>
  <!-- Cabinet — very low and wide (typical sub) -->
  <rect x="6" y="66" width="188" height="124" rx="8" fill="url(#cab)"/>
  <!-- Corner protectors -->
  <rect x="6"   y="66"  width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <rect x="180" y="66"  width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <rect x="6"   y="176" width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <rect x="180" y="176" width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <!-- Handle center top -->
  <path d="M 78 66 Q 78 55 100 55 Q 122 55 122 66" fill="none" stroke="#555" stroke-width="7" stroke-linecap="round"/>
  <!-- Grille -->
  <rect x="12" y="72" width="176" height="118" rx="4" fill="#151A12"/>
  <!-- Single very large subwoofer -->
  <circle cx="100" cy="131" r="82" fill="url(#cone)"/>
  <circle cx="100" cy="131" r="68" fill="none" stroke="#1A2018" stroke-width="3" opacity="0.5"/>
  <circle cx="100" cy="131" r="54" fill="none" stroke="#1A2018" stroke-width="3" opacity="0.5"/>
  <circle cx="100" cy="131" r="40" fill="none" stroke="#1A2018" stroke-width="3" opacity="0.5"/>
  <circle cx="100" cy="131" r="26" fill="none" stroke="#1A2018" stroke-width="2.5" opacity="0.5"/>
  <circle cx="100" cy="131" r="22" fill="#1A2018"/>
  <circle cx="95"  cy="126" r="7"  fill="#888" opacity="0.15"/>
  <!-- Port slot (bass reflex) -->
  <rect x="40" y="176" width="120" height="12" rx="4" fill="#0A0C08"/>
  <rect x="42" y="178" width="116" height="8"  rx="3" fill="#080A06"/>
  <!-- Input panel -->
  <rect x="78" y="182" width="44" height="8" rx="3" fill="#222"/>
  <circle cx="90"  cy="186" r="3.5" fill="#555"/>
  <circle cx="110" cy="186" r="3.5" fill="#555"/>
</svg>
