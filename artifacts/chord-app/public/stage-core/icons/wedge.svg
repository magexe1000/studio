<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A3830"/>
      <stop offset="50%"  stop-color="#1E1C16"/>
      <stop offset="100%" stop-color="#0C0A08"/>
    </linearGradient>
    <radialGradient id="cone" cx="42%" cy="40%" r="56%">
      <stop offset="0%"   stop-color="#5A5448"/>
      <stop offset="60%"  stop-color="#302C24"/>
      <stop offset="100%" stop-color="#181410"/>
    </radialGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4A4840"/>
      <stop offset="100%" stop-color="#2A2820"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="96" ry="6" fill="#00000030"/>
  <!-- Wedge body (parallelogram/ramp shape) -->
  <polygon points="8,185 192,185 192,82 8,140" fill="url(#cab)"/>
  <!-- Top angled face -->
  <polygon points="8,140 192,82 192,64 8,122" fill="url(#top)"/>
  <!-- Left side face -->
  <polygon points="8,122 8,185 8,140" fill="#2A2820"/>
  <!-- Corner protectors -->
  <polygon points="8,122 22,122 22,128 8,130" fill="#555" opacity="0.7"/>
  <polygon points="192,64 178,68 178,74 192,70" fill="#555" opacity="0.7"/>
  <!-- Grille area on front face -->
  <polygon points="16,141 184,84 184,179 16,179" fill="#1A1810"/>
  <!-- Speaker (angled with the face) -->
  <ellipse cx="100" cy="133" rx="60" ry="52" fill="url(#cone)" transform="rotate(-18,100,133)"/>
  <ellipse cx="100" cy="133" rx="45" ry="38" fill="none" stroke="#201C14" stroke-width="2" opacity="0.5" transform="rotate(-18,100,133)"/>
  <ellipse cx="100" cy="133" rx="30" ry="25" fill="none" stroke="#201C14" stroke-width="2" opacity="0.5" transform="rotate(-18,100,133)"/>
  <ellipse cx="100" cy="133" rx="15" ry="13" fill="#252018" transform="rotate(-18,100,133)"/>
  <!-- Tweeter (high frequency driver) at top of grille -->
  <ellipse cx="100" cy="96"  rx="16" ry="12" fill="#252018" transform="rotate(-18,100,96)"/>
  <ellipse cx="100" cy="96"  rx="10" ry="8"  fill="#181410" transform="rotate(-18,100,96)"/>
  <!-- Handle -->
  <rect x="78" y="62" width="44" height="8" rx="4" fill="#444"/>
  <rect x="86" y="62" width="28" height="8" rx="4" fill="#555"/>
  <!-- Bottom rubber feet -->
  <rect x="20"  y="183" width="20" height="6" rx="3" fill="#111"/>
  <rect x="160" y="183" width="20" height="6" rx="3" fill="#111"/>
</svg>
