<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#303030"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#484848"/>
      <stop offset="100%" stop-color="#282828"/>
    </linearGradient>
    <radialGradient id="jack" cx="40%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#888"/>
      <stop offset="100%" stop-color="#333"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="191" rx="88" ry="9" fill="#00000028"/>
  <!-- 1U rack unit body -->
  <rect x="8" y="70" width="184" height="110" rx="6" fill="url(#body)"/>
  <!-- Rack ears -->
  <rect x="8"   y="70" width="22" height="110" rx="4" fill="#222"/>
  <rect x="170" y="70" width="22" height="110" rx="4" fill="#222"/>
  <circle cx="19" cy="86"  r="5" fill="#333"/><circle cx="19" cy="86"  r="3" fill="#444"/>
  <circle cx="19" cy="164" r="5" fill="#333"/><circle cx="19" cy="164" r="3" fill="#444"/>
  <circle cx="181" cy="86"  r="5" fill="#333"/><circle cx="181" cy="86"  r="3" fill="#444"/>
  <circle cx="181" cy="164" r="5" fill="#333"/><circle cx="181" cy="164" r="3" fill="#444"/>
  <!-- Front panel -->
  <rect x="30" y="76" width="140" height="98" rx="4" fill="url(#panel)"/>
  <!-- Title -->
  <text x="100" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#AAAAAA" opacity="0.8">HEADPHONE AMP</text>
  <!-- Four headphone output jacks (1/4") -->
  <circle cx="50"  cy="116" r="10" fill="#111"/>
  <circle cx="50"  cy="116" r="7"  fill="url(#jack)"/>
  <circle cx="50"  cy="116" r="3"  fill="#111"/>
  <circle cx="82"  cy="116" r="10" fill="#111"/>
  <circle cx="82"  cy="116" r="7"  fill="url(#jack)"/>
  <circle cx="82"  cy="116" r="3"  fill="#111"/>
  <circle cx="114" cy="116" r="10" fill="#111"/>
  <circle cx="114" cy="116" r="7"  fill="url(#jack)"/>
  <circle cx="114" cy="116" r="3"  fill="#111"/>
  <circle cx="146" cy="116" r="10" fill="#111"/>
  <circle cx="146" cy="116" r="7"  fill="url(#jack)"/>
  <circle cx="146" cy="116" r="3"  fill="#111"/>
  <!-- Channel labels -->
  <text x="50"  y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">CH1</text>
  <text x="82"  y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">CH2</text>
  <text x="114" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">CH3</text>
  <text x="146" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">CH4</text>
  <!-- Volume knobs for each channel -->
  <circle cx="50"  cy="156" r="9" fill="#222"/><circle cx="50"  cy="156" r="6" fill="#444"/>
  <line x1="50"  y1="148" x2="50"  y2="152" stroke="#888" stroke-width="1.5"/>
  <circle cx="82"  cy="156" r="9" fill="#222"/><circle cx="82"  cy="156" r="6" fill="#444"/>
  <line x1="82"  y1="148" x2="82"  y2="152" stroke="#888" stroke-width="1.5"/>
  <circle cx="114" cy="156" r="9" fill="#222"/><circle cx="114" cy="156" r="6" fill="#444"/>
  <line x1="114" y1="148" x2="114" y2="152" stroke="#888" stroke-width="1.5"/>
  <circle cx="146" cy="156" r="9" fill="#222"/><circle cx="146" cy="156" r="6" fill="#444"/>
  <line x1="146" y1="148" x2="146" y2="152" stroke="#888" stroke-width="1.5"/>
  <!-- Power LED -->
  <circle cx="160" cy="95" r="5" fill="#00CC44"/>
  <circle cx="160" cy="95" r="3" fill="#44FF88"/>
</svg>
