<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="lid" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#4A4A4A"/>
      <stop offset="50%"  stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0A1828"/>
      <stop offset="100%" stop-color="#1A3050"/>
    </linearGradient>
    <linearGradient id="base" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="192" rx="90" ry="8" fill="#00000028"/>
  <!-- Lid (open ~120°) -->
  <rect x="22" y="28" width="156" height="104" rx="8" fill="url(#lid)"/>
  <!-- Screen bezel -->
  <rect x="28" y="34" width="144" height="92" rx="6" fill="#111"/>
  <!-- Screen area -->
  <rect x="32" y="38" width="136" height="84" rx="5" fill="url(#screen)"/>
  <!-- Screen content (DAW / audio software) -->
  <!-- Waveform display -->
  <rect x="34" y="40" width="132" height="22" rx="2" fill="#0A0A1A"/>
  <path d="M 38 51 L 46 44 L 50 54 L 54 44 L 58 54 L 62 48 L 66 54 L 70 44 L 76 54 L 82 46 L 86 52 L 90 44 L 96 54 L 100 48 L 106 54 L 112 44 L 116 52 L 120 46 L 124 54 L 128 44 L 132 54 L 136 48 L 140 54 L 144 48 L 148 54 L 152 50 L 162 51" stroke="#44AAFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Track rows -->
  <rect x="34" y="64" width="132" height="8"  rx="1" fill="#0E1E0E"/>
  <rect x="36" y="65" width="80"  height="6"  rx="1" fill="#22AA44" opacity="0.7"/>
  <rect x="34" y="74" width="132" height="8"  rx="1" fill="#1E0E0E"/>
  <rect x="36" y="75" width="60"  height="6"  rx="1" fill="#AA2244" opacity="0.7"/>
  <rect x="34" y="84" width="132" height="8"  rx="1" fill="#1E1A0E"/>
  <rect x="36" y="85" width="90"  height="6"  rx="1" fill="#AAAA22" opacity="0.7"/>
  <rect x="34" y="94" width="132" height="8"  rx="1" fill="#0E1A1E"/>
  <rect x="36" y="95" width="70"  height="6"  rx="1" fill="#2288AA" opacity="0.7"/>
  <!-- Transport bar -->
  <rect x="34" y="104" width="132" height="16" rx="2" fill="#0A0A0A"/>
  <circle cx="72"  cy="112" r="6" fill="#222"/>
  <circle cx="88"  cy="112" r="6" fill="#333"/>
  <circle cx="100" cy="112" r="8" fill="#224422"/>
  <circle cx="100" cy="112" r="5" fill="#33AA33"/>
  <circle cx="112" cy="112" r="6" fill="#333"/>
  <circle cx="128" cy="112" r="6" fill="#222"/>
  <!-- Camera dot in lid bezel -->
  <circle cx="100" cy="37" r="3" fill="#222"/>
  <circle cx="100" cy="37" r="1.5" fill="#1A1A2A"/>
  <!-- Base/keyboard -->
  <rect x="14" y="134" width="172" height="52" rx="8" fill="url(#base)"/>
  <!-- Keyboard rows -->
  <rect x="22" y="140" width="156" height="6" rx="2" fill="#111"/>
  <rect x="22" y="148" width="156" height="6" rx="2" fill="#111"/>
  <rect x="22" y="156" width="156" height="6" rx="2" fill="#111"/>
  <!-- Individual key details on top row -->
  <line x1="30"  y1="140" x2="30"  y2="146" stroke="#222" stroke-width="2"/>
  <line x1="38"  y1="140" x2="38"  y2="146" stroke="#222" stroke-width="2"/>
  <line x1="46"  y1="140" x2="46"  y2="146" stroke="#222" stroke-width="2"/>
  <line x1="54"  y1="140" x2="54"  y2="146" stroke="#222" stroke-width="2"/>
  <line x1="62"  y1="140" x2="62"  y2="146" stroke="#222" stroke-width="2"/>
  <line x1="70"  y1="140" x2="70"  y2="146" stroke="#222" stroke-width="2"/>
  <!-- Trackpad -->
  <rect x="72" y="166" width="56" height="14" rx="4" fill="#222"/>
  <rect x="74" y="168" width="52" height="10" rx="3" fill="#2A2A2A"/>
