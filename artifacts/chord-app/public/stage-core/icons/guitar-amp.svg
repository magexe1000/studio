<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cab" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3530"/>
      <stop offset="50%"  stop-color="#1E1A16"/>
      <stop offset="100%" stop-color="#0E0C0A"/>
    </linearGradient>
    <radialGradient id="cone" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#6A6050"/>
      <stop offset="60%"  stop-color="#3A3028"/>
      <stop offset="100%" stop-color="#1A1510"/>
    </radialGradient>
    <radialGradient id="dustcap" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#888070"/>
      <stop offset="100%" stop-color="#4A4038"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5A4A38"/>
      <stop offset="100%" stop-color="#3A2E22"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="88" ry="6" fill="#00000030"/>
  <!-- Cabinet body -->
  <rect x="10" y="28" width="180" height="162" rx="8" fill="url(#cab)"/>
  <!-- Corner protectors -->
  <rect x="10"  y="28"  width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <rect x="178" y="28"  width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <rect x="10"  y="178" width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <rect x="178" y="178" width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <!-- Control panel strip (top) -->
  <rect x="10" y="28" width="180" height="50" rx="8" fill="url(#panel)"/>
  <rect x="10" y="64" width="180" height="14" rx="0" fill="#2A2018"/>
  <!-- Brand name -->
  <text x="100" y="50" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#E0C880" opacity="0.85">FENDER</text>
  <!-- Knobs on panel -->
  <circle cx="36"  cy="54" r="8" fill="#222"/><circle cx="36"  cy="54" r="5.5" fill="#444"/>
  <line x1="36" y1="48" x2="36" y2="52" stroke="#888" stroke-width="1.5"/>
  <circle cx="60"  cy="54" r="8" fill="#222"/><circle cx="60"  cy="54" r="5.5" fill="#444"/>
  <line x1="60" y1="48" x2="60" y2="52" stroke="#888" stroke-width="1.5"/>
  <circle cx="84"  cy="54" r="8" fill="#222"/><circle cx="84"  cy="54" r="5.5" fill="#444"/>
  <line x1="84" y1="48" x2="84" y2="52" stroke="#888" stroke-width="1.5"/>
  <circle cx="108" cy="54" r="8" fill="#222"/><circle cx="108" cy="54" r="5.5" fill="#444"/>
  <line x1="108" y1="48" x2="108" y2="52" stroke="#888" stroke-width="1.5"/>
  <circle cx="132" cy="54" r="8" fill="#222"/><circle cx="132" cy="54" r="5.5" fill="#444"/>
  <line x1="132" y1="48" x2="132" y2="52" stroke="#888" stroke-width="1.5"/>
  <circle cx="156" cy="54" r="8" fill="#222"/><circle cx="156" cy="54" r="5.5" fill="#444"/>
  <line x1="156" y1="48" x2="156" y2="52" stroke="#888" stroke-width="1.5"/>
  <!-- Grille cloth frame -->
  <rect x="16" y="80" width="168" height="106" rx="4" fill="#2A2018"/>
  <!-- Grille cloth texture -->
  <rect x="18" y="82" width="164" height="102" rx="3" fill="#1E1810"/>
  <!-- Speaker surround ring -->
  <circle cx="100" cy="133" r="70" fill="none" stroke="#3A3028" stroke-width="4"/>
  <!-- Speaker cone -->
  <circle cx="100" cy="133" r="66" fill="url(#cone)"/>
  <!-- Cone rings -->
  <circle cx="100" cy="133" r="55" fill="none" stroke="#2E2820" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="133" r="44" fill="none" stroke="#2E2820" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="133" r="33" fill="none" stroke="#2E2820" stroke-width="2" opacity="0.6"/>
  <!-- Dust cap -->
  <circle cx="100" cy="133" r="18" fill="url(#dustcap)"/>
  <circle cx="95"  cy="128" r="5"  fill="#AAA" opacity="0.2"/>
</svg>
