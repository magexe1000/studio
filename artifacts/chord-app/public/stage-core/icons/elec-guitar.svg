<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#C03030"/>
      <stop offset="50%"  stop-color="#801010"/>
      <stop offset="100%" stop-color="#4A0808"/>
    </linearGradient>
    <linearGradient id="neck" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5A3010"/>
      <stop offset="45%"  stop-color="#C08040"/>
      <stop offset="100%" stop-color="#5A3010"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4A2808"/>
      <stop offset="50%"  stop-color="#8A5020"/>
      <stop offset="100%" stop-color="#4A2808"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%"   stop-color="#FF8888" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="195" rx="42" ry="5" fill="#00000028"/>
  <!-- Headstock -->
  <rect x="88" y="8" width="24" height="42" rx="5" fill="url(#head)"/>
  <!-- Tuning pegs — 3 each side -->
  <rect x="68" y="12" width="20" height="7" rx="3.5" fill="#888"/>
  <circle cx="68" cy="15" r="5" fill="#AAA"/>
  <rect x="68" y="22" width="20" height="7" rx="3.5" fill="#888"/>
  <circle cx="68" cy="25" r="5" fill="#AAA"/>
  <rect x="68" y="32" width="20" height="7" rx="3.5" fill="#888"/>
  <circle cx="68" cy="35" r="5" fill="#AAA"/>
  <rect x="112" y="12" width="20" height="7" rx="3.5" fill="#888"/>
  <circle cx="132" cy="15" r="5" fill="#AAA"/>
  <rect x="112" y="22" width="20" height="7" rx="3.5" fill="#888"/>
  <circle cx="132" cy="25" r="5" fill="#AAA"/>
  <rect x="112" y="32" width="20" height="7" rx="3.5" fill="#888"/>
  <circle cx="132" cy="35" r="5" fill="#AAA"/>
  <!-- Nut -->
  <rect x="88" y="49" width="24" height="5" rx="1" fill="#DDD"/>
  <!-- Neck -->
  <rect x="89" y="54" width="22" height="84" rx="4" fill="url(#neck)"/>
  <!-- Fret lines -->
  <line x1="89" y1="68"  x2="111" y2="68"  stroke="#888" stroke-width="1.5" opacity="0.7"/>
  <line x1="89" y1="78"  x2="111" y2="78"  stroke="#888" stroke-width="1.5" opacity="0.7"/>
  <line x1="89" y1="88"  x2="111" y2="88"  stroke="#888" stroke-width="1.5" opacity="0.7"/>
  <line x1="89" y1="98"  x2="111" y2="98"  stroke="#888" stroke-width="1.5" opacity="0.7"/>
  <line x1="89" y1="108" x2="111" y2="108" stroke="#888" stroke-width="1.5" opacity="0.7"/>
  <line x1="89" y1="118" x2="111" y2="118" stroke="#888" stroke-width="1.5" opacity="0.7"/>
  <line x1="89" y1="128" x2="111" y2="128" stroke="#888" stroke-width="1.5" opacity="0.7"/>
  <!-- Position dots -->
  <circle cx="100" cy="83"  r="3" fill="#EED090" opacity="0.8"/>
  <circle cx="100" cy="103" r="3" fill="#EED090" opacity="0.8"/>
  <!-- Body — Stratocaster double-cutaway -->
  <path d="M 89 134
           Q 72 132 58 138 Q 36 148 38 168 Q 40 186 68 188 Q 84 190 90 180 L 110 180
           Q 116 190 132 188 Q 160 186 162 168 Q 164 148 142 138 Q 128 132 111 134
           Q 106 118 100 118 Q 94 118 89 134 Z" fill="url(#body)"/>
  <path d="M 89 134
           Q 72 132 58 138 Q 36 148 38 168 Q 40 186 68 188 Q 84 190 90 180 L 110 180
           Q 116 190 132 188 Q 160 186 162 168 Q 164 148 142 138 Q 128 132 111 134
           Q 106 118 100 118 Q 94 118 89 134 Z" fill="url(#shine)"/>
  <!-- Pickguard -->
  <path d="M 85 134 Q 74 135 68 142 Q 60 150 62 162 L 76 162 L 82 152 L 88 152 L 88 134 Z" fill="#F0F0E0" opacity="0.7"/>
  <!-- Pickups -->
  <rect x="82" y="148" width="36" height="10" rx="2" fill="#111"/>
  <rect x="82" y="162" width="36" height="10" rx="2" fill="#111"/>
  <!-- Output jack -->
  <circle cx="152" cy="164" r="5" fill="#888"/>
  <!-- Strings -->
  <line x1="94" y1="50" x2="94" y2="150" stroke="#C8C8C8" stroke-width="1"   opacity="0.6"/>
  <line x1="97" y1="50" x2="97" y2="150" stroke="#C8C8C8" stroke-width="1"   opacity="0.6"/>
  <line x1="100" y1="50" x2="100" y2="150" stroke="#C8C8C8" stroke-width="1.2" opacity="0.7"/>
  <line x1="103" y1="50" x2="103" y2="150" stroke="#C8C8C8" stroke-width="1.2" opacity="0.7"/>
  <line x1="106" y1="50" x2="106" y2="150" stroke="#C8C8C8" stroke-width="1.4" opacity="0.7"/>
  <line x1="109" y1="50" x2="109" y2="150" stroke="#C8C8C8" stroke-width="1.4" opacity="0.7"/>
  <!-- Body shine -->
  <path d="M 58 148 Q 56 158 60 166" stroke="#FF9999" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>
</svg>
