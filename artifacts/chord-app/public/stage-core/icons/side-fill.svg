<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cab" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3830"/>
      <stop offset="100%" stop-color="#0E0C0A"/>
    </linearGradient>
    <radialGradient id="woofer" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#565048"/>
      <stop offset="60%"  stop-color="#2C2820"/>
      <stop offset="100%" stop-color="#141210"/>
    </radialGradient>
    <radialGradient id="horn" cx="45%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#484440"/>
      <stop offset="100%" stop-color="#1A1816"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="80" ry="6" fill="#00000030"/>
  <!-- Large side-fill cabinet (like a d&b or L-Acoustics side fill) -->
  <rect x="22" y="22" width="156" height="168" rx="8" fill="url(#cab)"/>
  <rect x="22"  y="22"  width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <rect x="166" y="22"  width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <rect x="22"  y="178" width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <rect x="166" y="178" width="12" height="12" rx="2" fill="#555" opacity="0.7"/>
  <path d="M 78 22 Q 78 13 100 13 Q 122 13 122 22" fill="none" stroke="#555" stroke-width="6" stroke-linecap="round"/>
  <!-- Grille -->
  <rect x="28" y="28" width="144" height="162" rx="4" fill="#1A1810"/>
  <!-- HF Horn (top 40% of cab) -->
  <path d="M 36 36 L 164 36 L 154 92 L 46 92 Z" fill="url(#horn)"/>
