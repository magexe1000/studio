  <line x1="72"  y1="36" x2="66"  y2="92" stroke="#2A2A28" stroke-width="1.5" opacity="0.5"/>
  <line x1="128" y1="36" x2="134" y2="92" stroke="#2A2A28" stroke-width="1.5" opacity="0.5"/>
  <!-- Divider strip -->
  <rect x="28" y="92" width="144" height="6" rx="2" fill="#2A2820"/>
  <!-- LF Woofer -->
  <circle cx="100" cy="150" r="52" fill="url(#woofer)"/>
  <circle cx="100" cy="150" r="40" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="150" r="28" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="150" r="16" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="150" r="14" fill="#252018"/>
  <circle cx="96"  cy="146" r="5"  fill="#888" opacity="0.2"/>
