<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#C87830"/>
      <stop offset="50%"  stop-color="#8A4010"/>
      <stop offset="100%" stop-color="#4A1C04"/>
    </linearGradient>
    <linearGradient id="neck" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3A1A06"/>
      <stop offset="40%"  stop-color="#8A4818"/>
      <stop offset="100%" stop-color="#3A1A06"/>
    </linearGradient>
    <radialGradient id="shine" cx="32%" cy="28%" r="52%">
      <stop offset="0%"   stop-color="#FFB860" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFB860" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="195" rx="50" ry="5" fill="#00000028"/>
  <!-- Scroll at top -->
  <path d="M 94 8 Q 88 8 88 14 Q 88 22 96 22 Q 104 22 106 14 Q 108 6 100 6 Q 96 6 94 8 Z" fill="url(#neck)"/>
  <path d="M 96 20 Q 96 26 100 26 Q 104 26 104 20" fill="none" stroke="#5A2A08" stroke-width="2"/>
  <!-- Headstock with tuning pegs -->
  <rect x="94" y="22" width="12" height="32" rx="3" fill="url(#neck)"/>
  <line x1="82"  y1="26" x2="94"  y2="28" stroke="#8A4818" stroke-width="4" stroke-linecap="round"/>
  <circle cx="80" cy="26" r="4" fill="#9A5020"/>
  <line x1="82"  y1="34" x2="94"  y2="35" stroke="#8A4818" stroke-width="4" stroke-linecap="round"/>
  <circle cx="80" cy="34" r="4" fill="#9A5020"/>
  <line x1="118" y1="26" x2="106" y2="28" stroke="#8A4818" stroke-width="4" stroke-linecap="round"/>
  <circle cx="120" cy="26" r="4" fill="#9A5020"/>
  <line x1="118" y1="34" x2="106" y2="35" stroke="#8A4818" stroke-width="4" stroke-linecap="round"/>
  <circle cx="120" cy="34" r="4" fill="#9A5020"/>
  <!-- Nut -->
  <rect x="94" y="54" width="12" height="4" rx="1" fill="#EEE"/>
  <!-- Neck -->
  <rect x="94" y="58" width="12" height="42" rx="3" fill="url(#neck)"/>
  <!-- Fingerboard -->
  <rect x="96" y="56" width="8" height="52" rx="2" fill="#1A0A02"/>
  <!-- Body — violin figure-8 shape -->
  <path d="M 94 98
           Q 68 96 56 110 Q 44 124 50 138 Q 56 150 68 152 Q 76 154 80 148
           Q 82 158 80 165 Q 90 172 100 172 Q 110 172 120 165 Q 118 158 120 148
           Q 124 154 132 152 Q 144 150 150 138 Q 156 124 144 110 Q 132 96 106 98
           Q 102 90 100 90 Q 98 90 94 98 Z" fill="url(#body)"/>
  <path d="M 94 98
           Q 68 96 56 110 Q 44 124 50 138 Q 56 150 68 152 Q 76 154 80 148
           Q 82 158 80 165 Q 90 172 100 172 Q 110 172 120 165 Q 118 158 120 148
           Q 124 154 132 152 Q 144 150 150 138 Q 156 124 144 110 Q 132 96 106 98
           Q 102 90 100 90 Q 98 90 94 98 Z" fill="url(#shine)"/>
  <!-- F-holes -->
  <path d="M 80 124 Q 76 120 76 128 Q 76 135 80 135 Q 80 140 80 144 Q 76 144 76 152 Q 76 158 80 156" fill="none" stroke="#1A0804" stroke-width="3" stroke-linecap="round"/>
  <path d="M 120 124 Q 124 120 124 128 Q 124 135 120 135 Q 120 140 120 144 Q 124 144 124 152 Q 124 158 120 156" fill="none" stroke="#1A0804" stroke-width="3" stroke-linecap="round"/>
  <!-- Bridge -->
  <rect x="93" y="143" width="14" height="6" rx="1" fill="#D0A060"/>
  <!-- Tailpiece -->
  <path d="M 93 165 L 107 165 L 110 175 L 90 175 Z" fill="#2A1204"/>
  <!-- Chin rest -->
  <ellipse cx="100" cy="178" rx="16" ry="8" fill="#1A0804"/>
  <!-- Strings -->
  <line x1="97"  y1="54" x2="93"  y2="166" stroke="#D0D0D0" stroke-width="0.9" opacity="0.7"/>
  <line x1="99"  y1="54" x2="97"  y2="166" stroke="#D0D0D0" stroke-width="1"   opacity="0.7"/>
  <line x1="101" y1="54" x2="103" y2="166" stroke="#D0D0D0" stroke-width="1.1" opacity="0.7"/>
  <line x1="103" y1="54" x2="107" y2="166" stroke="#D0D0D0" stroke-width="1.2" opacity="0.7"/>
  <!-- Body shine -->
  <path d="M 58 116 Q 56 126 58 136" stroke="#FFB860" stroke-width="3.5" fill="none" opacity="0.3" stroke-linecap="round"/>
</svg>
