<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="skin" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#E8B888"/>
      <stop offset="100%" stop-color="#C08848"/>
    </radialGradient>
    <linearGradient id="shirt" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#4A6898"/>
      <stop offset="50%"  stop-color="#2A4878"/>
      <stop offset="100%" stop-color="#1A3060"/>
    </linearGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A3040"/>
      <stop offset="100%" stop-color="#0E1420"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="34" ry="6" fill="#00000030"/>
  <!-- Legs -->
  <rect x="76" y="150" width="20" height="44" rx="8" fill="url(#pants)"/>
  <rect x="104" y="150" width="20" height="44" rx="8" fill="url(#pants)"/>
  <!-- Shoes -->
  <ellipse cx="86"  cy="192" rx="14" ry="6" fill="#1A1A1A"/>
  <ellipse cx="114" cy="192" rx="14" ry="6" fill="#1A1A1A"/>
  <!-- Torso / shirt -->
  <path d="M 60 106 Q 58 88 65 80 L 80 96 L 100 100 L 120 96 L 135 80 Q 142 88 140 106 L 140 158 Q 130 164 100 164 Q 70 164 60 158 Z" fill="url(#shirt)"/>
  <!-- Shirt highlight -->
  <path d="M 66 90 Q 68 100 68 116" stroke="#7090C0" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Left arm (extended forward to keys) -->
  <path d="M 62 108 Q 50 114 66 122 L 78 124 L 72 114 Q 60 112 62 108 Z" fill="url(#shirt)"/>
  <!-- Right arm (extended forward to keys) -->
  <path d="M 138 108 Q 150 114 134 122 L 122 124 L 128 114 Q 140 112 138 108 Z" fill="url(#shirt)"/>
  
  <!-- Hands -->
  <ellipse cx="78"  cy="124" rx="7" ry="8" fill="url(#skin)"/>
  <ellipse cx="122" cy="124" rx="7" ry="8" fill="url(#skin)"/>
  <!-- Neck -->
  <rect x="90" y="72" width="20" height="28" rx="8" fill="url(#skin)"/>
  <!-- Head -->
  <ellipse cx="100" cy="60" rx="34" ry="38" fill="url(#skin)"/>
  <!-- Hair -->
  <path d="M 66 54 Q 68 22 100 18 Q 132 22 134 54 Q 126 38 100 36 Q 74 38 66 54 Z" fill="#2A1808"/>
  <!-- Eyes -->
  <ellipse cx="88"  cy="58" rx="5" ry="6" fill="#FFF"/>
  <ellipse cx="112" cy="58" rx="5" ry="6" fill="#FFF"/>
  <ellipse cx="88"  cy="60" rx="3" ry="4" fill="#5A3010"/>
  <ellipse cx="112" cy="60" rx="3" ry="4" fill="#5A3010"/>
  <circle  cx="88"  cy="60" r="2"  fill="#111"/>
  <circle  cx="112" cy="60" r="2"  fill="#111"/>
  <circle  cx="89"  cy="59" r="0.8" fill="#FFF"/>
  <circle  cx="113" cy="59" r="0.8" fill="#FFF"/>
  <!-- Mouth -->
  <path d="M 92 74 Q 100 80 108 74" stroke="#A06840" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows -->
  <path d="M 83 51 Q 88 48 93 51" stroke="#2A1808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 107 51 Q 112 48 117 51" stroke="#2A1808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="66"  cy="62" rx="7" ry="9" fill="url(#skin)"/>
  <ellipse cx="134" cy="62" rx="7" ry="9" fill="url(#skin)"/>
  <!-- Belt -->
  <rect x="60" y="154" width="80" height="8" rx="4" fill="#3A3020"/>
  <rect x="95" y="154" width="10" height="8" rx="2" fill="#888060"/>

  <!-- Keyboard Stand (X-Stand) -->
  <line x1="52" y1="126" x2="148" y2="194" stroke="#212121" stroke-width="3.5"/>
  <line x1="148" y1="126" x2="52" y2="194" stroke="#212121" stroke-width="3.5"/>
  <line x1="45" y1="194" x2="65" y2="194" stroke="#212121" stroke-width="4" stroke-linecap="round"/>
  <line x1="135" y1="194" x2="155" y2="194" stroke="#212121" stroke-width="4" stroke-linecap="round"/>

  <!-- Keyboard Synthesizer -->
  <rect x="30" y="116" width="140" height="12" rx="2" fill="#212121" stroke="#37474F" stroke-width="1.5"/>
  <!-- White Keys -->
  <rect x="34" y="122" width="132" height="5" fill="#FFFFFF"/>
  <line x1="44" y1="122" x2="44" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="54" y1="122" x2="54" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="64" y1="122" x2="64" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="74" y1="122" x2="74" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="84" y1="122" x2="84" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="94" y1="122" x2="94" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="104" y1="122" x2="104" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="114" y1="122" x2="114" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="124" y1="122" x2="124" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="134" y1="122" x2="134" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="144" y1="122" x2="144" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="154" y1="122" x2="154" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <line x1="164" y1="122" x2="164" y2="127" stroke="#90A4AE" stroke-width="0.8"/>
  <!-- Black Keys -->
  <rect x="38" y="122" width="3" height="3" fill="#000000"/>
  <rect x="48" y="122" width="3" height="3" fill="#000000"/>
  <rect x="58" y="122" width="3" height="3" fill="#000000"/>
  <rect x="68" y="122" width="3" height="3" fill="#000000"/>
  <rect x="78" y="122" width="3" height="3" fill="#000000"/>
  <rect x="88" y="122" width="3" height="3" fill="#000000"/>
  <rect x="98" y="122" width="3" height="3" fill="#000000"/>
  <rect x="108" y="122" width="3" height="3" fill="#000000"/>
  <rect x="118" y="122" width="3" height="3" fill="#000000"/>
  <rect x="128" y="122" width="3" height="3" fill="#000000"/>
  <rect x="138" y="122" width="3" height="3" fill="#000000"/>
  <rect x="148" y="122" width="3" height="3" fill="#000000"/>
  <rect x="158" y="122" width="3" height="3" fill="#000000"/>
</svg>
