<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="skin" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#E8B888"/>
      <stop offset="100%" stop-color="#C08848"/>
    </radialGradient>
    <linearGradient id="shirt" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#4A6898"/>
      <stop offset="50%"  stop-color="#2A4878"/>
      <stop offset="100%" stop-color="#1A3060"/>
    </linearGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A3040"/>
      <stop offset="100%" stop-color="#0E1420"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="34" ry="6" fill="#00000030"/>
  <!-- Legs (adjusted to look sitting) -->
  <rect x="65" y="145" width="28" height="24" rx="6" fill="url(#pants)"/>
  <rect x="107" y="145" width="28" height="24" rx="6" fill="url(#pants)"/>
  <rect x="68" y="155" width="20" height="38" rx="6" fill="url(#pants)"/>
  <rect x="112" y="155" width="20" height="38" rx="6" fill="url(#pants)"/>
  <!-- Shoes -->
  <ellipse cx="78"  cy="192" rx="12" ry="6" fill="#1A1A1A"/>
  <ellipse cx="122" cy="192" rx="12" ry="6" fill="#1A1A1A"/>
  <!-- Torso / shirt -->
  <path d="M 60 106 Q 58 88 65 80 L 80 96 L 100 100 L 120 96 L 135 80 Q 142 88 140 106 L 140 152 Q 130 156 100 156 Q 70 156 60 152 Z" fill="url(#shirt)"/>
  <!-- Shirt highlight -->
  <path d="M 66 90 Q 68 100 68 116" stroke="#7090C0" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Left arm (holding drumstick) -->
  <path d="M 62 108 Q 42 120 54 135 L 75 130 Q 66 120 72 118 Z" fill="url(#shirt)"/>
  <!-- Right arm (holding drumstick) -->
  <path d="M 138 108 Q 158 120 146 135 L 125 130 Q 134 120 128 118 Z" fill="url(#shirt)"/>
  
  <!-- Hands -->
  <ellipse cx="75"  cy="130" rx="7" ry="8" fill="url(#skin)"/>
  <ellipse cx="125" cy="130" rx="7" ry="8" fill="url(#skin)"/>
  <!-- Neck -->
  <rect x="90" y="72" width="20" height="28" rx="8" fill="url(#skin)"/>
  <!-- Head -->
  <ellipse cx="100" cy="60" rx="34" ry="38" fill="url(#skin)"/>
  <!-- Hair -->
  <path d="M 66 54 Q 68 22 100 18 Q 132 22 134 54 Q 126 38 100 36 Q 74 38 66 54 Z" fill="#2A1808"/>
  <!-- Eyes -->
  <ellipse cx="88"  cy="58" rx="5" ry="6" fill="#FFF"/>
  <ellipse cx="112" cy="58" rx="5" ry="6" fill="#FFF"/>
  <ellipse cx="88"  cy="60" rx="3" ry="4" fill="#5A3010"/>
  <ellipse cx="112" cy="60" rx="3" ry="4" fill="#5A3010"/>
  <circle  cx="88"  cy="60" r="2"  fill="#111"/>
  <circle  cx="112" cy="60" r="2"  fill="#111"/>
  <circle  cx="89"  cy="59" r="0.8" fill="#FFF"/>
  <circle  cx="113" cy="59" r="0.8" fill="#FFF"/>
  <!-- Mouth -->
  <path d="M 92 74 Q 100 80 108 74" stroke="#A06840" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyebrows -->
  <path d="M 83 51 Q 88 48 93 51" stroke="#2A1808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 107 51 Q 112 48 117 51" stroke="#2A1808" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="66"  cy="62" rx="7" ry="9" fill="url(#skin)"/>
  <ellipse cx="134" cy="62" rx="7" ry="9" fill="url(#skin)"/>

  <!-- Drumsticks -->
  <line x1="75" y1="130" x2="92" y2="118" stroke="#D7CCC8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="125" y1="130" x2="108" y2="118" stroke="#D7CCC8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Drum Kit Foreground -->
  <!-- Snare Drum -->
  <rect x="68" y="132" width="64" height="24" rx="2" fill="#E1BEE7" stroke="#4A148C" stroke-width="2"/>
  <ellipse cx="100" cy="132" rx="32" ry="5" fill="#FFF" stroke="#4A148C" stroke-width="1.5"/>
  <!-- Snare Stand -->
  <line x1="100" y1="156" x2="100" y2="185" stroke="#455A64" stroke-width="3"/>
  <line x1="100" y1="185" x2="84" y2="194" stroke="#455A64" stroke-width="2.5"/>
  <line x1="100" y1="185" x2="116" y2="194" stroke="#455A64" stroke-width="2.5"/>
  
  <!-- Left Cymbal (Hi-Hat) -->
  <ellipse cx="45" cy="115" rx="22" ry="4" fill="#FFD54F" stroke="#F57F17" stroke-width="1.2"/>
  <line x1="45" y1="119" x2="45" y2="194" stroke="#455A64" stroke-width="2"/>
  
  <!-- Right Cymbal (Ride/Crash) -->
  <ellipse cx="155" cy="108" rx="26" ry="5" fill="#FFD54F" stroke="#F57F17" stroke-width="1.2"/>
  <line x1="155" y1="113" x2="155" y2="194" stroke="#455A64" stroke-width="2"/>
</svg>
