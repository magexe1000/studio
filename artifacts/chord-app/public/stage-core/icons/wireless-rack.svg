<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="case" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="unit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A3038"/>
      <stop offset="100%" stop-color="#0E1218"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="193" rx="88" ry="7" fill="#00000028"/>
  <rect x="8" y="26" width="184" height="164" rx="8" fill="url(#case)"/>
  <!-- Rack ears -->
  <rect x="8"   y="26" width="20" height="164" rx="4" fill="#1E1E1E"/>
  <rect x="172" y="26" width="20" height="164" rx="4" fill="#1E1E1E"/>
  <circle cx="18" cy="42"  r="5" fill="#2A2A2A"/><circle cx="18" cy="42"  r="3" fill="#444"/>
  <circle cx="18" cy="178" r="5" fill="#2A2A2A"/><circle cx="18" cy="178" r="3" fill="#444"/>
  <circle cx="182" cy="42"  r="5" fill="#2A2A2A"/><circle cx="182" cy="42"  r="3" fill="#444"/>
  <circle cx="182" cy="178" r="5" fill="#2A2A2A"/><circle cx="182" cy="178" r="3" fill="#444"/>
  <!-- Antenna bar across top -->
  <rect x="28" y="14" width="144" height="14" rx="4" fill="#333"/>
  <!-- Two antennas -->
  <line x1="66"  y1="14" x2="56"  y2="2"  stroke="#777" stroke-width="5" stroke-linecap="round"/>
  <line x1="134" y1="14" x2="144" y2="2"  stroke="#777" stroke-width="5" stroke-linecap="round"/>
  <circle cx="56"  cy="2"  r="3.5" fill="#AAAAAA"/>
  <circle cx="144" cy="2"  r="3.5" fill="#AAAAAA"/>
  <!-- Unit 1 — Channel 1 -->
  <rect x="30" y="32" width="140" height="28" rx="3" fill="url(#unit)"/>
  <text x="50"  y="44" font-family="Arial, sans-serif" font-size="8" fill="#6090E0" opacity="0.9">CH 1</text>
  <rect x="30" y="50" width="50" height="6" rx="2" fill="#111"/>
  <rect x="30" y="50" width="36" height="6" rx="2" fill="#2244BB" opacity="0.9"/>
  <circle cx="130" cy="42" r="6" fill="#1A1A2A"/><circle cx="130" cy="42" r="4" fill="#334488"/>
  <circle cx="148" cy="42" r="6" fill="#1A1A2A"/><circle cx="148" cy="42" r="4" fill="#334488"/>
  <circle cx="162" cy="42" r="4" fill="#00BB44"/>
  <!-- Unit 2 — Channel 2 -->
  <rect x="30" y="64" width="140" height="28" rx="3" fill="url(#unit)"/>
  <text x="50"  y="76" font-family="Arial, sans-serif" font-size="8" fill="#6090E0" opacity="0.9">CH 2</text>
  <rect x="30" y="82" width="50" height="6" rx="2" fill="#111"/>
  <rect x="30" y="82" width="44" height="6" rx="2" fill="#2244BB" opacity="0.9"/>
  <circle cx="130" cy="74" r="6" fill="#1A1A2A"/><circle cx="130" cy="74" r="4" fill="#334488"/>
  <circle cx="148" cy="74" r="6" fill="#1A1A2A"/><circle cx="148" cy="74" r="4" fill="#334488"/>
  <circle cx="162" cy="74" r="4" fill="#00BB44"/>
  <!-- Unit 3 — Channel 3 -->
  <rect x="30" y="96" width="140" height="28" rx="3" fill="url(#unit)"/>
  <text x="50"  y="108" font-family="Arial, sans-serif" font-size="8" fill="#6090E0" opacity="0.9">CH 3</text>
  <rect x="30" y="114" width="50" height="6" rx="2" fill="#111"/>
  <rect x="30" y="114" width="28" height="6" rx="2" fill="#2244BB" opacity="0.9"/>
  <circle cx="130" cy="106" r="6" fill="#1A1A2A"/><circle cx="130" cy="106" r="4" fill="#334488"/>
  <circle cx="148" cy="106" r="6" fill="#1A1A2A"/><circle cx="148" cy="106" r="4" fill="#334488"/>
  <circle cx="162" cy="106" r="4" fill="#00BB44"/>
  <!-- Unit 4 — Channel 4 -->
  <rect x="30" y="128" width="140" height="28" rx="3" fill="url(#unit)"/>
  <text x="50"  y="140" font-family="Arial, sans-serif" font-size="8" fill="#6090E0" opacity="0.9">CH 4</text>
  <rect x="30" y="146" width="50" height="6" rx="2" fill="#111"/>
  <rect x="30" y="146" width="40" height="6" rx="2" fill="#2244BB" opacity="0.9"/>
  <circle cx="130" cy="138" r="6" fill="#1A1A2A"/><circle cx="130" cy="138" r="4" fill="#334488"/>
  <circle cx="148" cy="138" r="6" fill="#1A1A2A"/><circle cx="148" cy="138" r="4" fill="#334488"/>
  <circle cx="162" cy="138" r="4" fill="#00BB44"/>
  <!-- Power distribution unit at bottom -->
  <rect x="30" y="160" width="140" height="18" rx="3" fill="#111"/>
  <text x="100" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">POWER</text>
  <circle cx="148" cy="169" r="4" fill="#FF4422"/>
  <circle cx="162" cy="169" r="4" fill="#FF4422"/>
</svg>
