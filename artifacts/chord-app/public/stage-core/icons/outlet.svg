<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="plate" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#E8E8E8"/>
      <stop offset="50%"  stop-color="#C8C8C8"/>
      <stop offset="100%" stop-color="#A8A8A8"/>
    </linearGradient>
    <radialGradient id="socket" cx="40%" cy="38%" r="60%">
      <stop offset="0%"   stop-color="#404040"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="192" rx="68" ry="8" fill="#00000028"/>
  <!-- Wall plate -->
  <rect x="38" y="32" width="124" height="152" rx="10" fill="url(#plate)"/>
  <!-- Screw holes top and bottom -->
  <ellipse cx="100" cy="50"  rx="5" ry="5" fill="#DDD"/>
  <circle  cx="100" cy="50"  r="3"  fill="#CCC"/>
  <line x1="96" y1="50" x2="104" y2="50" stroke="#AAA" stroke-width="1.5"/>
  <ellipse cx="100" cy="166" rx="5" ry="5" fill="#DDD"/>
  <circle  cx="100" cy="166" r="3"  fill="#CCC"/>
  <line x1="96" y1="166" x2="104" y2="166" stroke="#AAA" stroke-width="1.5"/>
  <!-- Top socket (NEMA 5-15) -->
  <circle cx="100" cy="84" r="34" fill="#D8D8D8"/>
  <circle cx="100" cy="84" r="34" fill="none" stroke="#B8B8B8" stroke-width="1.5"/>
  <!-- "Face" of outlet — two slots + ground -->
  <!-- Left slot -->
  <rect x="86" y="74" width="5" height="12" rx="2.5" fill="url(#socket)"/>
  <!-- Right slot -->
  <rect x="109" y="74" width="5" height="12" rx="2.5" fill="url(#socket)"/>
  <!-- Ground hole -->
  <ellipse cx="100" cy="96" rx="4" ry="5" fill="url(#socket)"/>
  <!-- Bottom socket -->
  <circle cx="100" cy="140" r="34" fill="#D8D8D8"/>
  <circle cx="100" cy="140" r="34" fill="none" stroke="#B8B8B8" stroke-width="1.5"/>
  <!-- Left slot -->
  <rect x="86" y="130" width="5" height="12" rx="2.5" fill="url(#socket)"/>
  <!-- Right slot -->
  <rect x="109" y="130" width="5" height="12" rx="2.5" fill="url(#socket)"/>
  <!-- Ground hole -->
  <ellipse cx="100" cy="152" rx="4" ry="5" fill="url(#socket)"/>
  <!-- Plate edge shadow -->
  <rect x="38" y="32" width="124" height="152" rx="10" fill="none" stroke="#999" stroke-width="1.5" opacity="0.5"/>
</svg>
