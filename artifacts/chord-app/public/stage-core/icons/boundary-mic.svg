<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="plate" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#C0C0C0"/>
      <stop offset="40%"  stop-color="#909090"/>
      <stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <radialGradient id="capsule" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#888"/>
    </radialGradient>
    <linearGradient id="cable" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#444"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="180" rx="78" ry="10" fill="#00000020"/>
  <!-- Plate body — seen from slight 3/4 angle -->
  <rect x="20" y="130" width="160" height="40" rx="6" fill="#383838"/>
  <!-- Top face of plate -->
  <path d="M 24 130 L 176 130 L 172 100 L 28 100 Z" fill="url(#plate)"/>
  <!-- Left face -->
  <path d="M 28 100 L 24 130 L 20 130 L 24 100 Z" fill="#707070"/>
  <!-- Capsule dome -->
  <ellipse cx="100" cy="110" rx="20" ry="20" fill="#2A2A2A"/>
  <ellipse cx="100" cy="108" rx="16" ry="14" fill="url(#capsule)"/>
  <ellipse cx="94" cy="104" rx="5" ry="4" fill="#F0F0F0" opacity="0.4"/>
  <!-- Mesh detail on capsule -->
  <ellipse cx="100" cy="108" rx="16" ry="14" fill="none" stroke="#707070" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="100" cy="108" rx="10" ry="9" fill="none" stroke="#707070" stroke-width="1" opacity="0.4"/>
  <ellipse cx="100" cy="108" rx="5" ry="4.5" fill="none" stroke="#707070" stroke-width="0.8" opacity="0.3"/>
  <!-- Screw holes on plate -->
  <circle cx="38" cy="115" r="4" fill="#505050"/>
  <circle cx="162" cy="115" r="4" fill="#505050"/>
  <!-- Crown / brand logo area -->
  <text x="100" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#707070" opacity="0.7">PZM</text>
  <!-- Cable exit -->
  <rect x="92" y="168" width="16" height="18" rx="4" fill="url(#cable)"/>
  <rect x="96" y="172" width="8" height="14" rx="2" fill="#111" opacity="0.8"/>
</svg>
