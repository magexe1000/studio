<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="smallconga" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#7A3818"/>
      <stop offset="50%"  stop-color="#4A1E08"/>
      <stop offset="100%" stop-color="#280C02"/>
    </linearGradient>
    <linearGradient id="largeconga" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#8A4020"/>
      <stop offset="50%"  stop-color="#562210"/>
      <stop offset="100%" stop-color="#300A02"/>
    </linearGradient>
    <radialGradient id="smallhead" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#E8DCBC"/>
      <stop offset="100%" stop-color="#9A8860"/>
    </radialGradient>
    <radialGradient id="largehead" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#E8DCBC"/>
      <stop offset="100%" stop-color="#9A8860"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="88" ry="6" fill="#00000028"/>
  <!-- Small conga (quinto) — left, taller -->
  <path d="M 22 62 Q 20 52 28 44 Q 36 36 56 36 Q 76 36 84 44 Q 92 52 90 62 L 84 170 Q 80 184 56 184 Q 32 184 28 170 Z" fill="url(#smallconga)"/>
  <!-- Small conga head -->
  <ellipse cx="56" cy="62" rx="34" ry="15" fill="url(#smallhead)"/>
  <!-- Head hoop / rim -->
  <ellipse cx="56" cy="62" rx="34" ry="15" fill="none" stroke="#C89A50" stroke-width="3"/>
  <!-- Tension rods (small conga) -->
  <line x1="22" y1="72" x2="22" y2="155" stroke="#808060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="72" x2="90" y2="155" stroke="#808060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="68" x2="30" y2="158" stroke="#808060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="68" x2="82" y2="158" stroke="#808060" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wood highlight line (small) -->
  <path d="M 26 80 Q 28 60 36 50" stroke="#C07040" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>
  <!-- Large conga (conga) — right, shorter and wider -->
  <path d="M 104 56 Q 102 44 112 36 Q 124 26 152 26 Q 180 26 190 36 Q 200 44 198 56 L 188 166 Q 184 184 152 184 Q 120 184 116 166 Z" fill="url(#largeconga)"/>
  <!-- Large conga head -->
  <ellipse cx="152" cy="56" rx="48" ry="20" fill="url(#largehead)"/>
  <ellipse cx="152" cy="56" rx="48" ry="20" fill="none" stroke="#C89A50" stroke-width="3"/>
  <!-- Tension rods (large conga) -->
  <line x1="104" y1="68" x2="104" y2="155" stroke="#808060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="196" y1="68" x2="198" y2="155" stroke="#808060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="118" y1="64" x2="114" y2="158" stroke="#808060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="186" y1="64" x2="190" y2="158" stroke="#808060" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wood highlight (large) -->
  <path d="M 110 80 Q 112 58 122 46" stroke="#C07040" stroke-width="3" fill="none" opacity="0.35" stroke-linecap="round"/>
</svg>
