<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%"   stop-color="#F08848"/>
      <stop offset="45%"  stop-color="#C83E10"/>
      <stop offset="100%" stop-color="#7A1E04"/>
    </linearGradient>
    <linearGradient id="grip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#120600"/>
      <stop offset="40%"  stop-color="#3C1808"/>
      <stop offset="60%"  stop-color="#3C1808"/>
      <stop offset="100%" stop-color="#120600"/>
    </linearGradient>
    <radialGradient id="top-sheen" cx="38%" cy="38%" r="55%">
      <stop offset="0%"  stop-color="#FFB888" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFB888" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="100" cy="194" rx="26" ry="6" fill="#00000028"/>

  <!-- ── Handle / grip section ── -->
  <rect x="80" y="138" width="40" height="56" rx="20" fill="#3C1808"/>
  <!-- Handle highlight -->
  <rect x="84" y="141" width="12" height="48" rx="6" fill="#6A3018" opacity="0.4"/>

  <!-- Grip texture rings -->
  <ellipse cx="100" cy="148" rx="20" ry="4" fill="none" stroke="#1E0A04" stroke-width="3"/>
  <ellipse cx="100" cy="158" rx="20" ry="4" fill="none" stroke="#1E0A04" stroke-width="3"/>
  <ellipse cx="100" cy="168" rx="20" ry="4" fill="none" stroke="#1E0A04" stroke-width="3"/>
  <ellipse cx="100" cy="178" rx="20" ry="4" fill="none" stroke="#1E0A04" stroke-width="3"/>

  <!-- ── Main bead chamber (wider, pear-shaped body) ── -->
  <!-- Body outline / shape — wider ovoid -->
  <path d="M 52 115
             Q 48 88 52 68
             Q 56 30 100 22
             Q 144 30 148 68
             Q 152 88 148 115
             Q 140 140 100 140
             Q 60 140 52 115 Z"
        fill="url(#body)"/>

  <!-- Top sheen (specular highlight) -->
  <path d="M 52 115
             Q 48 88 52 68
             Q 56 30 100 22
             Q 144 30 148 68
             Q 152 88 148 115
             Q 140 140 100 140
             Q 60 140 52 115 Z"
        fill="url(#top-sheen)"/>

  <!-- LP text (brand reference) -->
  <text x="100" y="78" text-anchor="middle"
        font-family="Arial Black, sans-serif"
        font-size="22" font-weight="900"
        fill="white" opacity="0.65">LP</text>

  <!-- Horizontal band at shoulder -->
  <path d="M 53 115 Q 100 127 147 115" stroke="#A02808" stroke-width="3.5" fill="none" opacity="0.55"/>
  <path d="M 54 121 Q 100 133 146 121" stroke="#A02808" stroke-width="2"   fill="none" opacity="0.35"/>

  <!-- Edge highlight arc -->
  <path d="M 58 85 Q 54 58 70 38" stroke="#FFB888" stroke-width="3.5" fill="none" opacity="0.35" stroke-linecap="round"/>
</svg>
