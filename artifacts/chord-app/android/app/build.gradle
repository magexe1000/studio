apply plugin: 'com.android.application'
// Trigger APK rebuild for v3.3.8 release - polishing update dialog UI and install handoff

android {
    namespace "com.chordex.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.chordex.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 18
        versionName "3.4.7"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~:!drums'
        }
    }
    // Pinned debug signing config so the SHA-1 fingerprint of every
    // build is identical, regardless of which machine/CI runner produced
    // it. Without this, Android falls back to ~/.android/debug.keystore
    // (auto-generated per machine) and the SHA-1 changes on every fresh
    // GitHub Actions runner — which breaks Google Sign-In with
    // DEVELOPER_ERROR (status 10) the moment a different runner picks
    // up the build, because Firebase only accepts the SHA-1 it knows
    // about.
    //
    // The keystore is checked into the repo at app/debug.keystore. It
    // is a DEBUG keystore (Android's well-known default password
    // "android"), so checking it in is safe — its only purpose is
    // identity stability for development builds.
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (System.getenv("ANDROID_KEYSTORE_PASSWORD") != null) {
                storeFile file('release.keystore')
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            } else {
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }
}

repositories {
    flatDir{
        dirs 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    // implementation project(':capacitor-cordova-android-plugins')
    // Explicit dependency to guarantee GoogleSignIn is in the APK.
    // The capacitor-firebase/authentication plugin transitively pulls
    // play-services-auth, but in some build setups the class
    // com.google.android.gms.auth.api.signin.GoogleSignIn fails to
    // resolve at runtime (NoClassDefFoundError) unless declared here.
    implementation "com.google.android.gms:play-services-auth:$playServicesAuthVersion"
    implementation "com.google.firebase:firebase-auth:$firebaseAuthVersion"
    // Required by OtaCheckWorker — the periodic WorkManager job that
    // polls version.json in the background and posts a notification
    // when a new bundle is available, even with the app closed.
    implementation "androidx.work:work-runtime:2.9.1"
    implementation "com.google.guava:listenablefuture:1.0"
    // Compile-time stub for com.google.common.util.concurrent.ListenableFuture.
    // The androidx.work Worker base class exposes ListenableFuture in its
    // public API surface, so javac needs the class on the classpath even
    // though our subclass never references it directly. Without this the
    // build fails with "cannot access ListenableFuture". The :1.0 stub is
    // the official Google-recommended fix and is ~1 KB.
    implementation "com.google.guava:guava:33.2.1-android"
    implementation "androidx.security:security-crypto:1.0.0"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
