    />
    <style>
      html, body { background: #0a0a0c; margin: 0; padding: 0; }

      /* ── Professional monochrome startup intro (v7) ────────────────────
         • Pure black bg, no colored glow
         • White icons, no per-app color tints, no pill backgrounds
         • Orbit starts smooth, accelerates dramatically right before settle
         • Each app icon then arranges into its final hub position
      ────────────────────────────────────────────────────────────────── */
      #intro {
        position: fixed; inset: 0; z-index: 2147483647;
        background: #0a0a0c;
        overflow: hidden;
        pointer-events: none;
        opacity: 1;
        transition: opacity 700ms cubic-bezier(0.4,0,0.2,1);
        font-family: Manrope, system-ui, -apple-system, sans-serif;
      }
      #intro.dismissing { opacity: 0; }
      #intro.dismissed  { display: none; }

      /* Very subtle white nebula — gives depth without ugly color */
      #intro-glow {
        position: absolute; top: 50%; left: 50%;
        width: 420px; height: 420px;
        margin: -210px 0 0 -210px;
        background: radial-gradient(circle,
          rgba(255,255,255,0.05) 0%,
          rgba(255,255,255,0.02) 40%,
          transparent 70%);
        border-radius: 50%;
        filter: blur(8px);
        pointer-events: none;
      }

      /* Tiny twinkling stars */
      #intro-stars {
        position: absolute; inset: 0;
        background-image:
          radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.55), transparent 50%),
          radial-gradient(1px 1px at 78% 22%, rgba(255,255,255,0.40), transparent 50%),
          radial-gradient(1.5px 1.5px at 30% 78%, rgba(255,255,255,0.50), transparent 50%),
          radial-gradient(1px 1px at 88% 70%, rgba(255,255,255,0.55), transparent 50%),
          radial-gradient(1px 1px at 55% 8%,  rgba(255,255,255,0.30), transparent 50%),
          radial-gradient(1px 1px at 8% 60%,  rgba(255,255,255,0.40), transparent 50%),
          radial-gradient(1.5px 1.5px at 65% 92%, rgba(255,255,255,0.45), transparent 50%),
          radial-gradient(1px 1px at 42% 38%, rgba(255,255,255,0.28), transparent 50%);
        opacity: 0.5;
      }

      /* Center Studio logo — JS controls transform every frame */
      #intro-center {
        position: absolute; top: 50%; left: 50%;
        display: flex; flex-direction: column; align-items: center;
        gap: 8px;
        z-index: 1;
        will-change: transform;
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
        animation: center-fade-in 600ms 80ms ease-out forwards;
      }
      @keyframes center-fade-in {
        from { opacity: 0; } to { opacity: 1; }
      }
      #intro-center .logo {
        width: 96px; height: 96px;
        display: flex; align-items: center; justify-content: center;
        filter: drop-shadow(0 0 24px rgba(255,255,255,0.18));
      }
      #intro-center .logo svg { width: 96px; height: 96px; }
      #intro-center .title {
        font-size: 32px; font-weight: 800; color: #ffffff;
        letter-spacing: -0.025em; margin: 6px 0 0;
      }
      #intro-center .sub {
        font-size: 12px; color: rgba(255,255,255,0.50);
        letter-spacing: 0.08em; margin: 0; text-transform: uppercase;
      }

      /* Orbiters — no background pill, just white icons */
      .orbiter {
        position: absolute;
        width: 44px; height: 44px;
        display: flex; align-items: center; justify-content: center;
        will-change: transform, left, top;
        opacity: 0;
        animation: orb-fade-in 500ms 120ms ease-out forwards;
        color: #ffffff;
      }
      @keyframes orb-fade-in { from { opacity: 0; } to { opacity: 1; } }
      .orbiter svg {
        width: 30px; height: 30px;
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
      }

      @media (prefers-reduced-motion: reduce) {
        #intro *, #intro { animation: none !important; transition: opacity 200ms linear !important; }
        .orbiter, #intro-center { opacity: 1 !important; }
      }
    </style>
  </head>
  <body>
    <div id="intro" aria-hidden="true">
      <div id="intro-stars"></div>
      <div id="intro-glow"></div>

      <div id="intro-center">
        <div class="logo">
          <svg viewBox="0 0 512 512" fill="none">
            <path d="M 72 256 C 128 60 192 60 256 256 S 384 452 440 256"
                  stroke="white" stroke-width="44"
                  stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <p class="title">Studio</p>
        <p class="sub">by Mag</p>
      </div>

      <!-- 5 white-icon orbiters, no background colors -->
      <div class="orbiter" data-i="0">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 8h14M5 12h14M5 16h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="orbiter" data-i="1">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="7.5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2.4" fill="currentColor"/></svg>
      </div>
      <div class="orbiter" data-i="2">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="9" width="3" height="6" rx="0.6"/><rect x="8" y="6" width="3" height="12" rx="0.6"/><rect x="13" y="9" width="3" height="6" rx="0.6"/><rect x="18" y="7" width="3" height="10" rx="0.6"/></svg>
      </div>
      <div class="orbiter" data-i="3">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>
      </div>
      <div class="orbiter" data-i="4">
        <svg viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="12" rx="3" fill="currentColor"/><path d="M6 12a6 6 0 0 0 12 0M12 18v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div id="root"></div>

    <script>
      // ── Professional orbiting intro with accelerating spin ──────────────
      (function () {
        var intro    = document.getElementById('intro');
        var center   = document.getElementById('intro-center');
        var orbiters = intro ? intro.querySelectorAll('.orbiter') : [];
        if (!intro || orbiters.length === 0) return;

        // Geometry — elliptical tilted orbit (3D look)
        var RX        = 132;
        var RY        = 38;
        var TILT      = -28 * Math.PI / 180;
        var COS_T     = Math.cos(TILT);
        var SIN_T     = Math.sin(TILT);
        var N         = orbiters.length;
        var STEP      = 360 / N;

        // ── Speed profile (deg/ms angular velocity) ───────────────────────
        // Phase 1 (0 → ACCEL_START):   smooth steady orbit
        // Phase 2 (ACCEL_START → ACCEL_END): accelerate dramatically — the
        //   "spin faster as the app is about to open" effect
        // Phase 3 (SETTLE_START → SETTLE_END): each item arranges into hub pos
        var BASE_OMEGA   = 360 / 8500;       // ~8.5s per revolution
        var PEAK_OMEGA   = 360 / 900;        // ~0.9s per revolution at peak
        var ACCEL_START  = 1800;
        var ACCEL_END    = 3200;
        var SETTLE_START = 3000;             // start settling slightly during peak
        var SETTLE_END   = 4400;
        var INTRO_TOTAL  = 4400;

        // Final hub-icon positions (relative to viewport CENTER) — recomputed
        // on resize/orientation change so all settled items stay visible.
        var W, H, targets = [], centerTarget = { x: 0, y: 0, scale: 0.55 };
        function recomputeTargets() {
          W = window.innerWidth;
          H = window.innerHeight;
          var COL_X = -(W / 2) + 64;
          // Clamp last row so it never overflows the bottom of the viewport
          var GAP_DESIRED = 76;
          var maxYFromCenter = (H / 2) - 48;       // 48 = half of orbiter+padding
          var firstY        = Math.max(-(H / 2) + 88, -(H / 2) + H * 0.18);
          var lastYBudget   = maxYFromCenter - firstY;
          var GAP = Math.min(GAP_DESIRED, Math.max(48, lastYBudget / (N - 1)));
          targets = [];
          for (var j = 0; j < N; j++) {
            targets.push({ x: COL_X, y: firstY + j * GAP, scale: 0.55 });
          }
          centerTarget = { x: 0, y: -(H / 2) + 130, scale: 0.55 };
        }
        recomputeTargets();
        window.addEventListener('resize', recomputeTargets);
        window.addEventListener('orientationchange', recomputeTargets);

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }
        function easeInQuad(t) { return t * t; }

        // Anchor orbiters to viewport center; per-frame transform handles motion
        var cx = W / 2, cy = H / 2;
        for (var i = 0; i < orbiters.length; i++) {
          orbiters[i].style.left = (cx - 22) + 'px';   // 22 = half of 44
          orbiters[i].style.top  = (cy - 22) + 'px';
        }

        var start  = performance.now();
        var angle  = 0;           // accumulated orbit angle (deg)
        var lastT  = start;
        var stopped = false;

        function omegaAt(t) {
          if (t <= ACCEL_START) return BASE_OMEGA;
          if (t >= ACCEL_END)   return PEAK_OMEGA;
          var p = (t - ACCEL_START) / (ACCEL_END - ACCEL_START);
          return BASE_OMEGA + (PEAK_OMEGA - BASE_OMEGA) * easeInQuad(p);
        }

        function frame(now) {
          if (stopped) return;
          var t  = now - start;
          var dt = now - lastT;
          lastT  = now;
          // Integrate angular velocity for smooth acceleration
          angle = (angle + omegaAt(t) * dt) % 360;

          // Settle progress
          var sP = (t - SETTLE_START) / (SETTLE_END - SETTLE_START);
          if (sP < 0) sP = 0; else if (sP > 1) sP = 1;
          var sE = easeInOutCubic(sP);

          for (var k = 0; k < orbiters.length; k++) {
            var el = orbiters[k];
            var a = (angle + k * STEP) % 360;
            if (a < 0) a += 360;
            var rad = a * Math.PI / 180;
            var x0 = RX * Math.cos(rad);
            var y0 = RY * Math.sin(rad);
            var xT = x0 * COS_T - y0 * SIN_T;
            var yT = x0 * SIN_T + y0 * COS_T;

            var front = a < 180;
            var orbitScale = front ? 1.10 : 0.85;
            var z          = front ? 3 : 0;

            var tx = targets[k].x, ty = targets[k].y, ts = targets[k].scale;
            var fx = xT + (tx - xT) * sE;
            var fy = yT + (ty - yT) * sE;
            var fs = orbitScale + (ts - orbitScale) * sE;
            el.style.zIndex   = sE > 0.5 ? 1 : z;
            el.style.transform = 'translate(' + fx.toFixed(2) + 'px,' + fy.toFixed(2) + 'px) scale(' + fs.toFixed(3) + ')';
          }

          // Center logo migrates upward to its hub position during settle
          var ccx = centerTarget.x * sE;
          var ccy = centerTarget.y * sE;
          var ccs = 1 + (centerTarget.scale - 1) * sE;
          center.style.transform = 'translate(-50%, -50%) translate(' + ccx.toFixed(2) + 'px,' + ccy.toFixed(2) + 'px) scale(' + ccs.toFixed(3) + ')';

          if (sP >= 1) { stopped = true; return; }
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

        // ── Dismiss when min-visible time elapsed AND React mounted ─────────
        var rootEl = document.getElementById('root');
        var dismissed = false, observer = null, pollId = 0;
        function dismiss() {
          if (dismissed) return;
          dismissed = true;
          stopped   = true;
          if (observer) { observer.disconnect(); observer = null; }
          if (pollId)   { clearInterval(pollId); pollId = 0; }
          intro.classList.add('dismissing');
          setTimeout(function () {
            intro.classList.add('dismissed');
            if (intro.parentNode) intro.parentNode.removeChild(intro);
          }, 750);
        }
        function reactMounted() {
          return !!(rootEl && rootEl.children && rootEl.children.length > 0);
        }
        function tryDismiss() {
          if (dismissed) return;
          var elapsed = performance.now() - start;
          if (reactMounted() && elapsed >= INTRO_TOTAL) {
            dismiss();
          } else if (reactMounted()) {
            if (observer) { observer.disconnect(); observer = null; }
            if (pollId)   { clearInterval(pollId); pollId = 0; }
            setTimeout(dismiss, INTRO_TOTAL - elapsed);
          }
        }
        if (rootEl && 'MutationObserver' in window) {
          observer = new MutationObserver(tryDismiss);
          observer.observe(rootEl, { childList: true, subtree: false });
        }
        setTimeout(function () {
          tryDismiss();
          if (!dismissed) pollId = setInterval(tryDismiss, 100);
        }, INTRO_TOTAL);
        setTimeout(dismiss, 10000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
