    <style>
      html, body { background: #0e0e0e; margin: 0; padding: 0; }

      /* ── Inline solar-system startup intro ─────────────────────────────
         Lives in index.html so it paints on the FIRST frame, before any
         JS bundle has to download/parse/mount. Auto-dismisses after ~5s.
      ────────────────────────────────────────────────────────────────── */
      #solar-intro {
        position: fixed; inset: 0; z-index: 2147483647;
        background: #0e0e0e;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
        pointer-events: none; /* never block hub taps */
        opacity: 1;
        transition: opacity 600ms cubic-bezier(0.4,0,0.2,1);
      }
      #solar-intro.dismissing { opacity: 0; }
      #solar-intro.dismissed   { display: none; }

      /* Center nebula glow */
      #solar-glow {
        position: absolute; width: 280px; height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(120,140,255,0.22) 0%, rgba(120,140,255,0.06) 45%, transparent 70%);
        animation: solar-glow-pulse 3.5s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes solar-glow-pulse {
        0%,100% { transform: scale(1);    opacity: 0.85; }
        50%     { transform: scale(1.12); opacity: 1;    }
      }

      /* Dashed orbit ring */
      #solar-ring {
        position: absolute;
        width: 256px; height: 256px;
        border-radius: 50%;
        border: 1px dashed rgba(255,255,255,0.18);
        opacity: 0;
        animation: solar-ring-in 600ms 200ms ease-out forwards;
        pointer-events: none;
      }
      @keyframes solar-ring-in {
        from { opacity: 0; transform: scale(0.85); }
        to   { opacity: 1; transform: scale(1);    }
      }

      /* Center wordmark */
      #solar-wordmark {
        position: relative; z-index: 3;
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        opacity: 0;
        animation: solar-wordmark-in 700ms 150ms cubic-bezier(0.34,1.56,0.64,1) forwards;
        font-family: Manrope, system-ui, -apple-system, sans-serif;
      }
      @keyframes solar-wordmark-in {
        from { opacity: 0; transform: scale(0.4); }
        to   { opacity: 1; transform: scale(1);   }
      }
      #solar-wordmark .w-logo svg { display: block; }
      #solar-wordmark .w-title {
        font-size: 30px; font-weight: 800; color: #ffffff;
        letter-spacing: -0.03em; margin: 6px 0 0;
      }
      #solar-wordmark .w-sub {
        font-size: 11px; color: rgba(255,255,255,0.5);
        letter-spacing: 0.08em; margin: 0;
      }

      /* Orbit wrappers — each rotates around the center, planet sits at the rim */
      .orbit {
        position: absolute; width: 0; height: 0;
        animation: solar-orbit 4s linear infinite;
        opacity: 0;
        animation-fill-mode: both;
      }
      @keyframes solar-orbit {
        from { transform: rotate(0deg);   }
        to   { transform: rotate(360deg); }
      }
      .planet {
        position: absolute;
        top: -128px; /* orbit radius */
        left: -20px; width: 40px; height: 40px;
        border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        animation: solar-planet-in 500ms ease-out both;
      }
      @keyframes solar-planet-in {
        from { opacity: 0; transform: scale(0.4); }
        to   { opacity: 1; transform: scale(1);   }
      }
      .planet.studio {
        width: 50px; height: 50px; border-radius: 16px; left: -25px; top: -132px;
        background: rgba(120,140,255,0.15);
        border: 1px solid rgba(120,140,255,0.4);
        box-shadow: 0 0 22px 8px rgba(120,140,255,0.32), 0 0 48px 20px rgba(120,140,255,0.12);
      }
      .planet svg { width: 22px; height: 22px; }
      .planet.studio svg { width: 26px; height: 26px; }

      /* Per-planet rotation offsets so they're evenly spaced on the ring.
         The orbit animation runs continuously; we shift each one by setting
         a negative animation-delay equal to its share of the period. */
      .orbit.p1 { animation-delay: -0s;     }
      .orbit.p2 { animation-delay: -0.667s; }
      .orbit.p3 { animation-delay: -1.333s; }
      .orbit.p4 { animation-delay: -2s;     }
      .orbit.p5 { animation-delay: -2.667s; }
      .orbit.p6 { animation-delay: -3.333s; }

      /* Staggered fade-in for each orbit (separate animation runs alongside) */
      .orbit { animation: solar-orbit 4s linear infinite, solar-orbit-fade-in 400ms ease-out forwards; }
      .orbit.p1 { animation-delay: -0s,     200ms; }
      .orbit.p2 { animation-delay: -0.667s, 290ms; }
      .orbit.p3 { animation-delay: -1.333s, 380ms; }
      .orbit.p4 { animation-delay: -2s,     470ms; }
      .orbit.p5 { animation-delay: -2.667s, 560ms; }
      .orbit.p6 { animation-delay: -3.333s, 650ms; }
      @keyframes solar-orbit-fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* Color tints per planet */
      .planet.chordex { box-shadow: 0 0 12px 3px rgba(139,92,246,0.4); border-color: rgba(139,92,246,0.5); }
      .planet.drumex  { box-shadow: 0 0 12px 3px rgba(249,115,22,0.4); border-color: rgba(249,115,22,0.5); }
      .planet.stagex  { box-shadow: 0 0 12px 3px rgba(245,158,11,0.4); border-color: rgba(245,158,11,0.5); }
      .planet.groovex { box-shadow: 0 0 12px 3px rgba(16,185,129,0.4); border-color: rgba(16,185,129,0.5); }
      .planet.vocalex { box-shadow: 0 0 12px 3px rgba(59,130,246,0.4); border-color: rgba(59,130,246,0.5); }

      @media (prefers-reduced-motion: reduce) {
        /* Disable orbits, glow pulse, and entrance animations entirely;
           the inline script will still dismiss the overlay early. */
        #solar-intro,
        #solar-intro * {
          animation: none !important;
          transition: opacity 200ms linear !important;
        }
        .orbit, .planet, #solar-wordmark, #solar-ring { opacity: 1 !important; }
      }

    <div id="root"></div>
    <script>
      // Dismiss the overlay when BOTH: (a) a minimum visible time has
      // elapsed so the animation isn't cut short, AND (b) React has actually
      // mounted the hub (so we never reveal a blank/gray screen during
      // bundle parse). A safety timeout dismisses no matter what at 10s.
      (function () {
        var MIN_VISIBLE_MS = 3800; // keep intro on screen at least this long
        var SAFETY_MS      = 10000;
        var startedAt      = Date.now();
        var rootEl         = document.getElementById('root');
        var overlayEl      = document.getElementById('solar-intro');
        if (!overlayEl) return;

        var dismissed = false;
        var observer  = null;
        var pollId    = 0;
        function dismiss() {
          if (dismissed) return;
          dismissed = true;
          if (observer) { observer.disconnect(); observer = null; }
          if (pollId)   { clearInterval(pollId); pollId = 0; }
          overlayEl.classList.add('dismissing');
          setTimeout(function () {
            overlayEl.classList.add('dismissed');
            if (overlayEl.parentNode) overlayEl.parentNode.removeChild(overlayEl);
          }, 650);
        }

        function reactMounted() {
          return !!(rootEl && rootEl.children && rootEl.children.length > 0);
        }

        function tryDismiss() {
          if (dismissed) return;
          var elapsed = Date.now() - startedAt;
          if (reactMounted() && elapsed >= MIN_VISIBLE_MS) {
            dismiss();
          } else if (reactMounted()) {
            // React is ready early — wait out the remaining min-visible time.
            if (observer) { observer.disconnect(); observer = null; }
            if (pollId)   { clearInterval(pollId); pollId = 0; }
            setTimeout(dismiss, MIN_VISIBLE_MS - elapsed);
          }
        }

        if (rootEl && 'MutationObserver' in window) {
          observer = new MutationObserver(tryDismiss);
          observer.observe(rootEl, { childList: true, subtree: false });
        }
        // After min-visible time, poll #root every 100ms so we dismiss
        // promptly once React mounts (works even without MutationObserver).
        setTimeout(function () {
          tryDismiss();
          if (!dismissed) pollId = setInterval(tryDismiss, 100);
        }, MIN_VISIBLE_MS);
        // Hard safety net: dismiss no matter what.
        setTimeout(dismiss, SAFETY_MS);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
