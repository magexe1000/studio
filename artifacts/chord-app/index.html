    <style>
      html, body { background: #0e0e0e; margin: 0; padding: 0; }

      /* ── Inline floating-icons startup intro ───────────────────────────
         Animata-style: a central Studio logo with scattered, gently-floating
         app icons (with labels) drifting around it. After ~2.8s the icons
         glide into a left-aligned vertical column — the same arrangement
         they'll appear in inside the hub's app list — then the overlay
         fades out, revealing the real hub already in place.
         Lives inline in index.html so it paints on the FIRST frame.
      ────────────────────────────────────────────────────────────────── */
      #solar-intro {
        position: fixed; inset: 0; z-index: 2147483647;
        background:
          radial-gradient(ellipse at center, #15151c 0%, #0b0b0f 70%, #050507 100%);
        overflow: hidden;
        pointer-events: none;
        opacity: 1;
        transition: opacity 600ms cubic-bezier(0.4,0,0.2,1);
        font-family: Manrope, system-ui, -apple-system, sans-serif;
      }
      #solar-intro.dismissing { opacity: 0; }
      #solar-intro.dismissed   { display: none; }

      /* Soft purple/blue nebula behind everything */
      #intro-glow {
        position: absolute; top: 50%; left: 50%;
        width: 480px; height: 480px;
        margin: -240px 0 0 -240px;
        background: radial-gradient(circle,
          rgba(120,110,255,0.22) 0%,
          rgba(80,90,200,0.10) 40%,
          transparent 70%);
        border-radius: 50%;
        animation: intro-glow-pulse 5s ease-in-out infinite;
        filter: blur(10px);
      }
      @keyframes intro-glow-pulse {
        0%,100% { transform: scale(1);    opacity: 0.85; }
        50%     { transform: scale(1.15); opacity: 1;    }
      }

      /* Tiny twinkling stars layer */
      #intro-stars {
        position: absolute; inset: 0;
        background-image:
          radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.7) 50%, transparent),
          radial-gradient(1px 1px at 78% 22%, rgba(255,255,255,0.5) 50%, transparent),
          radial-gradient(1.5px 1.5px at 30% 78%, rgba(255,255,255,0.6) 50%, transparent),
          radial-gradient(1px 1px at 88% 70%, rgba(255,255,255,0.7) 50%, transparent),
          radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,0.4) 50%, transparent),
          radial-gradient(1px 1px at 8% 60%, rgba(255,255,255,0.5) 50%, transparent),
          radial-gradient(1.5px 1.5px at 65% 85%, rgba(255,255,255,0.55) 50%, transparent),
          radial-gradient(1px 1px at 42% 38%, rgba(255,255,255,0.35) 50%, transparent);
        animation: intro-stars-twinkle 4s ease-in-out infinite;
        opacity: 0.7;
      }
      @keyframes intro-stars-twinkle {
        0%,100% { opacity: 0.5; }
        50%     { opacity: 0.95; }
      }

      /* Central Studio logo + title */
      #intro-center {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        display: flex; flex-direction: column; align-items: center;
        gap: 12px;
        z-index: 3;
        animation: intro-center-life 4400ms cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes intro-center-life {
        0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
        12%  { opacity: 1; transform: translate(-50%, -50%) scale(1);   }
        62%  { opacity: 1; transform: translate(-50%, -50%) scale(1);   }
        85%  { opacity: 0; transform: translate(-50%, calc(-50% - 30px)) scale(0.7); }
        100% { opacity: 0; transform: translate(-50%, calc(-50% - 30px)) scale(0.7); }
      }
      #intro-center .pill {
        width: 88px; height: 88px; border-radius: 26px;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #7c83ff 0%, #5560e0 100%);
        box-shadow:
          0 0 32px 10px rgba(120,140,255,0.45),
          0 0 80px 30px rgba(120,140,255,0.18),
          inset 0 1px 0 rgba(255,255,255,0.25);
        animation: intro-center-bob 3.2s ease-in-out infinite;
      }
      @keyframes intro-center-bob {
        0%,100% { transform: translateY(0); }
        50%     { transform: translateY(-6px); }
      }
      #intro-center .pill svg { width: 44px; height: 44px; }
      #intro-center .title {
        font-size: 26px; font-weight: 800; color: #ffffff;
        letter-spacing: -0.02em; margin: 4px 0 0;
        text-shadow: 0 2px 18px rgba(120,140,255,0.4);
      }
      #intro-center .sub {
        font-size: 11px; color: rgba(255,255,255,0.55);
        letter-spacing: 0.14em; margin: 0; text-transform: uppercase;
      }

      /* ── Floating app-icon slots ────────────────────────────────────
         Each slot has its OWN keyframe that runs the full intro lifecycle:
           0–8%   appear from center
           8–62%  float at scatter position (gentle drift via interpolation)
           62–82% glide to final stacked column position
           82–100% sit in column, then fade with overlay
         Self-contained so we don't fight conflicting CSS transforms.
      ─────────────────────────────────────────────────────────────── */
      .slot {
        position: absolute; top: 50%; left: 50%;
        z-index: 2;
        display: flex; align-items: center; gap: 10px;
        opacity: 0;
        animation-duration: 4400ms;
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        animation-fill-mode: forwards;
      }
      .slot .label {
        font-size: 12px; font-weight: 600;
        color: rgba(255,255,255,0.85);
        letter-spacing: -0.01em;
        white-space: nowrap;
        text-shadow: 0 1px 8px rgba(0,0,0,0.6);
        animation: intro-label-life 4400ms ease-out forwards;
        opacity: 0;
      }
      .slot.label-left { flex-direction: row-reverse; }
      @keyframes intro-label-life {
        0%   { opacity: 0; }
        12%  { opacity: 0; }
        20%  { opacity: 1; }
        62%  { opacity: 1; }
        70%  { opacity: 0; }
        100% { opacity: 0; }
      }

      .icon {
        width: 46px; height: 46px; border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(20, 22, 32, 0.72);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.10);
        box-shadow: 0 6px 18px rgba(0,0,0,0.45);
      }
      .icon svg { width: 24px; height: 24px; }

      /* Per-app accent rings */
      .icon.chordex { border-color: rgba(139, 92, 246, 0.55); box-shadow: 0 0 18px 2px rgba(139,92,246,0.35), 0 6px 18px rgba(0,0,0,0.5); }
      .icon.drumex  { border-color: rgba(249, 115,  22, 0.55); box-shadow: 0 0 18px 2px rgba(249,115,22,0.35), 0 6px 18px rgba(0,0,0,0.5); }
      .icon.stagex  { border-color: rgba(245, 158,  11, 0.55); box-shadow: 0 0 18px 2px rgba(245,158,11,0.35), 0 6px 18px rgba(0,0,0,0.5); }
      .icon.groovex { border-color: rgba( 16, 185, 129, 0.55); box-shadow: 0 0 18px 2px rgba(16,185,129,0.35), 0 6px 18px rgba(0,0,0,0.5); }
      .icon.vocalex { border-color: rgba( 59, 130, 246, 0.55); box-shadow: 0 0 18px 2px rgba(59,130,246,0.35), 0 6px 18px rgba(0,0,0,0.5); }

      /* ── Per-slot lifecycle keyframes ─────────────────────────────────
         Final positions: a single vertical column at x = -130px (relative
         to viewport center) — this lines up with the hub's left-side icon
         column once the overlay fades. Spacing 66px ≈ hub row height.
      ─────────────────────────────────────────────────────────────────── */

      /* CHORDEX — top-left scatter, settles row 1 (y=-132) */
      .slot.s-chordex { animation-name: slot-chordex; }
      @keyframes slot-chordex {
        0%    { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
        8%    { opacity: 1; transform: translate(calc(-50% - 110px), calc(-50% - 140px)) scale(1); }
        25%   { transform: translate(calc(-50% - 118px), calc(-50% - 130px)) scale(1); }
        45%   { transform: translate(calc(-50% - 102px), calc(-50% - 152px)) scale(1); }
        62%   { transform: translate(calc(-50% - 110px), calc(-50% - 140px)) scale(1); }
        80%   { transform: translate(calc(-50% - 130px), calc(-50% - 132px)) scale(0.92); }
        92%   { opacity: 1; }
        100%  { opacity: 1; transform: translate(calc(-50% - 130px), calc(-50% - 132px)) scale(0.92); }
      }
      /* DRUMEX — top-right scatter, settles row 2 (y=-66) */
      .slot.s-drumex { animation-name: slot-drumex; }
      @keyframes slot-drumex {
        0%    { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
        10%   { opacity: 1; transform: translate(calc(-50% + 110px), calc(-50% - 110px)) scale(1); }
        30%   { transform: translate(calc(-50% + 120px), calc(-50% - 96px)) scale(1); }
        50%   { transform: translate(calc(-50% + 100px), calc(-50% - 120px)) scale(1); }
        62%   { transform: translate(calc(-50% + 110px), calc(-50% - 110px)) scale(1); }
        80%   { transform: translate(calc(-50% - 130px), calc(-50% - 66px)) scale(0.92); }
        100%  { opacity: 1; transform: translate(calc(-50% - 130px), calc(-50% - 66px)) scale(0.92); }
      }
      /* STAGEX — right scatter, settles row 3 (y=0) */
      .slot.s-stagex { animation-name: slot-stagex; }
      @keyframes slot-stagex {
        0%    { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
        12%   { opacity: 1; transform: translate(calc(-50% + 140px), calc(-50% + 30px)) scale(1); }
        32%   { transform: translate(calc(-50% + 148px), calc(-50% + 42px)) scale(1); }
        52%   { transform: translate(calc(-50% + 132px), calc(-50% + 18px)) scale(1); }
        62%   { transform: translate(calc(-50% + 140px), calc(-50% + 30px)) scale(1); }
        80%   { transform: translate(calc(-50% - 130px), calc(-50% + 0px)) scale(0.92); }
        100%  { opacity: 1; transform: translate(calc(-50% - 130px), calc(-50% + 0px)) scale(0.92); }
      }
      /* GROOVEX — bottom-left scatter, settles row 4 (y=66) */
      .slot.s-groovex { animation-name: slot-groovex; }
      @keyframes slot-groovex {
        0%    { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
        14%   { opacity: 1; transform: translate(calc(-50% - 130px), calc(-50% + 100px)) scale(1); }
        34%   { transform: translate(calc(-50% - 140px), calc(-50% + 88px)) scale(1); }
        54%   { transform: translate(calc(-50% - 122px), calc(-50% + 112px)) scale(1); }
        62%   { transform: translate(calc(-50% - 130px), calc(-50% + 100px)) scale(1); }
        80%   { transform: translate(calc(-50% - 130px), calc(-50% + 66px)) scale(0.92); }
        100%  { opacity: 1; transform: translate(calc(-50% - 130px), calc(-50% + 66px)) scale(0.92); }
      }
      /* VOCALEX — bottom-right scatter, settles row 5 (y=132) */
      .slot.s-vocalex { animation-name: slot-vocalex; }
      @keyframes slot-vocalex {
        0%    { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
        16%   { opacity: 1; transform: translate(calc(-50% + 80px), calc(-50% + 150px)) scale(1); }
        36%   { transform: translate(calc(-50% + 92px), calc(-50% + 138px)) scale(1); }
        56%   { transform: translate(calc(-50% + 72px), calc(-50% + 162px)) scale(1); }
        62%   { transform: translate(calc(-50% + 80px), calc(-50% + 150px)) scale(1); }
        80%   { transform: translate(calc(-50% - 130px), calc(-50% + 132px)) scale(0.92); }
        100%  { opacity: 1; transform: translate(calc(-50% - 130px), calc(-50% + 132px)) scale(0.92); }
      }

      @media (prefers-reduced-motion: reduce) {
        #solar-intro, #solar-intro * {
          animation: none !important;
          transition: opacity 200ms linear !important;
        }
        .slot, #intro-center, .slot .label { opacity: 1 !important; }
      }
    </style>

  <body>
    <div id="solar-intro" aria-hidden="true">
      <div id="intro-stars"></div>
      <div id="intro-glow"></div>

      <!-- Central Studio logo -->

        </div>

        <div class="icon vocalex">
          <svg viewBox="0 0 24 24" fill="none"><rect x="9" y="3" width="6" height="12" rx="3" fill="rgba(255,255,255,0.95)"/><path d="M6 12a6 6 0 0 0 12 0M12 18v3" stroke="rgba(255,255,255,0.95)" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <span class="label">Vocalex</span>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Dismiss the overlay when BOTH: (a) the intro animation has had at
      // least its minimum visible time, AND (b) React has actually mounted
      // the hub (so we never reveal a blank/gray screen during bundle
      // parse). A safety timeout dismisses no matter what at 10s.
      (function () {
        var MIN_VISIBLE_MS = 4400; // full intro length (matches keyframes)
        var SAFETY_MS      = 10000;
        var startedAt      = Date.now();
        var rootEl         = document.getElementById('root');
        var overlayEl      = document.getElementById('solar-intro');
        if (!overlayEl) return;

        var dismissed = false;
        var observer  = null;
        var pollId    = 0;
        function dismiss() {
          if (dismissed) return;
          dismissed = true;
          if (observer) { observer.disconnect(); observer = null; }
          if (pollId)   { clearInterval(pollId); pollId = 0; }
          overlayEl.classList.add('dismissing');
          setTimeout(function () {
            overlayEl.classList.add('dismissed');
            if (overlayEl.parentNode) overlayEl.parentNode.removeChild(overlayEl);
          }, 650);
        }

        function reactMounted() {
          return !!(rootEl && rootEl.children && rootEl.children.length > 0);
        }

        function tryDismiss() {
          if (dismissed) return;
          var elapsed = Date.now() - startedAt;
          if (reactMounted() && elapsed >= MIN_VISIBLE_MS) {
            dismiss();
          } else if (reactMounted()) {
            if (observer) { observer.disconnect(); observer = null; }
            if (pollId)   { clearInterval(pollId); pollId = 0; }
            setTimeout(dismiss, MIN_VISIBLE_MS - elapsed);
          }
        }

        if (rootEl && 'MutationObserver' in window) {
          observer = new MutationObserver(tryDismiss);
          observer.observe(rootEl, { childList: true, subtree: false });
        }
        setTimeout(function () {
          tryDismiss();
          if (!dismissed) pollId = setInterval(tryDismiss, 100);
        }, MIN_VISIBLE_MS);
        setTimeout(dismiss, SAFETY_MS);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
