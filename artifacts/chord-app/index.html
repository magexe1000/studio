<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Chordex</title>
    <meta name="description" content="Chord reference and song preset tool for musicians" />
    <meta name="theme-color" content="#111116" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chordex" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icon-512.svg" />
    <link rel="apple-touch-icon" href="./icon-512.svg" />
    <style>
      html, body { background: #000000; margin: 0; padding: 0; }
      #html-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #000000;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
      }
      #html-splash-logo {
        opacity: 0;
        transform: scale(0.48) translateY(10px);
        transition: opacity 620ms cubic-bezier(0.34,1.56,0.64,1),
                    transform 620ms cubic-bezier(0.34,1.56,0.64,1);
      }
      #html-splash-word {
        opacity: 0;
        transform: translateY(7px);
        transition: opacity 500ms cubic-bezier(0.25,0.46,0.45,0.94),
                    transform 500ms cubic-bezier(0.25,0.46,0.45,0.94);
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: bold; font-size: 28px;
        letter-spacing: -0.02em; color: #ffffff; margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="html-splash">
      <div id="html-splash-logo">
        <svg width="64" height="84" viewBox="0 0 13 17" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0.5" y="0.5" width="12" height="2.5" rx="1" fill="white"/>
          <line x1="2.5"  y1="3" x2="2.5"  y2="16.5" stroke="white" stroke-width="0.9" stroke-opacity="0.35"/>
          <line x1="6.5"  y1="3" x2="6.5"  y2="16.5" stroke="white" stroke-width="0.9" stroke-opacity="0.35"/>
          <line x1="10.5" y1="3" x2="10.5" y2="16.5" stroke="white" stroke-width="0.9" stroke-opacity="0.35"/>
          <line x1="0.5"  y1="8"  x2="12.5" y2="8"  stroke="white" stroke-width="0.7" stroke-opacity="0.28"/>
          <line x1="0.5"  y1="13" x2="12.5" y2="13" stroke="white" stroke-width="0.7" stroke-opacity="0.28"/>
          <circle cx="2.5"  cy="5.5"  r="2.1" fill="white"/>
          <circle cx="10.5" cy="5.5"  r="2.1" fill="white"/>
          <circle cx="6.5"  cy="10.5" r="2.1" fill="white"/>
        </svg>
      </div>
      <p id="html-splash-word">Chordex</p>
    </div>
    <div id="root"></div>
    <script>
      var splash = document.getElementById('html-splash');
      var logo   = document.getElementById('html-splash-logo');
      var word   = document.getElementById('html-splash-word');

      // Double rAF ensures we fire on the first actual painted frame —
      // exactly when the Android native splash dismisses and the WebView
      // becomes visible to the user.
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          // Animate logo in
          logo.style.opacity   = '1';
          logo.style.transform = 'scale(1) translateY(0)';

          // Animate wordmark in after logo starts
          setTimeout(function() {
            word.style.opacity   = '1';
            word.style.transform = 'translateY(0)';
          }, 220);

          // Fade the whole splash out after holding
          setTimeout(function() {
            splash.style.transition = 'opacity 440ms cubic-bezier(0.4,0,0.2,1)';
            splash.style.opacity    = '0';
            setTimeout(function() { splash.style.display = 'none'; }, 440);
          }, 1200);
        });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
