<!DOCTYPE html>
<!-- v2 -->
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Studio</title>
    <meta name="description" content="Studio — Chordex & Drumex, your complete music toolkit" />
    <meta name="theme-color" content="#111116" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Studio" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icon-512.svg" />
    <link rel="apple-touch-icon" href="./icon-512.svg" />
    <!-- Material Symbols (subsetted to only the icons the app uses).
         Replaces the 3.8 MB local material-symbols woff2; this fetch is
         typically <30 KB and is cached aggressively by Google's CDN. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=account_circle,add,add_circle,album,arrow_back,arrow_forward,arrow_forward_ios,auto_awesome,auto_fix_high,bookmark_add,casino,check,check_circle,chevron_left,chevron_right,close,cloud_download,content_copy,dark_mode,data_object,delete,delete_forever,download,drag_indicator,edit,error,expand_less,expand_more,file_download,graphic_eq,grid_view,horizontal_rule,info,insights,ios_share,library_music,logout,mic,mic_none,more_vert,music_note,picture_as_pdf,play_arrow,play_circle,playlist_add,progress_activity,queue_music,redo,refresh,remove,restart_alt,save,science,search,search_off,segment,sort,speed,stop,swap_horiz,tune,undo,upload_file,video_library,warning&display=block"
    />
    <style>
      html, body { background: #0e0e0e; margin: 0; padding: 0; }
      #html-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #000000;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        pointer-events: none;
      }
      #html-splash-logo {
        opacity: 0;
        transform: scale(0.48) translateY(10px);
        transition: opacity 620ms cubic-bezier(0.34,1.56,0.64,1),
                    transform 620ms cubic-bezier(0.34,1.56,0.64,1);
      }
      #html-splash-text { text-align: center; }
      #html-splash-word {
        opacity: 0;
        transform: translateY(7px);
        transition: opacity 500ms cubic-bezier(0.25,0.46,0.45,0.94),
                    transform 500ms cubic-bezier(0.25,0.46,0.45,0.94);
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: bold; font-size: 28px;
        letter-spacing: -0.02em; color: #ffffff; margin: 0 0 5px;
      }
      #html-splash-sub {
        opacity: 0;
        transform: translateY(5px);
        transition: opacity 500ms 60ms cubic-bezier(0.25,0.46,0.45,0.94),
                    transform 500ms 60ms cubic-bezier(0.25,0.46,0.45,0.94);
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: normal; font-size: 13px;
        letter-spacing: 0.08em; color: rgba(255,255,255,0.38); margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="html-splash">
      <div id="html-splash-logo">
        <!-- Studio logo: sine wave mark -->
        <svg width="72" height="72" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M 72 256 C 128 60 192 60 256 256 S 384 452 440 256"
            stroke="white" stroke-width="44"
            stroke-linecap="round" stroke-linejoin="round" fill="none"
          />
        </svg>
      </div>
      <div id="html-splash-text">
        <p id="html-splash-word">Studio</p>
        <p id="html-splash-sub">by Mag</p>
      </div>
    </div>
    <div id="root"></div>
    <script>
      var splash = document.getElementById('html-splash');
      var logo   = document.getElementById('html-splash-logo');
      var word   = document.getElementById('html-splash-word');
      var sub    = document.getElementById('html-splash-sub');

      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          logo.style.opacity   = '1';
          logo.style.transform = 'scale(1) translateY(0)';

          setTimeout(function() {
            word.style.opacity   = '1';
            word.style.transform = 'translateY(0)';
            sub.style.opacity    = '1';
            sub.style.transform  = 'translateY(0)';
          }, 220);

          setTimeout(function() {
            splash.style.transition = 'opacity 440ms cubic-bezier(0.4,0,0.2,1)';
            splash.style.opacity    = '0';
            setTimeout(function() { splash.style.display = 'none'; }, 440);
          }, 1200);
        });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
