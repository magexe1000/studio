<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#131313",
                        "on-secondary-fixed-variant": "#5a5b63",
                        "surface-container-highest": "#252626",
                        "on-surface-variant": "#acabaa",
                        "tertiary-fixed": "#007aff",
                        "outline-variant": "#484848",
                        "inverse-on-surface": "#565555",
                        "tertiary-fixed-dim": "#006ee6",
                        "on-secondary": "#1e2027",
                        "surface-tint": "#c6c6c7",
                        "secondary-dim": "#9d9da6",
                        "outline": "#767575",
                        "on-primary-fixed-variant": "#5a5c5c",
                        "on-tertiary-fixed": "#ffffff",
                        "primary-fixed-dim": "#d4d4d4",
                        "on-tertiary-container": "#000000",
                        "surface-bright": "#2c2c2c",
                        "on-error-container": "#ff9993",
                        "on-primary-container": "#d0d0d0",
                        "on-tertiary-fixed-variant": "#f8f8ff",
                        "secondary-fixed-dim": "#d4d3dd",
                        "secondary": "#9d9da6",
                        "on-secondary-fixed": "#3e3f46",
                        "inverse-primary": "#5e5f60",
                        "surface-dim": "#0e0e0e",
                        "surface": "#0e0e0e",
                        "tertiary": "#679cff",
                        "on-surface": "#e7e5e4",
                        "on-primary-fixed": "#3e4040",
                        "primary-fixed": "#e2e2e2",
                        "on-tertiary": "#001f4a",
                        "inverse-surface": "#fcf9f8",
                        "tertiary-dim": "#0070eb",
                        "error-dim": "#bb5551",
                        "secondary-container": "#3a3b42",
                        "on-secondary-container": "#bfbec8",
                        "primary-container": "#454747",
                        "on-background": "#e7e5e4",
                        "error-container": "#7f2927",
                        "secondary-fixed": "#e2e1eb",
                        "on-primary": "#3f4041",
                        "primary-fixed": "#e2e2e2",
                        "on-error": "#490106",
                        "surface-container": "#191a1a",
                        "error": "#ee7d77",
                        "surface-container-lowest": "#000000",
                        "background": "#0e0e0e",
                        "surface-variant": "#252626",
                        "surface-container-high": "#1f2020",
                        "tertiary-container": "#007aff",
                        "primary": "#c6c6c7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pitch-glow {
            box-shadow: 0 0 60px -15px rgba(103, 156, 255, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-tertiary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e] h-16 flex justify-between items-center px-6 font-manrope tracking-tight text-on-surface">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#007AFF]" style="font-size: 24px;">mic_external_on</span>
<span class="text-2xl font-bold tracking-tighter text-[#e7e5e4]">Vocalex</span>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-[#1f2020] transition-colors p-2 rounded-full">settings</button>
<div class="w-8 h-8 rounded-full bg-surface-container-high border border-outline-variant/20 flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="close-up professional portrait of a singer in a studio with soft blue ambient lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAieUHO1ZyxBiTiy2caFX65uRL4KHhDeoAQT5YdzLtDJ8lsDSp1eiRb09xsDnVYkXrYmlc7WSIQKHOaH-_iLR8ur1dC6_PeIGwkMhH28iOwQLy94FiTCrfqVzM831iZOPbELGzAn63v7uQuN4O-GKYcUXVJ5iceXkRar_3rS-wymCJXvbkCundoTLh0sxDy-s3z7ScTsR10UJBO6OD7Fmy8VFl-suw4xQQXMpItqpuhejAhRqqqtm5aa0RHrFQ5lU59MBKqo086Q"/>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto min-h-screen flex flex-col items-center">
<!-- Pitch Monitor Display -->
<div class="w-full aspect-square flex flex-col items-center justify-center relative mb-12">
<!-- Background Decorative Glows -->
<div class="absolute inset-0 bg-tertiary/5 rounded-full blur-[120px]"></div>
<!-- Circular Tuning Gauge -->
<div class="absolute inset-0 flex items-center justify-center">
<svg class="w-full h-full -rotate-90 transform" viewbox="0 0 100 100">
<!-- Gauge Track -->
<circle class="text-outline-variant/30" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-width="0.5"></circle>
<!-- Centered "In Tune" Zone -->
<path class="text-tertiary" d="M 50 5 A 45 45 0 0 1 54.7 5.2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="4"></path>
<path class="text-tertiary" d="M 50 5 A 45 45 0 0 0 45.3 5.2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="4"></path>
</svg>
</div>
<!-- Main Pitch Reading -->
<div class="text-center z-10">
<p class="font-label text-sm font-medium text-on-surface-variant tracking-[0.2em] mb-2">CURRENT NOTE</p>
<h1 class="text-8xl font-headline font-extrabold tracking-tighter text-on-surface">A#3</h1>
<div class="flex items-center justify-center gap-2 mt-4">
<span class="font-label text-xs font-semibold text-tertiary px-3 py-1 bg-tertiary/10 rounded-full border border-tertiary/20">IN TUNE</span>
</div>
</div>
<!-- Tuning Needle (Floating) -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-1 h-12 flex flex-col items-center">
<div class="w-1.5 h-1.5 rounded-full bg-tertiary"></div>
<div class="w-0.5 h-full bg-gradient-to-b from-tertiary to-transparent"></div>
</div>
</div>
<!-- Feedback & Analytics Bento -->
<div class="grid grid-cols-2 gap-4 w-full">
<!-- Frequency Detail -->
<div class="col-span-1 bg-surface-container rounded-xl p-5 border-l-2 border-tertiary">
<p class="font-label text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">Frequency</p>
<p class="text-2xl font-headline font-bold text-on-surface">233.08 <span class="text-sm font-normal text-on-surface-variant">Hz</span></p>
</div>
<!-- Cent Deviation -->
<div class="col-span-1 bg-surface-container rounded-xl p-5">
<p class="font-label text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-1">Precision</p>
<p class="text-2xl font-headline font-bold text-on-surface">-1.2 <span class="text-sm font-normal text-on-surface-variant">cents</span></p>
</div>
<!-- Real-time Waveform Preview -->
<div class="col-span-2 bg-surface-container-high rounded-xl p-4 overflow-hidden relative h-24">
<div class="flex items-end justify-between h-full gap-1 opacity-50">
<div class="w-full h-[40%] bg-outline-variant rounded-full"></div>
<div class="w-full h-[60%] bg-outline-variant rounded-full"></div>
<div class="w-full h-[85%] bg-tertiary rounded-full"></div>
<div class="w-full h-[70%] bg-tertiary rounded-full"></div>
<div class="w-full h-[95%] bg-tertiary rounded-full"></div>
<div class="w-full h-[50%] bg-outline-variant rounded-full"></div>
<div class="w-full h-[30%] bg-outline-variant rounded-full"></div>
<div class="w-full h-[65%] bg-outline-variant rounded-full"></div>
<div class="w-full h-[80%] bg-tertiary rounded-full"></div>
<div class="w-full h-[45%] bg-outline-variant rounded-full"></div>
<div class="w-full h-[20%] bg-outline-variant rounded-full"></div>
<div class="w-full h-[55%] bg-outline-variant rounded-full"></div>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-high via-transparent to-transparent"></div>
</div>
</div>
<!-- Action Controls -->
<div class="mt-8 flex gap-4 w-full">
<button class="flex-1 bg-primary-container text-on-primary-container h-14 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-surface-bright transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined">restart_alt</span>
                Reset
            </button>
<button class="flex-[2] bg-tertiary text-on-tertiary h-14 rounded-full font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-all active:scale-95 duration-200 shadow-lg shadow-tertiary/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
                Capture Take
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-[#0e0e0e]/80 backdrop-blur-xl shadow-[0_-4px_20px_rgba(0,0,0,0.4)]">
<div class="flex justify-around items-center h-20 w-full px-4">
<!-- Practice -->
<a class="flex flex-col items-center justify-center text-[#acabaa] hover:text-[#e7e5e4] transition-transform scale-95 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">music_note</span>
<span class="font-manrope text-[11px] font-semibold">Practice</span>
</a>
<!-- Pitch (Active) -->
<a class="flex flex-col items-center justify-center text-[#007AFF] font-bold bg-[#1f2020] rounded-xl px-3 py-1 transition-transform scale-95 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="font-manrope text-[11px] font-semibold">Pitch</span>
</a>
<!-- Vocal Lab -->
<a class="flex flex-col items-center justify-center text-[#acabaa] hover:text-[#e7e5e4] transition-transform scale-95 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">fitness_center</span>
<span class="font-manrope text-[11px] font-semibold">Vocal Lab</span>
</a>
<!-- Takes -->
<a class="flex flex-col items-center justify-center text-[#acabaa] hover:text-[#e7e5e4] transition-transform scale-95 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">library_music</span>
<span class="font-manrope text-[11px] font-semibold">Takes</span>
</a>
</div>
</nav>
</body></html>
