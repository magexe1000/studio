<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#3a3b42",
                    "surface-container-highest": "#252626",

                    "background": "#0e0e0e",
                    "on-primary-fixed": "#3e4040",
                    "on-error": "#490106",
                    "secondary-dim": "#9d9da6",

                    "on-tertiary": "#001f4a",
                    "primary-dim": "#b8b9b9",
                    "inverse-surface": "#fcf9f8",
                    "secondary-fixed": "#e2e1eb",

                    "error": "#ee7d77",
                    "on-secondary-container": "#bfbec8",
                    "outline": "#767575",
                    "inverse-primary": "#5e5f60",
                    "on-background": "#e7e5e4",

                    "primary-fixed": "#e2e2e2",
                    "surface-container-low": "#131313",

                    "on-surface-variant": "#acabaa",

                    "tertiary-fixed-dim": "#006ee6",
                    "on-secondary": "#1e2027",
                    "primary": "#c6c6c7",
                    "tertiary-dim": "#0070eb",
                    "surface-bright": "#2c2c2c",
                    "on-error-container": "#ff9993",
                    "on-tertiary-fixed-variant": "#f8f8ff",
                    "on-surface": "#e7e5e4",
                    "on-secondary-fixed": "#3e3f46",
                    "surface-tint": "#c6c6c7",

            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Inter"]
            }
          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .visualizer-glow {
            background: radial-gradient(circle, rgba(0, 122, 255, 0.25) 0%, rgba(14, 14, 14, 0) 70%);
        }
        .play-button-glow {
            box-shadow: 0 0 40px 0 rgba(0, 122, 255, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-tertiary selection:text-on-tertiary-container">
<!-- Top AppBar -->
<header class="bg-[#0e0e0e] flex justify-between items-center px-6 py-4 w-full fixed top-0 left-0 z-50">
<button class="text-[#007aff] hover:bg-[#1f2020] transition-colors active:scale-95 duration-200 rounded-full p-2">
<span class="material-symbols-outlined">keyboard_arrow_down</span>
</button>
<h1 class="font-['Manrope'] font-bold text-[#e7e5e4] tracking-tighter text-lg">Harmonic Mixer</h1>
<button class="text-[#007aff] hover:bg-[#1f2020] transition-colors active:scale-95 duration-200 rounded-full p-2">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<main class="pt-24 pb-40 px-6 max-w-lg mx-auto space-y-12">
<!-- Hero Visualizer Section -->
<section class="relative flex flex-col items-center">
<div class="relative w-72 h-72 mb-10 flex items-center justify-center">
<!-- Glowing Aura Background -->
<div class="absolute inset-0 visualizer-glow rounded-full scale-150"></div>
<!-- Main Artistic Element -->
<div class="relative w-64 h-64 rounded-xl overflow-hidden shadow-2xl z-10 border border-outline-variant/10">
<img alt="Abstract neon digital landscape" class="w-full h-full object-cover grayscale contrast-125" data-alt="abstract futuristic landscape with glowing neon geometric shapes and digital wireframes in deep blues and blacks" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOXR6-NaoQDPvHVG8O0wU6Qu4fOfbwP6iBneXZFQr7n5YejyMOvL9GnoIVbTkaLUvV5mJ5ryjvj7t0ntukK5hQ8XZuIFebY4pMCiBVD0BMIevDmWMjGTK00Lkf6KoHTw-2mrfJ6jxVdx6630Cc2xf5AOM0wzTDzjwWw6R9iPqpRmqnhXzFjmZcKvP_UX9sAmvNcr1islglJkrRVl4sUipuDXR1PFoAbgIo_Lc0So0qnS2LanVm1K89OTs2Ba4TXTt2TzF0Y1tvqA"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent opacity-60"></div>
</div>
<!-- Wave Visualizer Overlay (Decorative Bottom) -->
<div class="absolute bottom-4 left-0 right-0 h-16 flex items-end justify-center gap-1 z-20 px-4">
<div class="w-1 bg-tertiary h-8 rounded-full opacity-60"></div>
<div class="w-1 bg-tertiary h-12 rounded-full opacity-80"></div>
<div class="w-1 bg-tertiary h-6 rounded-full opacity-50"></div>
<div class="w-1 bg-tertiary h-14 rounded-full"></div>
<div class="w-1 bg-tertiary h-10 rounded-full opacity-70"></div>
<div class="w-1 bg-tertiary h-16 rounded-full"></div>
<div class="w-1 bg-tertiary h-12 rounded-full opacity-80"></div>
<div class="w-1 bg-tertiary h-8 rounded-full opacity-60"></div>
</div>
</div>
<!-- Song Identity -->
<div class="text-center space-y-2">
<h2 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface">Neon Cathedral</h2>
<p class="font-headline text-lg font-medium text-on-surface-variant">Aether Architect</p>
</div>
</section>
<!-- Transport Controls -->
<section class="flex items-center justify-center gap-8">
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-3xl">skip_previous</span>
</button>
<button class="w-20 h-20 rounded-full bg-gradient-to-br from-tertiary to-tertiary-container flex items-center justify-center text-white play-button-glow active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-3xl">skip_next</span>
</button>
</section>
<!-- Stems Mixer Section -->
<section class="space-y-6 pt-4">
<div class="flex items-center justify-between">
<h3 class="font-headline text-sm font-bold uppercase tracking-widest text-on-surface-variant">Stems Mixer</h3>
<button class="text-tertiary text-xs font-bold font-label uppercase tracking-wider">Reset All</button>
</div>
<div class="space-y-8 bg-surface-container rounded-xl p-6 shadow-sm">
<!-- Mixer Row: Drums -->
<div class="space-y-3">
<div class="flex items-center justify-between mb-1">
<span class="font-label text-xs font-bold text-on-surface tracking-wide">Drums</span>
<div class="flex gap-2">
<button class="w-8 h-8 rounded-lg bg-surface-container-high border border-outline-variant/20 flex items-center justify-center text-[10px] font-bold font-label hover:bg-surface-bright transition-colors">M</button>
<button class="w-8 h-8 rounded-lg bg-surface-container-high border border-outline-variant/20 flex items-center justify-center text-[10px] font-bold font-label hover:bg-tertiary/20 text-tertiary transition-colors">S</button>
</div>
</div>
<div class="relative h-2 w-full bg-surface-container-lowest rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-3/4 bg-gradient-to-r from-tertiary-container to-tertiary rounded-full"></div>
</div>
</div>
<!-- Mixer Row: Bass -->
<div class="space-y-3">
<div class="flex items-center justify-between mb-1">
<span class="font-label text-xs font-bold text-on-surface tracking-wide">Bass</span>
<div class="flex gap-2">
<button class="w-8 h-8 rounded-lg bg-surface-container-high border border-outline-variant/20 flex items-center justify-center text-[10px] font-bold font-label hover:bg-surface-bright transition-colors">M</button>
<button class="w-8 h-8 rounded-lg bg-surface-container-high border border-outline-variant/20 flex items-center justify-center text-[10px] font-bold font-label hover:bg-surface-bright transition-colors">S</button>
</div>
</div>
<div class="relative h-2 w-full bg-surface-container-lowest rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-[60%] bg-gradient-to-r from-tertiary-container to-tertiary rounded-full"></div>
</div>
</div>
<!-- Mixer Row: Guitar -->
<div class="space-y-3">
<div class="flex items-center justify-between mb-1">
<span class="font-label text-xs font-bold text-on-surface tracking-wide">Guitar</span>
<div class="flex gap-2">
<button class="w-8 h-8 rounded-lg bg-surface-container-high border border-outline-variant/20 flex items-center justify-center text-[10px] font-bold font-label hover:bg-surface-bright transition-colors">M</button>
<button class="w-8 h-8 rounded-lg bg-surface-container-high border border-outline-variant/20 flex items-center justify-center text-[10px] font-bold font-label hover:bg-surface-bright transition-colors">S</button>
</div>
</div>
<div class="relative h-2 w-full bg-surface-container-lowest rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-[85%] bg-gradient-to-r from-tertiary-container to-tertiary rounded-full"></div>
</div>
</div>
<!-- Mixer Row: Vocals -->
<div class="space-y-3">
<div class="flex items-center justify-between mb-1">
<span class="font-label text-xs font-bold text-on-surface tracking-wide">Vocals</span>
<div class="flex gap-2">
<button class="w-8 h-8 rounded-lg bg-surface-container-high border border-outline-variant/20 flex items-center justify-center text-[10px] font-bold font-label hover:bg-surface-bright transition-colors">M</button>
<button class="w-8 h-8 rounded-lg bg-surface-container-high border border-outline-variant/20 flex items-center justify-center text-[10px] font-bold font-label hover:bg-surface-bright transition-colors">S</button>
</div>
</div>
<div class="relative h-2 w-full bg-surface-container-lowest rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-[45%] bg-gradient-to-r from-tertiary-container to-tertiary rounded-full"></div>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#191a1a] rounded-t-[1.5rem] shadow-[0_-4px_40px_rgba(0,0,0,0.08)]">
<button class="flex flex-col items-center justify-center bg-[#007aff] text-white rounded-full px-5 py-2 scale-up-on-tap transition-transform duration-300">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">play_circle</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Player</span>
</button>
<button class="flex flex-col items-center justify-center text-[#acabaa] px-5 py-2 hover:text-[#e7e5e4] transition-all">
<span class="material-symbols-outlined text-xl">tune</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Mixer</span>
</button>
<button class="flex flex-col items-center justify-center text-[#acabaa] px-5 py-2 hover:text-[#e7e5e4] transition-all">
<span class="material-symbols-outlined text-xl">subscriptions</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Library</span>
</button>
<button class="flex flex-col items-center justify-center text-[#acabaa] px-5 py-2 hover:text-[#e7e5e4] transition-all">
<span class="material-symbols-outlined text-xl">search</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Search</span>
</button>
</nav>
</body></html>
