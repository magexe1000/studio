name: Web CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/studio-web/**'
      - 'packages/studio-core/**'
      - 'packages/ui-shared/**'
      - 'packages/ui-web/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/studio-web/**'
      - 'packages/studio-core/**'
      - 'packages/ui-shared/**'
      - 'packages/ui-web/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - '.github/workflows/web-ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SYNC_BACKEND_PROVIDER: "supabase-realtime"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce Import Boundaries
        run: pnpm lint:imports

      - name: Typecheck Web
        run: pnpm typecheck:web

      - name: Build Web
        run: pnpm build:web
