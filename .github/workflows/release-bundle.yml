name: Release OTA bundle

on:
  workflow_dispatch:
    inputs:
      note:
        description: Optional note for the commit message
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build OTA bundle
        env:
          OTA_BASE_URL: https://magexe1000.github.io/Chordex
        run: pnpm --filter @workspace/chord-app run release:gh-pages

      - name: Read built version
        id: version
        run: echo "version=$(node -p "require('./docs/version.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit and push docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No docs/ changes to commit."
            exit 0
          fi
          NOTE="${{ github.event.inputs.note }}"
          if [ -n "$NOTE" ]; then
            git commit -m "release ${{ steps.version.outputs.version }} bundle — $NOTE"
          else
            git commit -m "release ${{ steps.version.outputs.version }} bundle"
          fi
          git push origin HEAD:main
