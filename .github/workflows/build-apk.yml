name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        env:
          VITE_OTA_BASE_URL: https://MAGEXE1000.github.io/Studio
        run: pnpm --filter @workspace/chord-app run build

      - name: Capacitor sync
        working-directory: artifacts/chord-app
        run: pnpm exec cap sync android

      - name: Make gradlew executable
        working-directory: artifacts/chord-app/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/chord-app/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: studio-debug
          path: artifacts/chord-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./docs/version.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG"
          fi
          gh release upload "$TAG" artifacts/chord-app/android/app/build/outputs/apk/debug/app-debug.apk#studio-debug.apk --clobber
