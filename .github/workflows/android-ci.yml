name: Android CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/studio-android/**'
      - 'packages/studio-core/**'
      - 'packages/ui-shared/**'
      - 'packages/ui-android/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/studio-android/**'
      - 'packages/studio-core/**'
      - 'packages/ui-shared/**'
      - 'packages/ui-android/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
      - '.github/workflows/android-ci.yml'

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SYNC_BACKEND_PROVIDER: "supabase-realtime"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce Import Boundaries
        run: pnpm lint:imports

      - name: Typecheck Android
        run: pnpm typecheck:android

      - name: Build Android Web Assets
        run: pnpm build:android:web

      - name: Capacitor Sync
        run: pnpm --filter @workspace/studio-android android:sync

      - name: Build Debug APK
        run: |
          cd apps/studio-android/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Validate Debug APK Artifact
        run: |
          # Find aapt in ANDROID_HOME build-tools
          AAPT_PATH=$(find $ANDROID_HOME/build-tools -name aapt -type f | head -n 1)
          if [ -z "$AAPT_PATH" ]; then
            echo "::error::Could not find aapt utility"
            exit 1
          fi
          echo "Found aapt at $AAPT_PATH"
          
          APK_PATH="apps/studio-android/android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::Debug APK does not exist!"
            exit 1
          fi
          
          # Check size
          SIZE=$(stat -c%s "$APK_PATH")
          echo "APK Size: $SIZE bytes"
          if [ "$SIZE" -le 0 ]; then
            echo "::error::APK size is zero!"
            exit 1
          fi
          
          # Dump badging
          BADGING=$($AAPT_PATH dump badging "$APK_PATH")
          
          # Validate package name
          if ! echo "$BADGING" | grep -q "package: name='com.chordex.app'"; then
            echo "::error::Invalid package name!"
            exit 1
          fi
          
          # Validate versionName
          if ! echo "$BADGING" | grep -q "versionName='3.6.31'"; then
            echo "::error::Invalid versionName! Expected 3.6.31"
            echo "Badging: $(echo "$BADGING" | grep 'package:')"
            exit 1
          fi
          
          # Validate versionCode
          if ! echo "$BADGING" | grep -q "versionCode='58'"; then
            echo "::error::Invalid versionCode! Expected 58"
            echo "Badging: $(echo "$BADGING" | grep 'package:')"
            exit 1
          fi
          
          echo "✓ Debug APK validation passed successfully!"

