name: Release Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        required: true
        default: "both"
        type: choice
        options:
          - "both"
          - "ota"
          - "apk"
      note:
        description: "Optional release note"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SYNC_BACKEND_PROVIDER: "supabase-realtime"
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      EXPECTED_SIGNATURE_SHA256: ${{ secrets.EXPECTED_SIGNATURE_SHA256 }}
      REINSTALL_REQUIRED: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 2

      - name: Skip and Detect Release Type
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger. Release Type: ${{ github.event.inputs.release_type }}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "release_type=${{ github.event.inputs.release_type }}" >> "$GITHUB_OUTPUT"
            echo "note=${{ github.event.inputs.note }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On push to main, detect changes
          CHANGED=$(git diff --name-only HEAD^ HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Only run if files in artifacts/chord-app changed
          if ! echo "$CHANGED" | grep -qE '^artifacts/chord-app/'; then
            echo "No chord-app changes in this push. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if changes contain native files
          HAS_ANDROID=false
          if echo "$CHANGED" | grep -qE '^artifacts/chord-app/android/'; then
            HAS_ANDROID=true
          fi

          # Check if changes contain web/config files
          HAS_WEB=false
          if echo "$CHANGED" | grep -qE '^artifacts/chord-app/(src|public|index\.html|package\.json|vite\.config)'; then
            HAS_WEB=true
          fi

          if [ "$HAS_ANDROID" = "true" ] && [ "$HAS_WEB" = "true" ]; then
            TYPE="both"
          elif [ "$HAS_ANDROID" = "true" ]; then
            TYPE="apk"
          elif [ "$HAS_WEB" = "true" ]; then
            TYPE="ota"
          else
            TYPE="both" # Default fallback
          fi

          echo "Detected release type: $TYPE"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "release_type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "note=" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          version: 10.26.1

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        if: steps.gate.outputs.skip != 'true' && (steps.gate.outputs.release_type == 'apk' || steps.gate.outputs.release_type == 'both')
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile --prefer-offline

      # ── Signing setup (must happen BEFORE the release script runs Gradle) ──
      - name: Assert Production Signing Secrets
        if: steps.gate.outputs.skip != 'true' && (steps.gate.outputs.release_type == 'apk' || steps.gate.outputs.release_type == 'both')
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] || \
             [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] || \
             [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ] || \
             [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ] || \
             [ -z "${{ secrets.EXPECTED_SIGNATURE_SHA256 }}" ]; then
            echo "::error::Production signing secrets are missing. Refusing to publish release APK."
            exit 1
          fi

      - name: Decode Android Keystore
        if: steps.gate.outputs.skip != 'true' && (steps.gate.outputs.release_type == 'apk' || steps.gate.outputs.release_type == 'both')
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > artifacts/chord-app/android/app/release.keystore

      # ── Full release pipeline (web build, cap sync, Gradle APK, deploy) ──
      - name: Run Release Pipeline
        if: steps.gate.outputs.skip != 'true'
        run: pnpm --filter @workspace/chord-app run release:firebase --no-bump

      - name: Upload Build Diagnostics on Failure
        if: failure() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            artifacts/chord-app/android/app/build/reports/
            artifacts/chord-app/android/app/build/outputs/logs/
            artifacts/chord-app/android/app/build/outputs/apk/release/

      - name: Write and Update Release Metadata
        if: steps.gate.outputs.skip != 'true'
        env:
          RELEASE_TYPE: ${{ steps.gate.outputs.release_type }}
          EXPECTED_SIGNATURE_SHA256: ${{ secrets.EXPECTED_SIGNATURE_SHA256 }}
        run: node artifacts/chord-app/scripts/generate-release-metadata.mjs

      - name: Upload APK Asset to GitHub Release
        if: steps.gate.outputs.skip != 'true' && (steps.gate.outputs.release_type == 'apk' || steps.gate.outputs.release_type == 'both')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./artifacts/chord-app/package.json').version")
          TAG="v$VERSION"
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" --title "Studio v$VERSION" --notes-file release-notes.md
          else
            gh release edit "$TAG" --notes-file release-notes.md
          fi
          FILE_NAME="studio-$VERSION.apk"
          HASH_NAME="studio-$VERSION.sha256"
          cp artifacts/chord-app/android/app/build/outputs/apk/release/app-release.apk "./$FILE_NAME"
          sha256sum "$FILE_NAME" > "./$HASH_NAME"
          gh release upload "$TAG" "./$FILE_NAME" "./$HASH_NAME" --clobber

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        if: steps.gate.outputs.skip != 'true'
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'
          channelId: live

      - name: Commit and Push Release Metadata to main
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/chord-app/src/lib/appVersion.ts artifacts/chord-app/package.json artifacts/chord-app/android/app/build.gradle
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          VERSION=$(node -p "require('./artifacts/chord-app/package.json').version")
          NOTE="${{ steps.gate.outputs.note }}"
          if [ -n "$NOTE" ]; then
            git commit -m "release v$VERSION — $NOTE"
          else
            git commit -m "release v$VERSION"
          fi
          git push origin HEAD:main
