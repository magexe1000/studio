[build]
  command = "pnpm build:web"
  publish = "dist/web"
  ignore = "node scripts/netlify-ignore.mjs"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/sw-push.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/version.json"
  to = "https://studio-30f44.web.app/version.json"
  status = 200
  force = true

[[redirects]]
  from = "/app-release.json"
  to = "https://studio-30f44.web.app/app-release.json"
  status = 200
  force = true

[[redirects]]
  from = "/apk/*"
  to = "https://studio-30f44.web.app/apk/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200



