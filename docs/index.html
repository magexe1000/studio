    <script>
      (function() {
        try {
          var raw = localStorage.getItem('chord-explorer-storage-v3');
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.settings) {
              var settings = parsed.state.settings;
              var appMode = settings.appMode || 'hub';
              var perApp = settings.perApp || {};
              var activeVis = perApp[appMode] || {};
              var theme = activeVis.theme || settings.theme || 'dark';
              
              var isLight = false;
              if (theme === 'light') {
                isLight = true;
              } else if (theme === 'system') {
                isLight = window.matchMedia('(prefers-color-scheme: light)').matches;
              } else if (theme === 'dynamic') {
                var hr = new Date().getHours();
                var start = settings.dynamicLightStart || 7;
                var end = settings.dynamicLightEnd || 20;
                isLight = (hr >= start && hr < end);
              }
              
              if (isLight) {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
              }
            }
          }
        } catch (e) {
          console.warn("Theme prep error:", e);
        }
      })();
    </script>

    <script>
      // ── Pro intro with measured-target settle (Highly Optimized v10) ───
      // Offloads all high-frequency calculations entirely to GPU CSS animations
      // during the heavy JS parse/compile phase, preventing startup micro-stuttering/lag.
      (function () {
        var intro    = document.getElementById('intro');
        var center   = document.getElementById('intro-center');
        if (!intro || !center) return;

        // Trigger fade out of the cover overlay on load
        var cover = document.getElementById('intro-cover');
        if (cover) {
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              cover.style.opacity = '0';
            });
          });
        }

        var orbiterEls = intro.querySelectorAll('.orbiter');
        if (orbiterEls.length === 0) return;

        var orbiters = [];
        orbiterEls.forEach(function (el) {
          orbiters.push({ el: el, key: el.getAttribute('data-intro-id') });
        });
        var N = orbiters.length;

        var SETTLE_DURATION = 1000;  // ms to transition from orbit → target
        var FADE_OVERLAP    = 550;   // intro fade starts this many ms before settle ends
        var FADE_DURATION   = 900;   // long crossfade so hub reveals gradually
        var MIN_SPIN_TIME   = 1200;  // don't settle before this
        var MAX_WAIT_TIME   = 2600;  // hard cap — settle even without targets

        // Parse 2D/3D transform matrix from computed style to enable seamless handoff
        function parseMatrix(matrixStr) {
          if (!matrixStr || matrixStr === 'none') return { x: 0, y: 0, scale: 1 };
          var values = matrixStr.split('(')[1].split(')')[0].split(',');
          if (values.length === 6) {
            var a = parseFloat(values[0]);
            var b = parseFloat(values[1]);
            var scale = Math.sqrt(a * a + b * b);
            return { x: parseFloat(values[4]), y: parseFloat(values[5]), scale: scale };
          } else if (values.length === 16) {
            var a1 = parseFloat(values[0]);
            var b1 = parseFloat(values[1]);
            var scale = Math.sqrt(a1 * a1 + b1 * b1);
            return { x: parseFloat(values[12]), y: parseFloat(values[13]), scale: scale };
          }
          return { x: 0, y: 0, scale: 1 };
        }

        // Default fallback targets (relative to viewport center) if measurement fails
        function fallbackTargets() {
          var W = window.innerWidth;
          var H = window.innerHeight;
          var x = -(W / 2) + 64;
          var y0 = -(H / 2) + 240;
          var gap = Math.min(76, (H * 0.5) / (N + 1));
          var ts = [];
          for (var i = 0; i < N; i++) {
            ts.push({ x: x, y: y0 + i * gap, scale: 0.55 });
          }
          return {
            orbiters: ts,
            center:   { x: 0, y: -(H / 2) + 130, scale: 0.55 },
          };
        }

        // Measure actual hub icon positions from data-intro-target elements
        function measureTargets() {
          var W = window.innerWidth;
          var H = window.innerHeight;
          var cxV = W / 2, cyV = H / 2;
          var centerEl = document.querySelector('[data-intro-target="studio"]');
          if (!centerEl) return null;
          var cr = centerEl.getBoundingClientRect();
          if (cr.width === 0) return null;
          var centerTarget = {
            x: (cr.left + cr.width / 2) - cxV,
            y: (cr.top  + cr.height / 2) - cyV,
            scale: cr.width / 96,
          };
          var orbiterTargets = [];
          for (var i = 0; i < orbiters.length; i++) {
            var key = orbiters[i].key;
            var t = document.querySelector('[data-intro-target="' + key + '"]');
            if (!t) return null;
            var r = t.getBoundingClientRect();
            if (r.width === 0) return null;
            orbiterTargets.push({
              x: (r.left + r.width / 2) - cxV,
              y: (r.top  + r.height / 2) - cyV,
              scale: r.width / 44,
            });
          }
          return { orbiters: orbiterTargets, center: centerTarget };
        }

        var _cachedLogoOffY = null;
        function getLogoOffsetY() {
          if (_cachedLogoOffY !== null) return _cachedLogoOffY;
          var logoEl = center.querySelector('.logo');
          if (!logoEl) return 0;
          var lr = logoEl.getBoundingClientRect();
          var cr = center.getBoundingClientRect();
          if (cr.height === 0) return 0;
          _cachedLogoOffY = (lr.top + lr.height / 2) - (cr.top + cr.height / 2);
          return _cachedLogoOffY;
        }

        // Anchor orbiters at viewport center; transform handles motion
        function anchor() {
          var W = window.innerWidth, H = window.innerHeight;
          for (var i = 0; i < orbiters.length; i++) {
            orbiters[i].el.style.left = (W / 2 - 22) + 'px';
            orbiters[i].el.style.top  = (H / 2 - 22) + 'px';
          }
        }
        anchor();
        window.addEventListener('resize', anchor);
        window.addEventListener('orientationchange', anchor);

        var start = performance.now();
        var targets = null;
        var fadeStarted = false;
        var dismissed = false;
        var settled = false;

        function reactMounted() {
          var r = document.getElementById('root');
          return !!(r && r.children && r.children.length > 0);
        }

        // Pure timer-based mount observer. Executes exactly ONE layout read
        // to collect targets and delegates all motion entirely to GPU transitions.
        var checkInterval = setInterval(function () {
          var elapsed = performance.now() - start;
          if (elapsed < MIN_SPIN_TIME) return;

          var measured = measureTargets();
          if (measured) {
            clearInterval(checkInterval);
            triggerSettle(measured);
          } else if (elapsed >= MAX_WAIT_TIME) {
            clearInterval(checkInterval);
            triggerSettle(fallbackTargets());
          }
        }, 30);

        function triggerSettle(tgs) {
          if (settled) return;
          settled = true;
          targets = tgs;

          // 1. Capture current positions and snap them to inline styles
          orbiters.forEach(function (orb) {
            var computedStyle = window.getComputedStyle(orb.el);
            var currentTrans = parseMatrix(computedStyle.transform);
            orb.el.style.transform = 'translate3d(' + currentTrans.x.toFixed(2) + 'px, ' + currentTrans.y.toFixed(2) + 'px, 0) scale(' + currentTrans.scale.toFixed(3) + ')';
            orb.el.style.animation = 'none'; // Halt the infinite keyframe loop instantly
          });

          // Force browser style recalculation to register the animation halt
          center.offsetHeight;

          // 2. Trigger native GPU-accelerated CSS transitions
          orbiters.forEach(function (orb, k) {
            var tgt = targets.orbiters[k];
            orb.el.style.transition = 'transform ' + SETTLE_DURATION + 'ms cubic-bezier(0.22, 1, 0.36, 1), opacity ' + SETTLE_DURATION + 'ms cubic-bezier(0.22, 1, 0.36, 1)';
            orb.el.style.transform = 'translate3d(' + tgt.x.toFixed(2) + 'px, ' + tgt.y.toFixed(2) + 'px, 0) scale(' + tgt.scale.toFixed(3) + ')';
            orb.el.style.opacity = '0';
          });

          // Center logo transitions with target-scaling offset compensation
          var ct = targets.center;
          var logoOffY = getLogoOffsetY();
          var ccx = ct.x;
          var ccy = ct.y - logoOffY * ct.scale;
          center.style.transition = 'transform ' + SETTLE_DURATION + 'ms cubic-bezier(0.22, 1, 0.36, 1)';
          center.style.transform = 'translate(-50%, -50%) translate3d(' + ccx.toFixed(2) + 'px, ' + ccy.toFixed(2) + 'px, 0) scale(' + ct.scale.toFixed(3) + ')';

          var titleEl = center.querySelector('.title');
          var subEl   = center.querySelector('.sub');
          if (titleEl) {
            titleEl.style.transition = 'opacity ' + (SETTLE_DURATION - 200) + 'ms cubic-bezier(0.22, 1, 0.36, 1)';
            titleEl.style.opacity = '0';
          }
          if (subEl) {
            subEl.style.transition = 'opacity ' + (SETTLE_DURATION - 200) + 'ms cubic-bezier(0.22, 1, 0.36, 1)';
            subEl.style.opacity = '0';
          }

          // Trigger crossfade reveal overlapping with the final phase of settle
          setTimeout(function () {
            startFade();
          }, SETTLE_DURATION - FADE_OVERLAP);
        }

        function startFade() {
          if (dismissed) return;
          window.dispatchEvent(new Event('studio-intro-done'));
          if (!reactMounted()) {
            var startedAt = performance.now();
            var iv = setInterval(function () {
              if (reactMounted() || performance.now() - startedAt > 3000) {
                clearInterval(iv);
                doFade();
              }
            }, 80);
            return;
          }
          doFade();
        }

        function doFade() {
          if (dismissed) return;
          dismissed = true;
          intro.style.transition = 'opacity ' + FADE_DURATION + 'ms cubic-bezier(0.22, 1, 0.36, 1)';
          intro.style.opacity = '0';
          setTimeout(function () {
            intro.classList.add('dismissed');
            if (intro.parentNode) intro.parentNode.removeChild(intro);
          }, FADE_DURATION + 50);
        }

        setTimeout(doFade, 10000); // Safety net
      })();
