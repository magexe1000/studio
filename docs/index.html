      // ── Pro intro with measured-target settle ───────────────────────────
      (function () {
        var intro    = document.getElementById('intro');
        var center   = document.getElementById('intro-center');
        if (!intro || !center) return;

        // Trigger fade out of the cover overlay on load
        var cover = document.getElementById('intro-cover');
        if (cover) {
          requestAnimationFrame(function() {

        // Map each intro icon to its hub data-intro-target counterpart.
        var orbiters = [];
        orbiterEls.forEach(function (el) {
          orbiters.push({ el: el, key: el.getAttribute('data-intro-id') });
        });
        var N = orbiters.length;

        // Geometry — elliptical tilted orbit for 3D feel
        var RX    = 132;
        var RY    = 38;
        var TILT  = -28 * Math.PI / 180;
        var COS_T = Math.cos(TILT);
        var SIN_T = Math.sin(TILT);
        var STEP  = 360 / N;

        // Speed profile (deg/ms): smooth → dramatic accel → settle
        var BASE_OMEGA   = 360 / 8500;
        var PEAK_OMEGA   = 360 / 900;
        var ACCEL_START  = 600;
        var ACCEL_END    = 1200;

        // Falls back to t=3000 if React hasn't mounted yet.
        var SETTLE_DURATION = 1000;  // ms to lerp from orbit → target
        var FADE_OVERLAP    = 550;   // intro fade starts this many ms before settle ends
        var FADE_DURATION   = 900;   // long crossfade so hub reveals gradually
        var MIN_SPIN_TIME   = 1200;  // don't settle before this
        var MAX_WAIT_TIME   = 2600;  // hard cap — settle even without targets

        // Default fallback targets (relative to viewport center) if measurement fails

          var W = window.innerWidth;
          var H = window.innerHeight;
          var x = -(W / 2) + 64;
          var y0 = -(H / 2) + 240;
          var gap = Math.min(76, (H * 0.5) / (N + 1));
          var ts = [];
          for (var i = 0; i < N; i++) {
            ts.push({ x: x, y: y0 + i * gap, scale: 0.55 });
          }
          return {
            orbiters: ts,
            center:   { x: 0, y: -(H / 2) + 130, scale: 0.55 },
          };
        }

        // Measure actual hub icon positions from data-intro-target elements.
        // Returns null if not all targets are present.
        function measureTargets() {
          var W = window.innerWidth;
          var H = window.innerHeight;
          var cxV = W / 2, cyV = H / 2;
          var centerEl = document.querySelector('[data-intro-target="studio"]');

            x: (cr.left + cr.width / 2) - cxV,
            y: (cr.top  + cr.height / 2) - cyV,
            scale: cr.width / 96,  // intro center logo is 96px
          };
          var orbiterTargets = [];

            if (!t) return null;
            var r = t.getBoundingClientRect();
            if (r.width === 0) return null;
            orbiterTargets.push({
              x: (r.left + r.width / 2) - cxV,
              y: (r.top  + r.height / 2) - cyV,
              scale: r.width / 44,  // intro orbiter container is 44px
            });
          }
          return { orbiters: orbiterTargets, center: centerTarget };
        }

        // #intro-center container's center. The container holds logo + title +
        // subtitle in normal flow, so the logo center sits ABOVE the container

        // measured hub target, not the container.

        function getLogoOffsetY() {

          return _cachedLogoOffY;

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }
        function easeInQuad(t) { return t * t; }

            } else if (t >= MAX_WAIT_TIME) {
              targets = fallbackTargets();
              settleStartTime = now;
            }
          }

          // Settle progress (0 → 1)
          var sP = 0;
          if (settleStartTime > 0) {
            sP = (now - settleStartTime) / SETTLE_DURATION;
            if (sP < 0) sP = 0; else if (sP > 1) sP = 1;
          }
          var sE = easeInOutCubic(sP);

          // Premium visual expansion drift for the first 800ms
          var drift = 1.0;
          if (t < 800) {
            drift = easeInOutCubic(t / 800) * 0.6 + 0.4;
          }

          for (var k = 0; k < orbiters.length; k++) {
            var el = orbiters[k].el;
            var a = (angle + k * STEP) % 360;
            if (a < 0) a += 360;
            var rad = a * Math.PI / 180;
            var x0 = RX * drift * Math.cos(rad);
            var y0 = RY * drift * Math.sin(rad);
            var xT = x0 * COS_T - y0 * SIN_T;
            var yT = x0 * SIN_T + y0 * COS_T;

            var front      = a < 180;
            var orbitScale = front ? 1.10 : 0.85;
            var z          = front ? 3 : 0;

            var fx, fy, fs;
            if (targets) {
              var tgt = targets.orbiters[k];
              fx = xT + (tgt.x - xT) * sE;
              fy = yT + (tgt.y - yT) * sE;
              fs = orbitScale + (tgt.scale - orbitScale) * sE;
            } else {
              fx = xT; fy = yT; fs = orbitScale;
            }
            el.style.zIndex    = sE > 0.5 ? 1 : z;
            el.style.transform = 'translate(' + fx.toFixed(2) + 'px,' + fy.toFixed(2) + 'px) scale(' + fs.toFixed(3) + ')';
          }

          // Center logo follows — compensate for logo offset within the
          // container so the LOGO (not the container) lands on the hub target.
          if (targets) {
            var ct = targets.center;
            var ccs = 1 + (ct.scale - 1) * sE;
            var logoOffY = getLogoOffsetY(); // px, logo-center relative to container-center
            var ccx = ct.x * sE;
            var ccy = (ct.y - logoOffY * ccs) * sE;
            center.style.transform = 'translate(-50%, -50%) translate(' + ccx.toFixed(2) + 'px,' + ccy.toFixed(2) + 'px) scale(' + ccs.toFixed(3) + ')';
            // Fade out title/sub during settle so only the logo "lands"
            var titleEl = center.querySelector('.title');
            var subEl   = center.querySelector('.sub');
            if (titleEl) titleEl.style.opacity = String(1 - sE);
            if (subEl)   subEl.style.opacity   = String(1 - sE);
          }

          // Start crossfade slightly before settle completes so the intro
          // icons appear to BECOME the hub icons rather than swap.
          if (!fadeStarted && settleStartTime > 0 && (now - settleStartTime) >= (SETTLE_DURATION - FADE_OVERLAP)) {
            fadeStarted = true;
            // Only start the fade when React is mounted (so the hub is there
            // to crossfade INTO). Otherwise wait briefly.
            startFade();
          }

          if (sP >= 1 && fadeStarted) {
            // Settle done; rAF loop ends after fade dismisses
            stopped = true;
            return;
          }
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

        function startFade() {
          if (dismissed) return;
          // Signal React the intro is finishing — StudioTitleReveal can now
          // start its sweep animation so the title appears as the hub reveals.
          window.dispatchEvent(new Event('studio-intro-done'));
          if (!reactMounted()) {
            // Wait for React then fade
            var startedAt = performance.now();
            var iv = setInterval(function () {
              if (reactMounted() || performance.now() - startedAt > 3000) {
                clearInterval(iv);
                doFade();
              }
            }, 80);
            return;
          }
          doFade();
        }
        function doFade() {
          if (dismissed) return;
          dismissed = true;
          // Apply a long, smooth ease-out transition for the crossfade into the hub.
          // cubic-bezier(0.22,1,0.36,1) starts quickly then eases very gently at the
          // end — this makes the hub "breathe in" rather than snap into view.
          intro.style.transition = 'opacity ' + FADE_DURATION + 'ms cubic-bezier(0.22,1,0.36,1)';
          intro.style.opacity = '0';
          setTimeout(function () {
            intro.classList.add('dismissed');
            if (intro.parentNode) intro.parentNode.removeChild(intro);
          }, FADE_DURATION + 50);
        }
        // Hard safety
        setTimeout(doFade, 10000);
      })();
    </script>
  </body>
</html>
