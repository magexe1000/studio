<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#444"/>
      <stop offset="50%"  stop-color="#777"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="188" rx="82" ry="10" fill="#00000028"/>
  <!-- 3D box body -->
  <!-- Right face -->
  <polygon points="156,42 180,58 180,158 156,142" fill="url(#side)"/>
  <!-- Top face -->
  <polygon points="44,42 156,42 180,58 68,58" fill="url(#top)"/>
  <!-- Front face -->
  <rect x="44" y="42" width="112" height="100" rx="4" fill="url(#body)"/>
  <!-- Label -->
  <rect x="54" y="50" width="92" height="18" rx="3" fill="#111"/>
  <text x="100" y="62" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#777" opacity="0.9">STAGE BOX</text>
  <!-- XLR send jacks row (top row) -->
  <text x="100" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">SENDS (TO FOH)</text>
  <!-- 8 XLR outputs -->
  <ellipse cx="58"  cy="92" rx="7" ry="9" fill="#1A1A1A"/>
  <ellipse cx="58"  cy="92" rx="4.5" ry="6" fill="#333"/>
  <ellipse cx="74"  cy="92" rx="7" ry="9" fill="#1A1A1A"/>
  <ellipse cx="74"  cy="92" rx="4.5" ry="6" fill="#333"/>
  <ellipse cx="90"  cy="92" rx="7" ry="9" fill="#1A1A1A"/>
  <ellipse cx="90"  cy="92" rx="4.5" ry="6" fill="#333"/>
  <ellipse cx="106" cy="92" rx="7" ry="9" fill="#1A1A1A"/>
  <ellipse cx="106" cy="92" rx="4.5" ry="6" fill="#333"/>
  <ellipse cx="122" cy="92" rx="7" ry="9" fill="#1A1A1A"/>
  <ellipse cx="122" cy="92" rx="4.5" ry="6" fill="#333"/>
  <ellipse cx="138" cy="92" rx="7" ry="9" fill="#1A1A1A"/>
  <ellipse cx="138" cy="92" rx="4.5" ry="6" fill="#333"/>
  <!-- XLR return jacks row (bottom row — from FOH/monitors) -->
  <text x="100" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">RETURNS (FROM FOH)</text>
  <ellipse cx="58"  cy="124" rx="7" ry="9" fill="#1A1A2A"/>
  <ellipse cx="58"  cy="124" rx="4.5" ry="6" fill="#223"/>
  <ellipse cx="74"  cy="124" rx="7" ry="9" fill="#1A1A2A"/>
  <ellipse cx="74"  cy="124" rx="4.5" ry="6" fill="#223"/>
  <ellipse cx="90"  cy="124" rx="7" ry="9" fill="#1A1A2A"/>
  <ellipse cx="90"  cy="124" rx="4.5" ry="6" fill="#223"/>
  <ellipse cx="106" cy="124" rx="7" ry="9" fill="#1A1A2A"/>
  <ellipse cx="106" cy="124" rx="4.5" ry="6" fill="#223"/>
  <ellipse cx="122" cy="124" rx="7" ry="9" fill="#1A1A2A"/>
  <ellipse cx="122" cy="124" rx="4.5" ry="6" fill="#223"/>
  <ellipse cx="138" cy="124" rx="7" ry="9" fill="#1A1A2A"/>
  <ellipse cx="138" cy="124" rx="4.5" ry="6" fill="#223"/>
  <!-- Snake cable port on bottom of right face -->
  <ellipse cx="172" cy="128" rx="10" ry="14" fill="#111"/>
  <ellipse cx="172" cy="128" rx="7"  ry="10" fill="#222"/>
  <!-- Power LED and input -->
  <circle cx="52" cy="64" r="5" fill="#00CC44"/>
  <circle cx="52" cy="64" r="3" fill="#44FF88"/>
</svg>
