<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cab" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#2A2E2A"/>
      <stop offset="50%"  stop-color="#141814"/>
      <stop offset="100%" stop-color="#080A08"/>
    </linearGradient>
    <radialGradient id="cone" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#505848"/>
      <stop offset="70%"  stop-color="#283028"/>
      <stop offset="100%" stop-color="#101410"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#383E38"/>
      <stop offset="100%" stop-color="#1E221E"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="90" ry="6" fill="#00000030"/>
  <!-- Cabinet body (squarer / taller than guitar amp) -->
  <rect x="8" y="20" width="184" height="170" rx="8" fill="url(#cab)"/>
  <!-- Corner protectors -->
  <rect x="8"   y="20"  width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <rect x="178" y="20"  width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <rect x="8"   y="176" width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <rect x="178" y="176" width="14" height="14" rx="3" fill="#444" opacity="0.7"/>
  <!-- Handle on top -->
  <path d="M 78 20 Q 78 10 100 10 Q 122 10 122 20" fill="none" stroke="#555" stroke-width="6" stroke-linecap="round"/>
  <!-- Control panel -->
  <rect x="8" y="20" width="184" height="54" rx="8" fill="url(#panel)"/>
  <rect x="8" y="60" width="184" height="14" rx="0" fill="#1A201A"/>
  <!-- VU meters -->
  <rect x="20" y="26" width="40" height="28" rx="3" fill="#111"/>
  <rect x="22" y="28" width="36" height="24" rx="2" fill="#0A1A0A"/>
  <rect x="24" y="34" width="24" height="6"  rx="1" fill="#114411" opacity="0.8"/>
  <rect x="24" y="34" width="18" height="6"  rx="1" fill="#22BB22" opacity="0.9"/>
  <rect x="24" y="42" width="24" height="6"  rx="1" fill="#114411" opacity="0.8"/>
  <rect x="24" y="42" width="20" height="6"  rx="1" fill="#22BB22" opacity="0.9"/>
  <!-- Brand -->
  <text x="118" y="40" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#80C040" opacity="0.85">AMPEG</text>
  <!-- Knobs -->
  <circle cx="74"  cy="46" r="8" fill="#222"/><circle cx="74"  cy="46" r="5.5" fill="#444"/>
  <circle cx="94"  cy="46" r="8" fill="#222"/><circle cx="94"  cy="46" r="5.5" fill="#444"/>
  <circle cx="114" cy="46" r="8" fill="#222"/><circle cx="114" cy="46" r="5.5" fill="#444"/>
  <circle cx="148" cy="36" r="12" fill="#222"/><circle cx="148" cy="36" r="9"  fill="#333"/>
  <circle cx="148" cy="36" r="5"  fill="#555"/>
  <line x1="148" y1="26" x2="148" y2="32" stroke="#888" stroke-width="2"/>
  <!-- Grille -->
  <rect x="14" y="76" width="172" height="110" rx="4" fill="#181E18"/>
  <!-- Speaker -->
  <circle cx="100" cy="131" r="78" fill="none" stroke="#2A302A" stroke-width="4"/>
  <circle cx="100" cy="131" r="74" fill="url(#cone)"/>
  <circle cx="100" cy="131" r="60" fill="none" stroke="#202820" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="131" r="46" fill="none" stroke="#202820" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="131" r="32" fill="none" stroke="#202820" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="131" r="20" fill="#303830"/>
  <circle cx="96"  cy="127" r="6"  fill="#606060" opacity="0.2"/>
</svg>
