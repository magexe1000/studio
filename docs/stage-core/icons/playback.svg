<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#2A2A2A"/>
      <stop offset="50%"  stop-color="#141414"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0A1828"/>
      <stop offset="100%" stop-color="#182840"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#383838"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="191" rx="86" ry="9" fill="#00000028"/>
  <!-- Rack unit body (2U playback system) -->
  <rect x="8" y="52" width="184" height="128" rx="8" fill="url(#body)"/>
  <!-- Rack ears -->
  <rect x="8"   y="52" width="22" height="128" rx="4" fill="#1E1E1E"/>
  <rect x="170" y="52" width="22" height="128" rx="4" fill="#1E1E1E"/>
  <circle cx="19" cy="70"  r="5" fill="#2A2A2A"/><circle cx="19" cy="70"  r="3" fill="#444"/>
  <circle cx="19" cy="162" r="5" fill="#2A2A2A"/><circle cx="19" cy="162" r="3" fill="#444"/>
  <circle cx="181" cy="70"  r="5" fill="#2A2A2A"/><circle cx="181" cy="70"  r="3" fill="#444"/>
  <circle cx="181" cy="162" r="5" fill="#2A2A2A"/><circle cx="181" cy="162" r="3" fill="#444"/>
  <!-- Front panel -->
  <rect x="32" y="58" width="136" height="116" rx="4" fill="url(#panel)"/>
  <!-- Media screen -->
  <rect x="38" y="64" width="80" height="50" rx="4" fill="#111"/>
  <rect x="40" y="66" width="76" height="46" rx="3" fill="url(#screen)"/>
  <!-- Waveform on screen -->
  <path d="M 44 89 L 50 79 L 54 89 L 58 75 L 62 89 L 66 82 L 70 89 L 74 77 L 78 89 L 82 83 L 86 89 L 90 80 L 94 89 L 100 84 L 106 89 L 110 78 L 112 89" stroke="#44AAFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Time position line -->
  <line x1="76" y1="66" x2="76" y2="112" stroke="#FF8844" stroke-width="1.5" opacity="0.7"/>
  <!-- Transport controls -->
  <rect x="38" y="118" width="80" height="22" rx="4" fill="#0A0A0A"/>
  <!-- Stop -->
  <rect x="44" y="122" width="10" height="10" rx="2" fill="#888"/>
  <!-- Prev -->
  <polygon points="60,122 56,127 60,132" fill="#AAA"/>
  <line x1="56" y1="122" x2="56" y2="132" stroke="#AAA" stroke-width="2"/>
  <!-- Play -->
  <circle cx="78" cy="127" r="8" fill="#224422"/>
  <polygon points="75,123 75,131 82,127" fill="#44FF44"/>
  <!-- Next -->
  <polygon points="90,122 94,127 90,132" fill="#AAA"/>
  <line x1="94" y1="122" x2="94" y2="132" stroke="#AAA" stroke-width="2"/>
  <!-- Time display -->
  <rect x="38" y="144" width="80" height="14" rx="3" fill="#0A0A0A"/>
  <text x="78" y="154" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#FFAA44" opacity="0.9">02:34.8</text>
  <!-- Jog wheel (right side) -->
  <circle cx="148" cy="100" r="32" fill="#1A1A1A"/>
  <circle cx="148" cy="100" r="28" fill="#222"/>
  <circle cx="148" cy="100" r="22" fill="#1A1A1A"/>
  <!-- Jog wheel notches -->
  <line x1="148" y1="70" x2="148" y2="76" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="148" y1="124" x2="148" y2="130" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="118" y1="100" x2="124" y2="100" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="172" y1="100" x2="178" y2="100" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="127" y1="79" x2="132" y2="84" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="164" y1="116" x2="169" y2="121" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="127" y1="121" x2="132" y2="116" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="164" y1="84" x2="169" y2="79" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <circle cx="148" cy="100" r="8"  fill="#333"/>
  <circle cx="148" cy="100" r="4"  fill="#444"/>
  <!-- USB / media ports -->
  <rect x="36" y="160" width="40" height="8" rx="3" fill="#111"/>
  <rect x="38" y="162" width="10" height="4"  rx="1" fill="#1A1A2A"/>
  <rect x="52" y="162" width="10" height="4"  rx="1" fill="#1A1A2A"/>
  <!-- SD slot -->
  <rect x="120" y="160" width="24" height="8" rx="2" fill="#111"/>
  <rect x="122" y="162" width="20" height="4" rx="1" fill="#0A1A0A"/>
  <!-- Power LED -->
  <circle cx="160" cy="164" r="5" fill="#00CC44"/>
  <circle cx="160" cy="164" r="3" fill="#44FF88"/>
</svg>
