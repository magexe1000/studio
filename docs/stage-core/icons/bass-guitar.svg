<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A6090"/>
      <stop offset="50%"  stop-color="#1A3A60"/>
      <stop offset="100%" stop-color="#0A1E38"/>
    </linearGradient>
    <linearGradient id="neck" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4A2808"/>
      <stop offset="45%"  stop-color="#9A5A28"/>
      <stop offset="100%" stop-color="#4A2808"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3A2008"/>
      <stop offset="50%"  stop-color="#7A4018"/>
      <stop offset="100%" stop-color="#3A2008"/>
    </linearGradient>
    <radialGradient id="shine" cx="32%" cy="28%" r="50%">
      <stop offset="0%"   stop-color="#7AB0E0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7AB0E0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="195" rx="40" ry="5" fill="#00000028"/>
  <!-- Headstock — 4 in-line -->
  <rect x="88" y="8" width="24" height="48" rx="6" fill="url(#head)"/>
  <!-- 4 tuning pegs on right side -->
  <rect x="112" y="12" width="22" height="7" rx="3.5" fill="#888"/>
  <circle cx="134" cy="15" r="5" fill="#BBB"/>
  <rect x="112" y="22" width="22" height="7" rx="3.5" fill="#888"/>
  <circle cx="134" cy="25" r="5" fill="#BBB"/>
  <rect x="112" y="32" width="22" height="7" rx="3.5" fill="#888"/>
  <circle cx="134" cy="35" r="5" fill="#BBB"/>
  <rect x="112" y="42" width="22" height="7" rx="3.5" fill="#888"/>
  <circle cx="134" cy="45" r="5" fill="#BBB"/>
  <!-- Nut -->
  <rect x="88" y="55" width="24" height="5" rx="1" fill="#DDD"/>
  <!-- Neck (longer than guitar) -->
  <rect x="89" y="60" width="22" height="94" rx="4" fill="url(#neck)"/>
  <line x1="89" y1="76"  x2="111" y2="76"  stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="89"  x2="111" y2="89"  stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="102" x2="111" y2="102" stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="115" x2="111" y2="115" stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="128" x2="111" y2="128" stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="141" x2="111" y2="141" stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="96"  r="3" fill="#DDB060" opacity="0.75"/>
  <circle cx="100" cy="122" r="3" fill="#DDB060" opacity="0.75"/>
  <!-- P-Bass style asymmetric body -->
  <path d="M 89 150
           Q 65 148 50 156 Q 30 168 32 184 Q 34 196 64 196 L 100 196 L 136 196
           Q 166 196 168 184 Q 170 168 150 156 Q 138 150 111 150
           Q 106 140 100 140 Q 94 140 89 150 Z" fill="url(#body)"/>
  <path d="M 89 150
           Q 65 148 50 156 Q 30 168 32 184 Q 34 196 64 196 L 100 196 L 136 196
           Q 166 196 168 184 Q 170 168 150 156 Q 138 150 111 150
           Q 106 140 100 140 Q 94 140 89 150 Z" fill="url(#shine)"/>
  <!-- P-Bass pickup (split) -->
  <rect x="84" y="160" width="15" height="14" rx="2" fill="#111" transform="rotate(-5,91,167)"/>
  <rect x="101" y="162" width="15" height="14" rx="2" fill="#111" transform="rotate(-5,108,169)"/>
  <!-- J-Bass bridge pickup -->
  <rect x="82" y="176" width="36" height="9" rx="2" fill="#111"/>
  <!-- Bridge -->
  <rect x="86" y="186" width="28" height="6" rx="2" fill="#888"/>
  <!-- Output jack -->
  <circle cx="152" cy="182" r="5" fill="#888"/>
  <!-- 4 strings -->
  <line x1="93"  y1="57" x2="90"  y2="190" stroke="#D0D0D0" stroke-width="1.2" opacity="0.7"/>
  <line x1="98"  y1="57" x2="96"  y2="190" stroke="#D0D0D0" stroke-width="1.4" opacity="0.7"/>
  <line x1="103" y1="57" x2="104" y2="190" stroke="#D0D0D0" stroke-width="1.6" opacity="0.7"/>
  <line x1="108" y1="57" x2="110" y2="190" stroke="#D0D0D0" stroke-width="1.8" opacity="0.7"/>
</svg>
