<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%"   stop-color="#5A5A5A"/>
      <stop offset="50%"  stop-color="#222222"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="grille" cx="36%" cy="30%" r="58%">
      <stop offset="0%"   stop-color="#787878"/>
      <stop offset="100%" stop-color="#1C1C1C"/>
    </radialGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#888"/>
      <stop offset="45%"  stop-color="#D8D8D8"/>
      <stop offset="100%" stop-color="#888"/>
    </linearGradient>
    <linearGradient id="xlr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="50%"  stop-color="#666"/>
      <stop offset="100%" stop-color="#3A3A3A"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="195" rx="20" ry="5" fill="#00000030"/>
  <!-- XLR connector -->
  <rect x="86" y="170" width="28" height="22" rx="7" fill="url(#xlr)"/>
  <ellipse cx="100" cy="192" rx="10" ry="4" fill="#222" opacity="0.7"/>
  <!-- Handle body -->
  <rect x="78" y="100" width="44" height="74" rx="10" fill="url(#body)"/>
  <!-- Grip texture rings -->
  <ellipse cx="100" cy="115" rx="22" ry="3.5" fill="none" stroke="#0A0A0A" stroke-width="3" opacity="0.7"/>
  <ellipse cx="100" cy="127" rx="22" ry="3.5" fill="none" stroke="#0A0A0A" stroke-width="3" opacity="0.7"/>
  <ellipse cx="100" cy="139" rx="22" ry="3.5" fill="none" stroke="#0A0A0A" stroke-width="3" opacity="0.7"/>
  <ellipse cx="100" cy="151" rx="22" ry="3.5" fill="none" stroke="#0A0A0A" stroke-width="3" opacity="0.7"/>
  <!-- Silver band -->
  <rect x="74" y="94" width="52" height="12" rx="4" fill="url(#band)"/>
  <!-- Capsule head -->
  <path d="M 75 100 Q 74 60 74 50 Q 76 18 100 14 Q 124 18 126 50 Q 126 60 125 100 Z" fill="url(#grille)"/>
  <!-- Mesh grid horizontal -->
  <path d="M 77 90 Q 100 87 123 90" stroke="#3A3A3A" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M 76 80 Q 100 77 124 80" stroke="#3A3A3A" stroke-width="1.2" fill="none" opacity="0.7"/>
  <path d="M 78 70 Q 100 67 122 70" stroke="#3A3A3A" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M 82 60 Q 100 57 118 60" stroke="#3A3A3A" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M 87 50 Q 100 47 113 50" stroke="#3A3A3A" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M 92 40 Q 100 38 108 40" stroke="#3A3A3A" stroke-width="1.2" fill="none" opacity="0.45"/>
  <path d="M 96 30 Q 100 29 104 30" stroke="#3A3A3A" stroke-width="1.2" fill="none" opacity="0.4"/>
  <!-- Mesh grid vertical -->
  <line x1="100" y1="14" x2="100" y2="100" stroke="#3A3A3A" stroke-width="1" opacity="0.4"/>
  <line x1="87"  y1="20" x2="81"  y2="100" stroke="#3A3A3A" stroke-width="1" opacity="0.3"/>
  <line x1="113" y1="20" x2="119" y2="100" stroke="#3A3A3A" stroke-width="1" opacity="0.3"/>
  <!-- Sheen highlight -->
  <path d="M 80 75 Q 82 52 90 34" stroke="#C0C0C0" stroke-width="3.5" fill="none" opacity="0.2" stroke-linecap="round"/>
</svg>
