<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="desk" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#2E2E2E"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>
    <linearGradient id="channel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="fader" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#888"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="96" ry="6" fill="#00000030"/>
  <!-- Console body (angled top surface + vertical meter bridge) -->
  <rect x="4" y="110" width="192" height="80" rx="6" fill="url(#desk)"/>
  <!-- Angled channel strip surface -->
  <path d="M 4 110 L 192 110 L 186 52 L 10 52 Z" fill="#282828"/>
  <!-- Meter bridge back section -->
  <rect x="10" y="32" width="180" height="24" rx="4" fill="#222"/>
  <!-- Master meters in bridge -->
  <rect x="80" y="34" width="40" height="18" rx="2" fill="#111"/>
  <rect x="82" y="36" width="16" height="6"  rx="1" fill="#113311" opacity="0.8"/>
  <rect x="82" y="36" width="12" height="6"  rx="1" fill="#22BB22" opacity="0.9"/>
  <rect x="82" y="44" width="16" height="6"  rx="1" fill="#113311" opacity="0.8"/>
  <rect x="82" y="44" width="14" height="6"  rx="1" fill="#22BB22" opacity="0.9"/>
  <rect x="102" y="36" width="16" height="6" rx="1" fill="#113311" opacity="0.8"/>
  <rect x="102" y="36" width="12" height="6" rx="1" fill="#22BB22" opacity="0.9"/>
  <rect x="102" y="44" width="16" height="6" rx="1" fill="#113311" opacity="0.8"/>
  <rect x="102" y="44" width="14" height="6" rx="1" fill="#22BB22" opacity="0.9"/>
  <!-- Channel strips (8 visible) -->
  <!-- Each channel: knobs on top, fader below -->
  <!-- ch1 -->
  <rect x="12" y="56" width="18" height="52" rx="2" fill="url(#channel)" opacity="0.9"/>
  <circle cx="21" cy="62" r="5" fill="#222"/><circle cx="21" cy="62" r="3" fill="#555"/>
  <circle cx="21" cy="72" r="5" fill="#222"/><circle cx="21" cy="72" r="3" fill="#555"/>
  <line x1="21" y1="82" x2="21" y2="104" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <rect x="18" y="88" width="6" height="10" rx="2" fill="url(#fader)"/>
  <!-- ch2 -->
  <rect x="34" y="56" width="18" height="52" rx="2" fill="url(#channel)" opacity="0.9"/>
  <circle cx="43" cy="62" r="5" fill="#222"/><circle cx="43" cy="62" r="3" fill="#555"/>
  <circle cx="43" cy="72" r="5" fill="#222"/><circle cx="43" cy="72" r="3" fill="#555"/>
  <line x1="43" y1="82" x2="43" y2="104" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <rect x="40" y="94" width="6" height="10" rx="2" fill="url(#fader)"/>
  <!-- ch3 -->
  <rect x="56" y="56" width="18" height="52" rx="2" fill="url(#channel)" opacity="0.9"/>
  <circle cx="65" cy="62" r="5" fill="#222"/><circle cx="65" cy="62" r="3" fill="#555"/>
  <circle cx="65" cy="72" r="5" fill="#222"/><circle cx="65" cy="72" r="3" fill="#555"/>
  <line x1="65" y1="82" x2="65" y2="104" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <rect x="62" y="85" width="6" height="10" rx="2" fill="url(#fader)"/>
  <!-- ch4 -->
  <rect x="78" y="56" width="18" height="52" rx="2" fill="url(#channel)" opacity="0.9"/>
  <circle cx="87" cy="62" r="5" fill="#222"/><circle cx="87" cy="62" r="3" fill="#555"/>
  <circle cx="87" cy="72" r="5" fill="#222"/><circle cx="87" cy="72" r="3" fill="#555"/>
  <line x1="87" y1="82" x2="87" y2="104" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <rect x="84" y="90" width="6" height="10" rx="2" fill="url(#fader)"/>
  <!-- ch5 -->
  <rect x="100" y="56" width="18" height="52" rx="2" fill="url(#channel)" opacity="0.9"/>
  <circle cx="109" cy="62" r="5" fill="#222"/><circle cx="109" cy="62" r="3" fill="#555"/>
  <circle cx="109" cy="72" r="5" fill="#222"/><circle cx="109" cy="72" r="3" fill="#555"/>
  <line x1="109" y1="82" x2="109" y2="104" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <rect x="106" y="88" width="6" height="10" rx="2" fill="url(#fader)"/>
  <!-- ch6 -->
  <rect x="122" y="56" width="18" height="52" rx="2" fill="url(#channel)" opacity="0.9"/>
  <circle cx="131" cy="62" r="5" fill="#222"/><circle cx="131" cy="62" r="3" fill="#555"/>
  <circle cx="131" cy="72" r="5" fill="#222"/><circle cx="131" cy="72" r="3" fill="#555"/>
  <line x1="131" y1="82" x2="131" y2="104" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <rect x="128" y="84" width="6" height="10" rx="2" fill="url(#fader)"/>
  <!-- Master section (right) -->
  <rect x="148" y="52" width="44" height="60" rx="3" fill="#1A1A1A"/>
  <text x="170" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#888">MASTER</text>
  <circle cx="158" cy="75" r="7" fill="#222"/><circle cx="158" cy="75" r="5" fill="#555"/>
  <circle cx="174" cy="75" r="7" fill="#222"/><circle cx="174" cy="75" r="5" fill="#555"/>
  <line x1="170" y1="86" x2="170" y2="108" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <rect x="167" y="92" width="6" height="10" rx="2" fill="#DDD"/>
  <!-- Armrest / lower body details -->
  <rect x="4" y="116" width="192" height="12" rx="3" fill="#1A1A1A" opacity="0.7"/>
</svg>
