<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="clamp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="50%"  stop-color="#888"/>
      <stop offset="100%" stop-color="#3A3A3A"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#303030"/>
      <stop offset="50%"  stop-color="#707070"/>
      <stop offset="100%" stop-color="#303030"/>
    </linearGradient>
    <radialGradient id="cap" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#686868"/>
      <stop offset="100%" stop-color="#181818"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="193" rx="40" ry="6" fill="#00000025"/>
  <!-- C-clamp body -->
  <path d="M 44 80 Q 40 40 60 28 Q 80 18 95 30 L 95 46 Q 82 36 68 42 Q 54 52 58 80 Z" fill="url(#clamp)"/>
  <!-- Clamp screw -->
  <rect x="38" y="75" width="22" height="12" rx="6" fill="#666"/>
  <rect x="40" y="77" width="18" height="8" rx="4" fill="#888"/>
  <line x1="49" y1="75" x2="49" y2="87" stroke="#555" stroke-width="2"/>
  <!-- Rim grip jaw -->
  <rect x="40" y="87" width="20" height="8" rx="3" fill="#444"/>
  <!-- Gooseneck tube -->
  <path d="M 95 38 Q 120 38 128 55 Q 136 72 130 88" stroke="url(#mic)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Gooseneck inner highlight -->
  <path d="M 95 38 Q 120 38 128 55 Q 136 72 130 88" stroke="#888" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Mic capsule barrel -->
  <rect x="106" y="84" width="48" height="26" rx="13" fill="url(#cap)"/>
  <!-- Capsule end grille -->
  <rect x="148" y="84" width="18" height="26" rx="7" fill="url(#cap)"/>
  <!-- Grille mesh lines -->
  <line x1="152" y1="88" x2="152" y2="106" stroke="#444" stroke-width="1" opacity="0.6"/>
  <line x1="158" y1="88" x2="158" y2="106" stroke="#444" stroke-width="1" opacity="0.6"/>
  <line x1="162" y1="90" x2="162" y2="104" stroke="#444" stroke-width="1" opacity="0.5"/>
  <line x1="106" y1="90" x2="166" y2="90" stroke="#555" stroke-width="1" opacity="0.4"/>
  <line x1="106" y1="97" x2="166" y2="97" stroke="#555" stroke-width="1" opacity="0.4"/>
  <line x1="106" y1="104" x2="166" y2="104" stroke="#555" stroke-width="1" opacity="0.4"/>
  <!-- Sheen -->
  <path d="M 110 87 Q 120 85 135 86" stroke="#C0C0C0" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- XLR connector tail -->
  <line x1="106" y1="97" x2="68" y2="175" stroke="#222" stroke-width="6" stroke-linecap="round"/>
  <line x1="106" y1="97" x2="68" y2="175" stroke="#444" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <circle cx="68" cy="175" r="10" fill="#2A2A2A"/>
  <ellipse cx="68" cy="175" rx="6" ry="6" fill="none" stroke="#555" stroke-width="1.5"/>
</svg>
