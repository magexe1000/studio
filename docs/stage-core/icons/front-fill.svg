<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cab" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3830"/>
      <stop offset="100%" stop-color="#0E0C0A"/>
    </linearGradient>
    <radialGradient id="cone" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#5A5248"/>
      <stop offset="60%"  stop-color="#2C2820"/>
      <stop offset="100%" stop-color="#141210"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="192" rx="92" ry="8" fill="#00000025"/>
  <!-- Very low, wide, flat cabinet (stage front lip fill) -->
  <rect x="8" y="104" width="184" height="76" rx="6" fill="url(#cab)"/>
  <rect x="8"   y="104" width="10" height="10" rx="2" fill="#555" opacity="0.7"/>
  <rect x="182" y="104" width="10" height="10" rx="2" fill="#555" opacity="0.7"/>
  <rect x="8"   y="170" width="10" height="10" rx="2" fill="#555" opacity="0.7"/>
  <rect x="182" y="170" width="10" height="10" rx="2" fill="#555" opacity="0.7"/>
  <!-- Angled top face (slight wedge toward audience) -->
  <path d="M 8 104 L 192 104 L 188 88 L 12 88 Z" fill="#2A2820"/>
  <!-- Grille -->
  <rect x="14" y="110" width="172" height="66" rx="4" fill="#1A1810"/>
  <!-- Two small wide-dispersion drivers -->
  <!-- Left -->
  <circle cx="58"  cy="143" r="28" fill="url(#cone)"/>
  <circle cx="58"  cy="143" r="20" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="58"  cy="143" r="12" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="58"  cy="143" r="8"  fill="#252018"/>
  <circle cx="55"  cy="140" r="3"  fill="#888" opacity="0.2"/>
  <!-- Right -->
  <circle cx="142" cy="143" r="28" fill="url(#cone)"/>
  <circle cx="142" cy="143" r="20" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="142" cy="143" r="12" fill="none" stroke="#201C18" stroke-width="2" opacity="0.5"/>
  <circle cx="142" cy="143" r="8"  fill="#252018"/>
  <circle cx="139" cy="140" r="3"  fill="#888" opacity="0.2"/>
  <!-- Center divider -->
  <rect x="98" y="112" width="4" height="62" fill="#111" opacity="0.5"/>
  <!-- Input panel on back top face -->
  <rect x="78" y="90" width="44" height="8" rx="3" fill="#333"/>
  <circle cx="90"  cy="94" r="3" fill="#555"/>
  <circle cx="100" cy="94" r="3" fill="#555"/>
  <circle cx="110" cy="94" r="3" fill="#555"/>
</svg>
