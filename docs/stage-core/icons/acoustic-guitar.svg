<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#D49840"/>
      <stop offset="50%"  stop-color="#A07020"/>
      <stop offset="100%" stop-color="#6A4410"/>
    </linearGradient>
    <linearGradient id="neck" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5A2E0E"/>
      <stop offset="45%"  stop-color="#B06828"/>
      <stop offset="100%" stop-color="#5A2E0E"/>
    </linearGradient>
    <radialGradient id="shine" cx="33%" cy="28%" r="52%">
      <stop offset="0%"   stop-color="#FFE090" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFE090" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hole" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0A0402"/>
      <stop offset="100%" stop-color="#1E0E04"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="195" rx="44" ry="5" fill="#00000028"/>
  <!-- Headstock (classical/acoustic 3+3) -->
  <rect x="87" y="8" width="26" height="38" rx="6" fill="#5A2E0E"/>
  <!-- Tuning slots and pegs -->
  <rect x="84" y="14" width="16" height="6" rx="3" fill="#777"/>
  <circle cx="84" cy="17" r="4" fill="#AAA"/>
  <rect x="84" y="23" width="16" height="6" rx="3" fill="#777"/>
  <circle cx="84" cy="26" r="4" fill="#AAA"/>
  <rect x="84" y="32" width="16" height="6" rx="3" fill="#777"/>
  <circle cx="84" cy="35" r="4" fill="#AAA"/>
  <rect x="100" y="14" width="16" height="6" rx="3" fill="#777"/>
  <circle cx="116" cy="17" r="4" fill="#AAA"/>
  <rect x="100" y="23" width="16" height="6" rx="3" fill="#777"/>
  <circle cx="116" cy="26" r="4" fill="#AAA"/>
  <rect x="100" y="32" width="16" height="6" rx="3" fill="#777"/>
  <circle cx="116" cy="35" r="4" fill="#AAA"/>
  <!-- Nut -->
  <rect x="88" y="45" width="24" height="5" rx="1" fill="#EEE"/>
  <!-- Neck -->
  <rect x="89" y="50" width="22" height="76" rx="4" fill="url(#neck)"/>
  <line x1="89" y1="63"  x2="111" y2="63"  stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="73"  x2="111" y2="73"  stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="83"  x2="111" y2="83"  stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="93"  x2="111" y2="93"  stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="103" x2="111" y2="103" stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <line x1="89" y1="113" x2="111" y2="113" stroke="#888" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="78" r="2.5" fill="#DDB060" opacity="0.75"/>
  <circle cx="100" cy="98" r="2.5" fill="#DDB060" opacity="0.75"/>
  <!-- Body — dreadnought (upper bout smaller, lower bout larger) -->
  <path d="M 89 122
           Q 60 120 48 134 Q 34 150 44 168 Q 52 184 76 190 Q 90 194 100 194
           Q 110 194 124 190 Q 148 184 156 168 Q 166 150 152 134 Q 140 120 111 122
           Q 106 112 100 112 Q 94 112 89 122 Z" fill="url(#body)"/>
  <path d="M 89 122
           Q 60 120 48 134 Q 34 150 44 168 Q 52 184 76 190 Q 90 194 100 194
           Q 110 194 124 190 Q 148 184 156 168 Q 166 150 152 134 Q 140 120 111 122
           Q 106 112 100 112 Q 94 112 89 122 Z" fill="url(#shine)"/>
  <!-- Body binding -->
  <path d="M 89 122 Q 60 120 48 134 Q 34 150 44 168 Q 52 184 76 190 Q 90 194 100 194 Q 110 194 124 190 Q 148 184 156 168 Q 166 150 152 134 Q 140 120 111 122 Q 106 112 100 112 Q 94 112 89 122 Z" fill="none" stroke="#EED080" stroke-width="2.5" opacity="0.5"/>
  <!-- Sound hole -->
  <circle cx="100" cy="152" r="22" fill="url(#hole)"/>
  <!-- Rosette rings -->
  <circle cx="100" cy="152" r="22" fill="none" stroke="#D4A040" stroke-width="2.5" opacity="0.7"/>
  <circle cx="100" cy="152" r="19" fill="none" stroke="#8A5820" stroke-width="1"   opacity="0.5"/>
  <circle cx="100" cy="152" r="25" fill="none" stroke="#D4A040" stroke-width="1.5" opacity="0.4"/>
  <!-- Bridge -->
  <rect x="82" y="174" width="36" height="8" rx="3" fill="#4A2808"/>
  <!-- Saddle -->
  <rect x="84" y="174" width="32" height="3" rx="1" fill="#EEE"/>
  <!-- Strings -->
  <line x1="95"  y1="46" x2="87"  y2="176" stroke="#C0C0C0" stroke-width="1"   opacity="0.55"/>
  <line x1="98"  y1="46" x2="91"  y2="176" stroke="#C0C0C0" stroke-width="1.1" opacity="0.6"/>
  <line x1="100" y1="46" x2="96"  y2="176" stroke="#C0C0C0" stroke-width="1.2" opacity="0.65"/>
  <line x1="102" y1="46" x2="103" y2="176" stroke="#C0C0C0" stroke-width="1.2" opacity="0.65"/>
  <line x1="105" y1="46" x2="108" y2="176" stroke="#C0C0C0" stroke-width="1.4" opacity="0.65"/>
  <line x1="108" y1="46" x2="113" y2="176" stroke="#C0C0C0" stroke-width="1.4" opacity="0.65"/>
</svg>
