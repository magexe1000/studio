<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="tapa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8BC78"/>
      <stop offset="100%" stop-color="#B87B38"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0682A"/>
      <stop offset="100%" stop-color="#7A4E1E"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="100" cy="193" rx="72" ry="7" fill="#00000030"/>

  <!-- Right side panel (gives 3-D depth) -->
  <polygon points="152,22 178,42 178,178 152,182" fill="url(#side)"/>

  <!-- Top face -->
  <polygon points="28,22 152,22 178,42 54,42" fill="#D4B060"/>

  <!-- Front body (main rectangle) -->
  <rect x="28" y="22" width="124" height="160" fill="#C49040"/>

  <!-- Tapa front panel (playing surface) -->
  <rect x="38" y="32" width="104" height="140" fill="url(#tapa)" rx="2"/>

  <!-- Sound hole -->
  <ellipse cx="90" cy="72" rx="26" ry="20" fill="#120600"/>

  <!-- Sound hole inner rim highlight -->
  <ellipse cx="90" cy="72" rx="26" ry="20" fill="none" stroke="#2A1008" stroke-width="3"/>

  <!-- Wood grain lines on tapa -->
  <line x1="38" y1="108" x2="142" y2="108" stroke="#A06828" stroke-width="1.5" opacity="0.35"/>
  <line x1="38" y1="128" x2="142" y2="128" stroke="#A06828" stroke-width="1.5" opacity="0.35"/>
  <line x1="38" y1="148" x2="142" y2="148" stroke="#A06828" stroke-width="1.5" opacity="0.35"/>

  <!-- Corner screws -->
  <circle cx="47" cy="41" r="4" fill="#6B4018" opacity="0.7"/>
  <circle cx="133" cy="41" r="4" fill="#6B4018" opacity="0.7"/>
  <circle cx="47" cy="163" r="4" fill="#6B4018" opacity="0.7"/>
  <circle cx="133" cy="163" r="4" fill="#6B4018" opacity="0.7"/>
</svg>
