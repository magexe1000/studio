<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#484848"/>
      <stop offset="40%"  stop-color="#B0B0B0"/>
      <stop offset="60%"  stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#484848"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#555"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="boom" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#444"/>
      <stop offset="50%"  stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="60" ry="6" fill="#00000030"/>
  <!-- Tripod legs -->
  <line x1="92" y1="172" x2="44"  y2="190" stroke="url(#base)" stroke-width="8" stroke-linecap="round"/>
  <line x1="92" y1="172" x2="100" y2="192" stroke="url(#base)" stroke-width="8" stroke-linecap="round"/>
  <line x1="92" y1="172" x2="148" y2="188" stroke="url(#base)" stroke-width="8" stroke-linecap="round"/>
  <!-- Rubber feet -->
  <ellipse cx="44"  cy="190" rx="6" ry="3.5" fill="#222"/>
  <ellipse cx="100" cy="193" rx="6" ry="3.5" fill="#222"/>
  <ellipse cx="148" cy="188" rx="6" ry="3.5" fill="#222"/>
  <!-- Hub -->
  <circle cx="92" cy="170" r="10" fill="#444"/>
  <circle cx="92" cy="170" r="6"  fill="#666"/>
  <!-- Main vertical pole -->
  <rect x="87" y="50" width="10" height="124" rx="5" fill="url(#pole)"/>
  <!-- Adjustment collar -->
  <rect x="83" y="108" width="18" height="14" rx="4" fill="#555"/>
  <rect x="85" y="110" width="14" height="10" rx="3" fill="#777"/>
  <!-- Boom arm -->
  <rect x="32" y="36" width="130" height="9" rx="4.5" fill="url(#boom)"/>
  <!-- Counterweight -->
  <rect x="28" y="28" width="24" height="20" rx="6" fill="#444"/>
  <rect x="30" y="30" width="20" height="16" rx="5" fill="#666"/>
  <!-- Boom knuckle at pole -->
  <circle cx="92" cy="40" r="10" fill="#444"/>
  <circle cx="92" cy="40" r="6"  fill="#666"/>
  <!-- Mic clip at end -->
  <circle cx="156" cy="40" r="8"  fill="#333"/>
  <path d="M 152 34 Q 160 34 164 40 Q 160 46 152 46" stroke="#777" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
