<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#2A3038"/>
      <stop offset="50%"  stop-color="#141820"/>
      <stop offset="100%" stop-color="#080C12"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A4248"/>
      <stop offset="100%" stop-color="#1E2430"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="188" rx="88" ry="12" fill="#00000028"/>
  <!-- Router body (flat horizontal slab) -->
  <rect x="14" y="106" width="172" height="60" rx="10" fill="url(#body)"/>
  <!-- Top face of body -->
  <path d="M 14 106 L 186 106 L 186 100 L 14 100 Z" fill="url(#top)" rx="4"/>
  <rect x="14" y="96" width="172" height="14" rx="8" fill="url(#top)"/>
  <!-- Ethernet ports on front face -->
  <text x="48" y="122" font-family="Arial, sans-serif" font-size="7" fill="#6090C0">LAN</text>
  <rect x="30"  y="124" width="16" height="12" rx="2" fill="#1A2030"/>
  <rect x="32"  y="126" width="12" height="8"  rx="1" fill="#0A1020"/>
  <circle cx="35" cy="128" r="1.5" fill="#448844" opacity="0.8"/>
  <circle cx="39" cy="128" r="1.5" fill="#44AA44"/>
  <rect x="50"  y="124" width="16" height="12" rx="2" fill="#1A2030"/>
  <rect x="52"  y="126" width="12" height="8"  rx="1" fill="#0A1020"/>
  <circle cx="55" cy="128" r="1.5" fill="#448844" opacity="0.8"/>
  <circle cx="59" cy="128" r="1.5" fill="#44AA44"/>
  <rect x="70"  y="124" width="16" height="12" rx="2" fill="#1A2030"/>
  <rect x="72"  y="126" width="12" height="8"  rx="1" fill="#0A1020"/>
  <circle cx="75" cy="128" r="1.5" fill="#448844" opacity="0.8"/>
  <circle cx="79" cy="128" r="1.5" fill="#44AA44"/>
  <rect x="90"  y="124" width="16" height="12" rx="2" fill="#1A2030"/>
  <rect x="92"  y="126" width="12" height="8"  rx="1" fill="#0A1020"/>
  <circle cx="95" cy="128" r="1.5" fill="#AA8844" opacity="0.8"/>
  <circle cx="99" cy="128" r="1.5" fill="#AAAA44"/>
  <!-- WAN port (different color) -->
  <text x="120" y="122" font-family="Arial, sans-serif" font-size="7" fill="#C06060">WAN</text>
  <rect x="112" y="124" width="16" height="12" rx="2" fill="#301A1A"/>
  <rect x="114" y="126" width="12" height="8"  rx="1" fill="#200A0A"/>
  <circle cx="117" cy="128" r="1.5" fill="#AA4444" opacity="0.8"/>
  <circle cx="121" cy="128" r="1.5" fill="#FF4444"/>
  <!-- USB port -->
  <text x="154" y="122" font-family="Arial, sans-serif" font-size="7" fill="#8888AA">USB</text>
  <rect x="146" y="124" width="18" height="12" rx="2" fill="#1A1A2A"/>
  <rect x="148" y="126" width="14" height="8"  rx="1" fill="#0A0A18"/>
  <!-- Power LED cluster -->
  <circle cx="172" cy="118" r="3.5" fill="#00BB44"/>
  <circle cx="172" cy="118" r="2"   fill="#44FF88"/>
  <circle cx="172" cy="128" r="3.5" fill="#44AAFF"/>
  <circle cx="172" cy="128" r="2"   fill="#88DDFF"/>
  <circle cx="172" cy="138" r="3.5" fill="#44AAFF" opacity="0.6"/>
  <!-- Power button -->
  <circle cx="24" cy="130" r="9"  fill="#1A1A2A"/>
  <circle cx="24" cy="130" r="6"  fill="#222230"/>
  <path d="M 21 126 A 6 6 0 1 1 27 126" fill="none" stroke="#4488FF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="124" x2="24" y2="130" stroke="#4488FF" stroke-width="2" stroke-linecap="round"/>
  <!-- Two WiFi antennas on top -->
  <rect x="44"  y="58" width="7"  height="42" rx="3.5" fill="#333"/>
  <rect x="149" y="58" width="7"  height="42" rx="3.5" fill="#333"/>
  <ellipse cx="47"  cy="57" rx="4" ry="4" fill="#555"/>
  <ellipse cx="152" cy="57" rx="4" ry="4" fill="#555"/>
  <!-- WiFi signal arcs -->
  <path d="M 56 80 Q 66 68 78 68" stroke="#4488FF" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 56 72 Q 70 56 86 56" stroke="#4488FF" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M 144 80 Q 134 68 122 68" stroke="#4488FF" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 144 72 Q 130 56 114 56" stroke="#4488FF" stroke-width="2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <!-- Bottom rubber feet -->
  <rect x="20"  y="164" width="20" height="8" rx="4" fill="#111"/>
  <rect x="160" y="164" width="20" height="8" rx="4" fill="#111"/>
</svg>
