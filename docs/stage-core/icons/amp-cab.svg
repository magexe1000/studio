<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cab" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3530"/>
      <stop offset="50%"  stop-color="#1A1610"/>
      <stop offset="100%" stop-color="#0A0806"/>
    </linearGradient>
    <radialGradient id="cone" cx="42%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#5A5248"/>
      <stop offset="60%"  stop-color="#302820"/>
      <stop offset="100%" stop-color="#181210"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="92" ry="6" fill="#00000030"/>
  <!-- Cabinet body -->
  <rect x="6" y="14" width="188" height="176" rx="8" fill="url(#cab)"/>
  <!-- Handle -->
  <path d="M 74 14 Q 74 5 100 5 Q 126 5 126 14" fill="none" stroke="#555" stroke-width="6" stroke-linecap="round"/>
  <!-- Corner protectors -->
  <rect x="6"   y="14"  width="14" height="14" rx="3" fill="#555" opacity="0.7"/>
  <rect x="180" y="14"  width="14" height="14" rx="3" fill="#555" opacity="0.7"/>
  <rect x="6"   y="176" width="14" height="14" rx="3" fill="#555" opacity="0.7"/>
  <rect x="180" y="176" width="14" height="14" rx="3" fill="#555" opacity="0.7"/>
  <!-- Inner grille frame -->
  <rect x="12" y="20" width="176" height="170" rx="4" fill="#201C18"/>
  <!-- 4 speakers in 2×2 grid -->
  <!-- Top-left speaker -->
  <circle cx="56"  cy="66"  r="38" fill="url(#cone)"/>
  <circle cx="56"  cy="66"  r="28" fill="none" stroke="#201810" stroke-width="2" opacity="0.5"/>
  <circle cx="56"  cy="66"  r="18" fill="none" stroke="#201810" stroke-width="2" opacity="0.5"/>
  <circle cx="56"  cy="66"  r="10" fill="#2A2420"/>
  <circle cx="53"  cy="63"  r="4"  fill="#808080" opacity="0.2"/>
  <!-- Top-right speaker -->
  <circle cx="144" cy="66"  r="38" fill="url(#cone)"/>
  <circle cx="144" cy="66"  r="28" fill="none" stroke="#201810" stroke-width="2" opacity="0.5"/>
  <circle cx="144" cy="66"  r="18" fill="none" stroke="#201810" stroke-width="2" opacity="0.5"/>
  <circle cx="144" cy="66"  r="10" fill="#2A2420"/>
  <circle cx="141" cy="63"  r="4"  fill="#808080" opacity="0.2"/>
  <!-- Bottom-left speaker -->
  <circle cx="56"  cy="148" r="38" fill="url(#cone)"/>
  <circle cx="56"  cy="148" r="28" fill="none" stroke="#201810" stroke-width="2" opacity="0.5"/>
  <circle cx="56"  cy="148" r="18" fill="none" stroke="#201810" stroke-width="2" opacity="0.5"/>
  <circle cx="56"  cy="148" r="10" fill="#2A2420"/>
  <circle cx="53"  cy="145" r="4"  fill="#808080" opacity="0.2"/>
  <!-- Bottom-right speaker -->
  <circle cx="144" cy="148" r="38" fill="url(#cone)"/>
  <circle cx="144" cy="148" r="28" fill="none" stroke="#201810" stroke-width="2" opacity="0.5"/>
  <circle cx="144" cy="148" r="18" fill="none" stroke="#201810" stroke-width="2" opacity="0.5"/>
  <circle cx="144" cy="148" r="10" fill="#2A2420"/>
  <circle cx="141" cy="145" r="4"  fill="#808080" opacity="0.2"/>
  <!-- Input jack at bottom center -->
  <circle cx="100" cy="187" r="5" fill="#666"/>
</svg>
