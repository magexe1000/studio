<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pad" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#4A4A4A"/>
      <stop offset="50%"  stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <radialGradient id="padtop" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#444"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <linearGradient id="brain" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#303030"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <radialGradient id="cympad" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#383838"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="80" ry="5" fill="#00000028"/>
  <!-- Rack frame -->
  <rect x="30"  y="45" width="6" height="130" rx="3" fill="#383838"/>
  <rect x="164" y="45" width="6" height="130" rx="3" fill="#383838"/>
  <rect x="30"  y="45" width="140" height="6"  rx="3" fill="#383838"/>
  <!-- Cross bar for cymbal pads -->
  <rect x="30" y="55" width="140" height="5" rx="2.5" fill="#444"/>
  <!-- Cymbal pad left -->
  <ellipse cx="52"  cy="46" rx="24" ry="8" fill="url(#cympad)"/>
  <ellipse cx="52"  cy="44" rx="20" ry="6" fill="none" stroke="#555" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="52"  cy="44" rx="5"  ry="2" fill="#444"/>
  <!-- Cymbal pad right -->
  <ellipse cx="148" cy="46" rx="24" ry="8" fill="url(#cympad)"/>
  <ellipse cx="148" cy="44" rx="20" ry="6" fill="none" stroke="#555" stroke-width="1.2" opacity="0.6"/>
  <ellipse cx="148" cy="44" rx="5"  ry="2" fill="#444"/>
  <!-- Main kick / snare pad — large center -->
  <path d="M 65 80 L 135 80 L 148 108 L 148 145 L 135 158 L 65 158 L 52 145 L 52 108 Z" fill="url(#pad)"/>
  <path d="M 65 76 L 135 76 L 148 104 L 148 141 L 135 154 L 65 154 L 52 141 L 52 104 Z" fill="url(#padtop)"/>
  <!-- Trigger sensor dot -->
  <circle cx="100" cy="116" r="12" fill="#1A1A1A"/>
  <circle cx="100" cy="116" r="8"  fill="#0A0A0A"/>
  <circle cx="100" cy="116" r="4"  fill="#222"/>
  <!-- Hi-hat pad left (small) -->
  <rect x="36" y="100" width="28" height="28" rx="5" fill="url(#pad)"/>
  <rect x="38" y="102" width="24" height="24" rx="4" fill="url(#padtop)"/>
  <circle cx="50" cy="114" r="6" fill="#1A1A1A"/>
  <!-- Tom pad right (small) -->
  <rect x="136" y="100" width="28" height="28" rx="5" fill="url(#pad)"/>
  <rect x="138" y="102" width="24" height="24" rx="4" fill="url(#padtop)"/>
  <circle cx="150" cy="114" r="6" fill="#1A1A1A"/>
  <!-- Sound module brain -->
  <rect x="68" y="162" width="64" height="26" rx="4" fill="url(#brain)"/>
  <rect x="72" y="166" width="40" height="6"  rx="2" fill="#0A0A0A"/>
  <rect x="74" y="168" width="36" height="2" rx="1" fill="#00FF88" opacity="0.6"/>
  <circle cx="120" cy="172" r="5" fill="#222"/>
  <circle cx="120" cy="172" r="3" fill="#333"/>
</svg>
