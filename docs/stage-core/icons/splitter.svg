<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="50%"  stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>
    <linearGradient id="top3d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
    <linearGradient id="side3d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#555"/>
      <stop offset="50%"  stop-color="#888"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="186" rx="72" ry="12" fill="#00000028"/>
  <!-- 3D box body -->
  <polygon points="144,38 168,52 168,146 144,132" fill="url(#side3d)"/>
  <polygon points="56,38 144,38 168,52 80,52" fill="url(#top3d)"/>
  <rect x="56" y="38" width="88" height="94" rx="4" fill="url(#body)"/>
  <!-- Label -->
  <text x="100" y="56" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="#777">SPLITTER</text>
  <!-- Input XLR on top left -->
  <text x="68" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">IN</text>
  <ellipse cx="68" cy="84" rx="9" ry="11" fill="#1A1A1A"/>
  <ellipse cx="68" cy="84" rx="6"  ry="8"  fill="#333"/>
  <circle cx="64" cy="80" r="1.5" fill="#666"/>
  <circle cx="72" cy="80" r="1.5" fill="#666"/>
  <circle cx="68" cy="90" r="1.5" fill="#666"/>
  <!-- Arrow / split symbol -->
  <line x1="82" y1="84" x2="100" y2="84" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="84" x2="100" y2="70" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="84" x2="100" y2="98" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="96,70 104,70 100,62" fill="#888"/>
  <polygon points="96,98 104,98 100,106" fill="#888"/>
  <!-- Output A XLR (top right) -->
  <text x="132" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4488AA">OUT A</text>
  <ellipse cx="132" cy="74" rx="9" ry="11" fill="#1A1A2A"/>
  <ellipse cx="132" cy="74" rx="6"  ry="8"  fill="#223"/>
  <circle cx="128" cy="70" r="1.5" fill="#556"/>
  <circle cx="136" cy="70" r="1.5" fill="#556"/>
  <circle cx="132" cy="80" r="1.5" fill="#556"/>
  <!-- Output B XLR (bottom right) -->
  <text x="132" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#44AA44">OUT B</text>
  <ellipse cx="132" cy="108" rx="9" ry="11" fill="#0A1A0A"/>
  <ellipse cx="132" cy="108" rx="6"  ry="8"  fill="#1A2A1A"/>
  <circle cx="128" cy="104" r="1.5" fill="#4A6A4A"/>
  <circle cx="136" cy="104" r="1.5" fill="#4A6A4A"/>
  <circle cx="132" cy="114" r="1.5" fill="#4A6A4A"/>
  <!-- Iso transformer indicator -->
  <text x="100" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#888">ISO • PASSIVE</text>
  <!-- Power LED -->
  <circle cx="120" cy="48" r="4.5" fill="#00BB44"/>
  <circle cx="120" cy="48" r="2.5" fill="#44FF88"/>
</svg>
