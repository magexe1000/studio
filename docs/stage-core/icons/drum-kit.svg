<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bd" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%"   stop-color="#8B3A3A"/>
      <stop offset="50%"  stop-color="#5A1A1A"/>
      <stop offset="100%" stop-color="#3A0A0A"/>
    </linearGradient>
    <linearGradient id="snare" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%"   stop-color="#C8C8C8"/>
      <stop offset="50%"  stop-color="#909090"/>
      <stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="tom" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%"   stop-color="#6A3070"/>
      <stop offset="100%" stop-color="#2A0830"/>
    </linearGradient>
    <radialGradient id="cymbal" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#D8C060"/>
      <stop offset="100%" stop-color="#7A6018"/>
    </radialGradient>
    <radialGradient id="head" cx="45%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#E8E0D0"/>
      <stop offset="100%" stop-color="#A8A098"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="195" rx="90" ry="5" fill="#00000025"/>
  <!-- Kick drum -->
  <ellipse cx="100" cy="154" rx="60" ry="26" fill="url(#bd)"/>
  <ellipse cx="100" cy="152" rx="60" ry="24" fill="url(#head)" opacity="0.85"/>
  <ellipse cx="100" cy="152" rx="50" ry="20" fill="none" stroke="#888" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="100" cy="152" rx="14" ry="14" fill="#1A1A1A"/>
  <ellipse cx="100" cy="152" rx="10" ry="10" fill="#2A2A2A" opacity="0.9"/>
  <!-- Hi-hat stand on left -->
  <line x1="28" y1="90"  x2="28" y2="180" stroke="#666" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="28" cy="84" rx="22" ry="6" fill="url(#cymbal)"/>
  <ellipse cx="28" cy="84" rx="22" ry="6" fill="none" stroke="#A08020" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="28" cy="84" rx="8"  ry="2.5" fill="#B89030"/>
  <ellipse cx="28" cy="92" rx="22" ry="6" fill="url(#cymbal)" opacity="0.85"/>
  <!-- Ride cymbal right -->
  <line x1="168" y1="76" x2="148" y2="148" stroke="#666" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="174" cy="72" rx="26" ry="7" fill="url(#cymbal)"/>
  <ellipse cx="174" cy="72" rx="10" ry="3"  fill="#B89030"/>
  <!-- Crash cymbal left-center -->
  <line x1="60" y1="48" x2="56" y2="132" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="60" cy="44" rx="22" ry="5.5" fill="url(#cymbal)" opacity="0.9"/>
  <!-- Floor tom right -->
  <ellipse cx="152" cy="136" rx="26" ry="12" fill="url(#tom)"/>
  <ellipse cx="152" cy="132" rx="26" ry="11" fill="url(#head)" opacity="0.75"/>
  <!-- Rack tom left -->
  <ellipse cx="72" cy="98" rx="22" ry="10" fill="url(#tom)"/>
  <ellipse cx="72" cy="95" rx="22" ry="9"  fill="url(#head)" opacity="0.75"/>
  <!-- Rack tom center -->
  <ellipse cx="114" cy="94" rx="22" ry="10" fill="url(#tom)"/>
  <ellipse cx="114" cy="91" rx="22" ry="9"  fill="url(#head)" opacity="0.75"/>
  <!-- Snare drum -->
  <ellipse cx="50" cy="145" rx="24" ry="11" fill="url(#snare)"/>
  <ellipse cx="50" cy="141" rx="24" ry="10" fill="url(#head)" opacity="0.8"/>
  <ellipse cx="50" cy="141" rx="16" ry="6"  fill="none" stroke="#888" stroke-width="1" opacity="0.4"/>
  <!-- Hi-hat pedal -->
  <rect x="20" y="174" width="16" height="10" rx="3" fill="#444"/>
</svg>
