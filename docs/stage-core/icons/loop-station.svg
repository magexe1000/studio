<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="50%"  stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <radialGradient id="pad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#555"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>
    <radialGradient id="recpad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#882222"/>
      <stop offset="100%" stop-color="#3A0808"/>
    </radialGradient>
    <radialGradient id="playpad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#226622"/>
      <stop offset="100%" stop-color="#0A2A0A"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="192" rx="90" ry="8" fill="#00000028"/>
  <!-- Main pedal board body -->
  <rect x="8" y="78" width="184" height="110" rx="8" fill="url(#body)"/>
  <!-- Top slant face (pedal top) -->
  <path d="M 8 78 L 192 78 L 188 54 L 12 54 Z" fill="#2A2A2A"/>
  <!-- Display screen on slant face -->
  <rect x="60" y="58" width="80" height="20" rx="4" fill="#0A1A0A"/>
  <text x="100" y="71" text-anchor="middle" font-family="Courier, monospace" font-size="9" fill="#44FF44" opacity="0.9">LOOP 1:04</text>
  <!-- Four large foot-press pads -->
  <!-- Record pad (red) -->
  <rect x="18" y="90" width="62" height="50" rx="10" fill="#2A1010"/>
  <circle cx="49" cy="115" r="22" fill="url(#recpad)"/>
  <circle cx="49" cy="112" r="10" fill="#CC3333" opacity="0.8"/>
  <circle cx="45" cy="108" r="4"  fill="#FF8888" opacity="0.5"/>
  <text x="49" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#CC6666">REC/OVERDUB</text>
  <!-- Play/stop pad (green) -->
  <rect x="88" y="90" width="24" height="50" rx="6" fill="#101A10"/>
  <circle cx="100" cy="115" r="10" fill="url(#playpad)"/>
  <circle cx="100" cy="112" r="4"  fill="#66FF66" opacity="0.6"/>
  <!-- Undo pad -->
  <rect x="120" y="90" width="62" height="50" rx="10" fill="#101828"/>
  <circle cx="151" cy="115" r="22" fill="url(#pad)"/>
  <circle cx="151" cy="112" r="10" fill="#224488" opacity="0.8"/>
  <circle cx="147" cy="108" r="4"  fill="#88AAFF" opacity="0.5"/>
  <text x="151" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#6688AA">UNDO/REDO</text>
  <!-- Track select buttons row -->
  <rect x="18" y="152" width="22" height="14" rx="4" fill="#222"/>
  <rect x="44" y="152" width="22" height="14" rx="4" fill="#222"/>
  <rect x="70" y="152" width="22" height="14" rx="4" fill="#222"/>
  <rect x="96" y="152" width="22" height="14" rx="4" fill="#333"/>
  <rect x="122" y="152" width="22" height="14" rx="4" fill="#222"/>
  <rect x="148" y="152" width="22" height="14" rx="4" fill="#222"/>
  <!-- LEDs above pads -->
  <circle cx="49"  cy="92" r="4" fill="#FF3333"/>
  <circle cx="49"  cy="92" r="2.5" fill="#FF8888"/>
  <circle cx="100" cy="92" r="4" fill="#33FF33"/>
  <circle cx="100" cy="92" r="2.5" fill="#88FF88"/>
  <circle cx="151" cy="92" r="4" fill="#3366FF"/>
  <circle cx="151" cy="92" r="2.5" fill="#88AAFF"/>
  <!-- Input/output ports on left/right -->
  <circle cx="18" cy="170" r="6" fill="#333"/>
  <circle cx="18" cy="170" r="3.5" fill="#111"/>
  <circle cx="182" cy="170" r="6" fill="#333"/>
  <circle cx="182" cy="170" r="3.5" fill="#111"/>
</svg>
