<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="50%"  stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#555"/>
      <stop offset="50%"  stop-color="#888"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="188" rx="68" ry="10" fill="#00000028"/>
  <!-- Main body box (3D angle view) -->
  <!-- Right side face -->
  <polygon points="154,56 178,72 178,158 154,142" fill="url(#side)"/>
  <!-- Top face -->
  <polygon points="46,56 154,56 178,72 70,72" fill="url(#top)"/>
  <!-- Front face -->
  <rect x="46" y="56" width="108" height="86" rx="4" fill="url(#body)"/>
  <!-- Brand plate on front -->
  <rect x="54" y="64" width="90" height="22" rx="3" fill="#111"/>
  <text x="99" y="79" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="#888" opacity="0.9">DI BOX</text>
  <!-- Ground lift switch -->
  <rect x="60" y="94" width="36" height="14" rx="6" fill="#222"/>
  <rect x="60" y="94" width="18" height="14" rx="6" fill="#444"/>
  <text x="98" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#888">GND LIFT</text>
  <!-- Pad switch -->
  <rect x="106" y="94" width="36" height="14" rx="6" fill="#222"/>
  <rect x="124" y="94" width="18" height="14" rx="6" fill="#444"/>
  <text x="124" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#888">-20dB</text>
  <!-- LED -->
  <circle cx="138" cy="76" r="5" fill="#00CC44"/>
  <circle cx="138" cy="76" r="3" fill="#44FF88"/>
  <!-- Input jack (1/4" left side) -->
  <circle cx="50" cy="88"  r="10" fill="#1A1A1A"/>
  <circle cx="50" cy="88"  r="7"  fill="#333"/>
  <circle cx="50" cy="88"  r="3.5" fill="#111"/>
  <text x="50" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#666">INPUT</text>
  <!-- Thru output jack (1/4" also left) -->
  <circle cx="50" cy="124" r="10" fill="#1A1A1A"/>
  <circle cx="50" cy="124" r="7"  fill="#333"/>
  <circle cx="50" cy="124" r="3.5" fill="#111"/>
  <text x="50" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#666">THRU</text>
  <!-- XLR output (right side) -->
  <ellipse cx="162" cy="108" rx="9" ry="12" fill="#1A1A1A"/>
  <ellipse cx="162" cy="108" rx="6" ry="9"  fill="#333"/>
  <!-- XLR pins -->
  <circle cx="158" cy="104" r="1.5" fill="#666"/>
  <circle cx="166" cy="104" r="1.5" fill="#666"/>
  <circle cx="162" cy="114" r="1.5" fill="#666"/>
  <text x="162" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#666">XLR OUT</text>
  <!-- Rubber feet -->
  <rect x="58"  y="142" width="16" height="6" rx="3" fill="#111"/>
  <rect x="130" y="142" width="16" height="6" rx="3" fill="#111"/>
</svg>
