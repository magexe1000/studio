<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="body" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#3A3A3A"/>
      <stop offset="50%"  stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="white_key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F8F8F8"/>
      <stop offset="80%"  stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
    <linearGradient id="black_key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#2A2A2A"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="194" rx="95" ry="6" fill="#00000028"/>
