  <rect x="30" y="92" width="140" height="30" rx="3" fill="url(#unit2)"/>
  <text x="70" y="105" font-family="Arial, sans-serif" font-size="8" fill="#8AC8AA" opacity="0.8">SUB AMP</text>
  <circle cx="148" cy="98" r="4" fill="#00CC44"/>
  <circle cx="148" cy="98" r="2" fill="#44FF88"/>
  <rect x="32" y="112" width="88" height="6" rx="2" fill="#111"/>
  <rect x="32" y="112" width="62" height="6" rx="2" fill="#20A040" opacity="0.9"/>
