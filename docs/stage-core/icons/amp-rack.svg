  <rect x="30" y="146" width="140" height="30" rx="3" fill="url(#unit)"/>
  <text x="70" y="159" font-family="Arial, sans-serif" font-size="8" fill="#AAA" opacity="0.8">PROCESSOR</text>
  <circle cx="38" cy="158" r="7" fill="#1A1A1A"/><circle cx="38" cy="158" r="5" fill="#333"/>
  <circle cx="54" cy="158" r="7" fill="#1A1A1A"/><circle cx="54" cy="158" r="5" fill="#333"/>
  <!-- Vents at bottom -->
  <rect x="30" y="180" width="140" height="6" rx="2" fill="#111"/>
  <line x1="40"  y1="180" x2="40"  y2="186" stroke="#222" stroke-width="4"/>
  <line x1="56"  y1="180" x2="56"  y2="186" stroke="#222" stroke-width="4"/>
  <line x1="72"  y1="180" x2="72"  y2="186" stroke="#222" stroke-width="4"/>
  <line x1="88"  y1="180" x2="88"  y2="186" stroke="#222" stroke-width="4"/>
  <line x1="104" y1="180" x2="104" y2="186" stroke="#222" stroke-width="4"/>
  <line x1="120" y1="180" x2="120" y2="186" stroke="#222" stroke-width="4"/>
  <line x1="136" y1="180" x2="136" y2="186" stroke="#222" stroke-width="4"/>
  <line x1="152" y1="180" x2="152" y2="186" stroke="#222" stroke-width="4"/>
