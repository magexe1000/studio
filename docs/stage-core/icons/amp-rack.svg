  <rect x="78" y="44" width="32" height="6" rx="2" fill="#22BB22" opacity="0.8"/>
  <!-- Rack unit 2 — Power Amp B -->
  <rect x="30" y="58" width="140" height="30" rx="3" fill="url(#unit)"/>
  <text x="70" y="71" font-family="Arial, sans-serif" font-size="8" fill="#AAA" opacity="0.8">POWER AMP B</text>
  <circle cx="148" cy="64" r="4" fill="#00CC44"/>
  <circle cx="148" cy="64" r="2" fill="#44FF88"/>
  <rect x="32" y="78" width="42" height="6" rx="2" fill="#111"/>
  <rect x="32" y="78" width="24" height="6" rx="2" fill="#22BB22" opacity="0.8"/>
  <rect x="78" y="78" width="42" height="6" rx="2" fill="#111"/>
  <rect x="78" y="78" width="36" height="6" rx="2" fill="#22BB22" opacity="0.8"/>
