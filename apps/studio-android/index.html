    <script>
      window.__bootTimings = {
        htmlStart: performance.now(),
        firstPaint: -1,
        introStart: -1,
        reactBootstrapStart: -1,
        reactMounted: -1,
        hubVisible: -1
      };
      if (typeof PerformanceObserver !== 'undefined') {
        var observer = new PerformanceObserver(function(list) {
          var entries = list.getEntries();
          for (var i = 0; i < entries.length; i++) {
            if (entries[i].name === 'first-paint') {
              window.__bootTimings.firstPaint = entries[i].startTime;
              console.log("[LivexBoot] first-paint detected at: " + entries[i].startTime.toFixed(2) + "ms");
            }
          }
        });
        try {
          observer.observe({ entryTypes: ['paint'] });
        } catch(e) {}
      }
      console.log("[LivexBoot] index.html parsing started at: " + window.__bootTimings.htmlStart.toFixed(2) + "ms");
    </script>

    <script>
      (function() {
        try {
          // Check appMode to skip intro on cold boot to a sub-app directly
          var appMode = 'hub';
          try {
            var raw = localStorage.getItem('chord-explorer-storage-v3');
            if (raw) {
              var parsed = JSON.parse(raw);
              if (parsed && parsed.state && parsed.state.settings) {
                appMode = parsed.state.settings.appMode || 'hub';
              }
            }
          } catch (e) {}

          var path = window.location.pathname;
          var isApp = path === '/app' || path.startsWith('/app/') || path === '/' || path === '/index.html';
          var alreadyShown = false;
          try {
            alreadyShown = !!sessionStorage.getItem('studio-intro-shown');
          } catch (e) {}

          if (isApp && !alreadyShown && appMode === 'hub') {
            document.documentElement.classList.add('app-route');
            document.documentElement.classList.remove('landing-route');
          } else {
            document.documentElement.classList.add('landing-route');
            document.documentElement.classList.remove('app-route');
            window.__introReturnedEarly = true;
            try {
              if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AppInstaller) {
                window.Capacitor.Plugins.AppInstaller.notifyAppReady();
              }
            } catch (e) {}
          }

          var raw = localStorage.getItem('chord-explorer-storage-v3');
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.settings) {
              var settings = parsed.state.settings;
              var appMode = settings.appMode || 'hub';
              var perApp = settings.perApp || {};
              var activeVis = perApp[appMode] || {};
              var theme = activeVis.theme || settings.theme || 'dark';
              
              var isLight = false;
              if (theme === 'light') {
                isLight = true;
              } else if (theme === 'system') {
                isLight = window.matchMedia('(prefers-color-scheme: light)').matches;
              } else if (theme === 'dynamic') {
                var hr = new Date().getHours();
                var start = settings.dynamicLightStart || 7;
                var end = settings.dynamicLightEnd || 20;
                isLight = (hr >= start && hr < end);
              }
              
              if (isLight) {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
              }
            }
          }
        } catch (e) {
          console.warn("Theme prep error:", e);
        }
      })();

      window.__pendingStartupStates = [];
      window.__transitionStartupState = function(state) {
        if (window.__realTransitionStartupState) {
          window.__realTransitionStartupState(state);
        } else {
          console.log("[Startup State Machine] Queueing early state: " + state);
          window.__pendingStartupStates.push(state);
        }

    <script>
      // ── Web Auto-Updater ────────────────────────────────────────────────
      // On web (non-Capacitor), silently reload if the server has a newer
      // version than what this HTML was built with. This fixes browsers
      // that aggressively cache index.html and serve a stale bundle.
      // The script runs once per page load, is a no-op on native, and
      // uses sessionStorage to prevent infinite reload loops.
      (function() {
        try {
          // Skip on native (Capacitor)
          if (window.Capacitor && typeof window.Capacitor.isNativePlatform === 'function' && window.Capacitor.isNativePlatform()) return;

          // Prevent infinite reload loops — only attempt once per session
          var RELOAD_KEY = 'studio:web-auto-reload-done';
          if (sessionStorage.getItem(RELOAD_KEY)) return;

          fetch('/version.json?t=' + Date.now(), { cache: 'no-store' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (!data || !data.version) return;

              // Compare with a script tag attribute that Vite will NOT hash-bust.
              // We use the inline APP_VERSION from the app's JS module. If the
              // app hasn't loaded yet, we can't compare — but that's fine because
              // the module will load the correct version. The issue is when the
              // HTML itself is cached, causing Vite to reference OLD hashed
              // filenames that may return 404. In that case the <script> module
              // tag below will fail, and this fetch succeeds, so we can reload.
              //
              // Simpler approach: just check if the assets this HTML references
              // are actually available on the server. If this HTML is stale, the
              // hashed JS bundles it references won't exist anymore.
              var scripts = document.querySelectorAll('script[src*="/assets/"]');
              if (scripts.length === 0) return; // dev mode, nothing to check

              // Check if the main entry JS asset exists
              var mainScript = scripts[scripts.length - 1];
              var src = mainScript.getAttribute('src');
              if (!src) return;

              fetch(src, { method: 'HEAD', cache: 'no-store' })
                .then(function(r) {
                  if (r.ok) return; // assets exist, HTML is current
                  // Assets are missing — this HTML is stale. Reload.
                  console.log('[Studio Web Updater] Stale HTML detected, reloading for v' + data.version);
                  sessionStorage.setItem(RELOAD_KEY, '1');
                  window.location.reload();
                })
                .catch(function() { /* network error, don't reload */ });
            })
            .catch(function() { /* swallow */ });
        } catch(e) { /* never block app startup */ }
      })();
    </script>
