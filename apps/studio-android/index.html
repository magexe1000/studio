    <script>
      window.__bootTimings = {
        htmlStart: performance.now(),
        firstPaint: -1,
        introStart: -1,
        reactBootstrapStart: -1,
        reactMounted: -1,
        hubVisible: -1
      };
      if (typeof PerformanceObserver !== 'undefined') {
        var observer = new PerformanceObserver(function(list) {
          var entries = list.getEntries();
          for (var i = 0; i < entries.length; i++) {
            if (entries[i].name === 'first-paint') {
              window.__bootTimings.firstPaint = entries[i].startTime;
              console.log("[LivexBoot] first-paint detected at: " + entries[i].startTime.toFixed(2) + "ms");
            }
          }
        });
        try {
          observer.observe({ entryTypes: ['paint'] });
        } catch(e) {}
      }
      console.log("[LivexBoot] index.html parsing started at: " + window.__bootTimings.htmlStart.toFixed(2) + "ms");
    </script>

    <script>
      (function() {
        try {
          // Check appMode to skip intro on cold boot to a sub-app directly
          var appMode = 'hub';
          try {
            var raw = localStorage.getItem('chord-explorer-storage-v3');
            if (raw) {
              var parsed = JSON.parse(raw);
              if (parsed && parsed.state && parsed.state.settings) {
                appMode = parsed.state.settings.appMode || 'hub';
              }
            }
          } catch (e) {}

          var path = window.location.pathname;
          var isApp = path === '/app' || path.startsWith('/app/') || path === '/' || path === '/index.html';
          var alreadyShown = false;
          try {
            alreadyShown = !!sessionStorage.getItem('studio-intro-shown');
          } catch (e) {}

          if (isApp && !alreadyShown && appMode === 'hub') {
            document.documentElement.classList.add('app-route');
            document.documentElement.classList.remove('landing-route');
          } else {
            document.documentElement.classList.add('landing-route');
            document.documentElement.classList.remove('app-route');
            window.__introReturnedEarly = true;
            try {
              if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AppInstaller) {
                window.Capacitor.Plugins.AppInstaller.notifyAppReady();
              }
            } catch (e) {}
          }

          var raw = localStorage.getItem('chord-explorer-storage-v3');
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.settings) {
              var settings = parsed.state.settings;
              var appMode = settings.appMode || 'hub';
              var perApp = settings.perApp || {};
              var activeVis = perApp[appMode] || {};
              var theme = activeVis.theme || settings.theme || 'dark';
              
              var isLight = false;
              if (theme === 'light') {
                isLight = true;
              } else if (theme === 'system') {
                isLight = window.matchMedia('(prefers-color-scheme: light)').matches;
              } else if (theme === 'dynamic') {
                var hr = new Date().getHours();
                var start = settings.dynamicLightStart || 7;
                var end = settings.dynamicLightEnd || 20;
                isLight = (hr >= start && hr < end);
              }
              
              if (isLight) {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
              }
            }
          }
        } catch (e) {
          console.warn("Theme prep error:", e);
        }
      })();
    </script>
    <style>

        --intro-color: #ffffff;

      html, body { background: var(--intro-bg); margin: 0; padding: 0; }

      /* Hide orbit intro completely on landing page route */
      html.landing-route #intro {
        display: none !important;
      }

      /* ── Professional startup intro v9 ─────────────────────────────────
         • Adaptive light/dark theme supporting smooth, lag-free scaling
         • 5 REAL app logos orbiting (Chordex/Drumex/Stagex/Groovex/Vocalex)
         • Orbit starts with an elegant visual bloom/expansion from center
         • Orbit accelerates dramatically right before settle
         • Each icon flies to its EXACT measured hub position
         • Then the intro overlay fades out, revealing the hub underneath
      ────────────────────────────────────────────────────────────────── */
      #intro {
        position: fixed; inset: 0; z-index: 2147483647;
        background: var(--intro-bg);
        overflow: hidden;
        pointer-events: none;
        opacity: 1; /* Keep at 1 for instant first paint */
        font-family: Manrope, system-ui, -apple-system, sans-serif;
      }
      #intro.dismissed  { display: none; }

      #intro-glow {
        position: absolute; top: 50%; left: 50%;
        width: 400px; height: 400px;
        transform: translate(-50%, -50%) scale(0.9);
        background: var(--intro-glow-gradient);
        border-radius: 50%;
        filter: blur(8px);
        pointer-events: none;
        opacity: 0;
        animation: glow-fade-in 850ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      @keyframes glow-fade-in {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        100% { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
      }

      #intro-center {
        position: absolute; top: 50%; left: 50%;
        display: flex; flex-direction: column; align-items: center;
        gap: 8px;
        z-index: 1;
        will-change: transform;
        transform: translate(-50%, -50%) scale(0.92);
        opacity: 0;
        animation: center-fade-in 800ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
        color: var(--intro-color);
      }
      @keyframes center-fade-in {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.92); filter: blur(4px); }
        100% { opacity: 1; transform: translate(-50%, -50%) scale(1.0); filter: blur(0); }

      #intro-center .logo {

  <body>
    <div id="intro" aria-hidden="true">
      <div id="intro-glow"></div>
      <div id="intro-center" data-intro-id="studio">

    <div id="root"></div>

    <script>
      // ── Pro intro with measured-target settle ───────────────────────────
      (function () {
        var intro    = document.getElementById('intro');
        var center   = document.getElementById('intro-center');
        if (window.__introReturnedEarly || !intro || !center || window.getComputedStyle(intro).display === 'none') {
          window.__introReturnedEarly = true;
          try {
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AppInstaller) {
              window.Capacitor.Plugins.AppInstaller.notifyAppReady();
            }
          } catch (e) {}
          return;
        }

        // Cache window dimensions to prevent repeated layout reads
        var cachedWidth = window.innerWidth || 360;
        var cachedHeight = window.innerHeight || 640;

        // Pre-query DOM elements once
        var logoEl   = center.querySelector('.logo');
        var titleEl  = center.querySelector('.title');
        var subEl    = center.querySelector('.sub');

        var SETTLE_DURATION = 500;  // ms to scale/translate logo to Hub target
        var FADE_OVERLAP    = 250;  // intro fade starts this many ms before settle ends
        var FADE_DURATION   = 500;  // smooth reveal of the hub
        var MIN_PLAY_TIME   = 800;   // minimum animation duration for logo to bloom
        var MAX_WAIT_TIME   = 2200;  // hard cap safety limit

        // Default fallback targets if measurement fails
        function fallbackTargets() {
          var W = Math.max(cachedWidth, 320);
          var H = Math.max(cachedHeight, 480);
          return {
            center: { x: 0, y: -(H / 2) + 130, scale: 0.55 }
          };
        }

        // Measure actual hub logo target position
        function measureTargets() {
          var W = cachedWidth;
          var H = cachedHeight;
          if (!W || !H || W < 100 || H < 100) return null;
          var cxV = W / 2, cyV = H / 2;
          var centerEl = document.querySelector('[data-intro-target="studio"]');
          if (!centerEl) return null;
          var cr = centerEl.getBoundingClientRect();
          if (cr.width === 0) return null;
          return {
            center: {
              x: (cr.left + cr.width / 2) - cxV,
              y: (cr.top  + cr.height / 2) - cyV,
              scale: cr.width / 96
            }
          };
        }

        var logoOffY = 0;
        function getLogoOffsetY() {
          if (!logoEl || !center) return 0;
          var lr = logoEl.getBoundingClientRect();
          var cr = center.getBoundingClientRect();
          if (cr.height === 0) return 0;
          return (lr.top + lr.height / 2) - (cr.top + cr.height / 2);
        }

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        var start  = performance.now();
        var lastT  = start;
        var stopped = false;
        var settleStartTime = -1;
        var targets = null;
        var fadeStarted = false;
        var dismissed = false;
        var lastMeasureTime = 0;

        function reactMounted() {
          var r = document.getElementById('root');
          return !!(r && r.children && r.children.length > 0);
        }

        function frame(now) {
          if (stopped) return;
          var t  = now - start;
          var dt = now - lastT;
          lastT  = now;

          if (window.__bootTimings && window.__bootTimings.introStart === -1) {
            window.__bootTimings.introStart = performance.now();
            console.log("[LivexBoot] Intro minimalist logo first frame painted at: " + window.__bootTimings.introStart.toFixed(2) + "ms");
            try {
              if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AppInstaller) {
                window.Capacitor.Plugins.AppInstaller.notifyAppReady();
              }
            } catch (e) {
              console.warn("Failed to notify app ready:", e);
            }
          }

          // Track startup animation freeze points (dt > 50ms)
          if (dt > 50 && t > 100) {
            window.__startupAnimationFreezes = window.__startupAnimationFreezes || [];
            window.__startupAnimationFreezes.push({ t: t.toFixed(0), dt: dt.toFixed(0) });
            console.warn("[Perf] Startup animation freeze point: t=" + t.toFixed(0) + "ms, duration=" + dt.toFixed(0) + "ms");
          }

          // Decide whether to start settling
          if (settleStartTime < 0 && t >= MIN_PLAY_TIME) {
            if (now - lastMeasureTime > 150) {
              lastMeasureTime = now;
              var measured = measureTargets();
              if (measured) {
                targets = measured;
                logoOffY = getLogoOffsetY();
                settleStartTime = now;
              } else if (t >= MAX_WAIT_TIME) {
                targets = fallbackTargets();
                logoOffY = getLogoOffsetY();
                settleStartTime = now;
              }
            }
          }

          // Settle progress (0 → 1)
          var sP = 0;
          if (settleStartTime > 0) {
            sP = (now - settleStartTime) / SETTLE_DURATION;
            if (sP < 0) sP = 0; else if (sP > 1) sP = 1;
          }
          var sE = easeInOutCubic(sP);

          // Center logo transition
          if (targets) {
            var ct = targets.center;
            var ccs = 1 + (ct.scale - 1) * sE;
            var ccx = ct.x * sE;
            var ccy = (ct.y - logoOffY * ccs) * sE;
            center.style.transform = 'translate(-50%, -50%) translate(' + ccx.toFixed(2) + 'px,' + ccy.toFixed(2) + 'px) scale(' + ccs.toFixed(3) + ')';
            if (titleEl) titleEl.style.opacity = String(1 - sE);
            if (subEl)   subEl.style.opacity   = String(1 - sE);
          }

          // Start crossfade slightly before settle completes
          if (!fadeStarted && settleStartTime > 0 && (now - settleStartTime) >= (SETTLE_DURATION - FADE_OVERLAP)) {
            fadeStarted = true;
            startFade();
          }

          if (sP >= 1 && fadeStarted) {
            stopped = true;
            return;
          }
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

        function startFade() {
          if (dismissed) return;
          window.dispatchEvent(new Event('studio-intro-done'));
          if (!reactMounted()) {
            var startedAt = performance.now();
            var iv = setInterval(function () {
              if (reactMounted() || performance.now() - startedAt > 3000) {
                clearInterval(iv);
                doFade();
              }
            }, 80);
            return;
          }
          doFade();
        }

        function doFade() {
          if (dismissed) return;
          dismissed = true;
          if (window.__bootTimings) {
            window.__bootTimings.hubVisible = performance.now();
            console.log("[LivexBoot] Hub fully visible to user at: " + window.__bootTimings.hubVisible.toFixed(2) + "ms");
            console.log("[LivexBoot] TIMINGS SUMMARY:", JSON.stringify({
              native: window.__nativeBootTimings || null,
              web: window.__bootTimings
            }));
          }
          try {
            sessionStorage.setItem('studio-intro-shown', 'true');
          } catch (e) {}
          intro.style.transition = 'opacity ' + FADE_DURATION + 'ms cubic-bezier(0.22,1,0.36,1)';
          intro.style.opacity = '0';
          setTimeout(function () {
            intro.classList.add('dismissed');
            if (intro.parentNode) intro.parentNode.removeChild(intro);
          }, FADE_DURATION + 50);
        }
        setTimeout(doFade, 10000);
      })();
      
      // ── Web Auto-Updater ────────────────────────────────────────────────
      // On web (non-Capacitor), silently reload if the server has a newer
      // version than what this HTML was built with. This fixes browsers
      // that aggressively cache index.html and serve a stale bundle.
      // The script runs once per page load, is a no-op on native, and
      // uses sessionStorage to prevent infinite reload loops.
      (function() {
        try {
          // Skip on native (Capacitor)
          if (window.Capacitor && typeof window.Capacitor.isNativePlatform === 'function' && window.Capacitor.isNativePlatform()) return;

          // Prevent infinite reload loops — only attempt once per session
          var RELOAD_KEY = 'studio:web-auto-reload-done';
          if (sessionStorage.getItem(RELOAD_KEY)) return;

          fetch('/version.json?t=' + Date.now(), { cache: 'no-store' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (!data || !data.version) return;

              // Compare with a script tag attribute that Vite will NOT hash-bust.
              // We use the inline APP_VERSION from the app's JS module. If the
              // app hasn't loaded yet, we can't compare — but that's fine because
              // the module will load the correct version. The issue is when the
              // HTML itself is cached, causing Vite to reference OLD hashed
              // filenames that may return 404. In that case the <script> module
              // tag below will fail, and this fetch succeeds, so we can reload.
              //
              // Simpler approach: just check if the assets this HTML references
              // are actually available on the server. If this HTML is stale, the
              // hashed JS bundles it references won't exist anymore.
              var scripts = document.querySelectorAll('script[src*="/assets/"]');
              if (scripts.length === 0) return; // dev mode, nothing to check

              // Check if the main entry JS asset exists
              var mainScript = scripts[scripts.length - 1];
              var src = mainScript.getAttribute('src');
              if (!src) return;

              fetch(src, { method: 'HEAD', cache: 'no-store' })
                .then(function(r) {
                  if (r.ok) return; // assets exist, HTML is current
                  // Assets are missing — this HTML is stale. Reload.
                  console.log('[Studio Web Updater] Stale HTML detected, reloading for v' + data.version);
                  sessionStorage.setItem(RELOAD_KEY, '1');
                  window.location.reload();
                })
                .catch(function() { /* network error, don't reload */ });
            })
            .catch(function() { /* swallow */ });
        } catch(e) { /* never block app startup */ }
      })();
    </script>
