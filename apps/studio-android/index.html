      (function() {
        try {
          // Check appMode to skip intro on cold boot to a sub-app directly
          var appMode = 'hub';
          try {
            var raw = localStorage.getItem('chord-explorer-storage-v3');
            if (raw) {
              var parsed = JSON.parse(raw);
              if (parsed && parsed.state && parsed.state.settings) {
                appMode = parsed.state.settings.appMode || 'hub';
              }
            }
          } catch (e) {}

          var path = window.location.pathname;
          var isApp = path === '/app' || path.startsWith('/app/') || path === '/' || path === '/index.html';
          var alreadyShown = false;
          try {
            alreadyShown = !!sessionStorage.getItem('studio-intro-shown');
          } catch (e) {}

          if (isApp && !alreadyShown && appMode === 'hub') {
            document.documentElement.classList.add('app-route');
            document.documentElement.classList.remove('landing-route');
          } else {
            document.documentElement.classList.add('landing-route');
            document.documentElement.classList.remove('app-route');
            window.__introReturnedEarly = true;
            try {
              if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AppInstaller) {
                window.Capacitor.Plugins.AppInstaller.notifyAppReady();
              }
            } catch (e) {}
          }

          var raw = localStorage.getItem('chord-explorer-storage-v3');
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.settings) {
              var settings = parsed.state.settings;
              var appMode = settings.appMode || 'hub';
              var perApp = settings.perApp || {};
              var activeVis = perApp[appMode] || {};
              var theme = activeVis.theme || settings.theme || 'dark';
              
              var isLight = false;
              if (theme === 'light') {
                isLight = true;
              } else if (theme === 'system') {
                isLight = window.matchMedia('(prefers-color-scheme: light)').matches;
              } else if (theme === 'dynamic') {
                var hr = new Date().getHours();
                var start = settings.dynamicLightStart || 7;
                var end = settings.dynamicLightEnd || 20;
                isLight = (hr >= start && hr < end);
              }
              
              if (isLight) {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
              }
            }
          }
        } catch (e) {
          console.warn("Theme prep error:", e);
        }

    <script>
      window.__pendingStartupStates = [];
      window.__transitionStartupState = function(state) {
        if (window.__realTransitionStartupState) {
          window.__realTransitionStartupState(state);
        } else {
          console.log("[Startup State Machine] Queueing early state: " + state);
          window.__pendingStartupStates.push(state);
        }
      };

      // ── Pro intro with measured-target settle ───────────────────────────
      (function () {
        var intro    = document.getElementById('intro');
        var center   = document.getElementById('intro-center');
        if (window.__introReturnedEarly || !intro || !center || window.getComputedStyle(intro).display === 'none') {
          window.__introReturnedEarly = true;
          try {
            if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AppInstaller) {
              window.Capacitor.Plugins.AppInstaller.notifyAppReady();
            }
          } catch (e) {}
          return;
        }

        // Cache window dimensions to prevent repeated layout reads
        var cachedWidth = window.innerWidth || 360;
        var cachedHeight = window.innerHeight || 640;

        // Pre-query DOM elements once to avoid querying them inside the animation frame loop
        var logoEl   = center.querySelector('.logo');
        var titleEl  = center.querySelector('.title');
        var subEl    = center.querySelector('.sub');

        // Fade in is no-op because opacity starts at 1



        var orbiterEls = intro.querySelectorAll('.orbiter');
        if (orbiterEls.length === 0) return;

        // Map each intro icon to its hub data-intro-target counterpart.
        var orbiters = [];
        orbiterEls.forEach(function (el) {
          orbiters.push({ el: el, key: el.getAttribute('data-intro-id') });
        });
        var N = orbiters.length;

        // Geometry — elliptical tilted orbit for 3D feel
        var RX    = 132;
        var RY    = 38;
        var TILT  = -28 * Math.PI / 180;
        var COS_T = Math.cos(TILT);
        var SIN_T = Math.sin(TILT);
        var STEP  = 360 / N;

        // Speed profile (deg/ms): smooth → dramatic accel → settle
        var BASE_OMEGA   = 360 / 3000;
        var PEAK_OMEGA   = 360 / 600;
        var ACCEL_START  = 100;
        var ACCEL_END    = 500;

        // Settle starts when targets are known AND minimum spin time elapsed.
        // Falls back to t=3000 if React hasn't mounted yet.
        var SETTLE_DURATION = 450;   // ms to lerp from orbit → target
        var FADE_OVERLAP    = 200;   // intro fade starts this many ms before settle ends
        var FADE_DURATION   = 350;   // fast crossfade so hub reveals immediately
        var MIN_SPIN_TIME   = 400;   // don't settle before this
        var MAX_WAIT_TIME   = 1200;  // hard cap — settle even without targets

        // Default fallback targets (relative to viewport center) if measurement fails
        function fallbackTargets() {
          var W = Math.max(cachedWidth, 320);
          var H = Math.max(cachedHeight, 480);
          var x = -(W / 2) + 64;
          var y0 = -(H / 2) + 240;
          var gap = Math.min(76, (H * 0.5) / (N + 1));
          var ts = [];
          for (var i = 0; i < N; i++) {
            ts.push({ x: x, y: y0 + i * gap, scale: 0.55 });
          }
          return {
            orbiters: ts,
            center:   { x: 0, y: -(H / 2) + 130, scale: 0.55 },
          };
        }

        // Measure actual hub icon positions from data-intro-target elements.
        // Returns null if not all targets are present or layout size is invalid.
        function measureTargets() {
          var W = cachedWidth;
          var H = cachedHeight;
          if (!W || !H || W < 100 || H < 100) return null;
          var cxV = W / 2, cyV = H / 2;
          var centerEl = document.querySelector('[data-intro-target="studio"]');
          if (!centerEl) return null;
          var cr = centerEl.getBoundingClientRect();
          if (cr.width === 0) return null;
          var centerTarget = {
            x: (cr.left + cr.width / 2) - cxV,
            y: (cr.top  + cr.height / 2) - cyV,
            scale: cr.width / 96,  // intro center logo is 96px
          };
          var orbiterTargets = [];
          for (var i = 0; i < orbiters.length; i++) {
            var key = orbiters[i].key;
            var t = document.querySelector('[data-intro-target="' + key + '"]');
            if (!t) return null;
            var r = t.getBoundingClientRect();
            if (r.width === 0) return null;
            orbiterTargets.push({
              x: (r.left + r.width / 2) - cxV,
              y: (r.top  + r.height / 2) - cyV,
              scale: r.width / 44,  // intro orbiter container is 44px
            });
          }
          return { orbiters: orbiterTargets, center: centerTarget };
        }

        // Measure vertical offset of the logo's center relative to the
        // #intro-center container's center.
        var logoOffY = 0;
        function getLogoOffsetY() {
          if (!logoEl || !center) return 0;
          var lr = logoEl.getBoundingClientRect();
          var cr = center.getBoundingClientRect();
          if (cr.height === 0) return 0;  // not laid out yet
          return (lr.top + lr.height / 2) - (cr.top + cr.height / 2);
        }

        function easeInOutCubic(t) {
          return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }
        function easeInQuad(t) { return t * t; }

        var start  = performance.now();
        var angle  = 0;
        var lastT  = start;
        var stopped = false;
        var settleStartTime = -1;     // when settle actually began
        var targets = null;
        var fadeStarted = false;
        var dismissed = false;
        var lastMeasureTime = 0;

        function omegaAt(t) {
          if (t <= ACCEL_START) return BASE_OMEGA;
          if (t >= ACCEL_END)   return PEAK_OMEGA;
          var p = (t - ACCEL_START) / (ACCEL_END - ACCEL_START);
          return BASE_OMEGA + (PEAK_OMEGA - BASE_OMEGA) * easeInQuad(p);
        }

        function reactMounted() {
          var r = document.getElementById('root');
          return !!(r && r.children && r.children.length > 0);
        }

        function frame(now) {
          if (stopped) return;
          var t  = now - start;
          var dt = now - lastT;
          lastT  = now;
          angle  = (angle + omegaAt(t) * dt) % 360;

          if (window.__bootTimings && window.__bootTimings.introStart === -1) {
            window.__bootTimings.introStart = performance.now();
            console.log("[LivexBoot] Intro planets first frame painted at: " + window.__bootTimings.introStart.toFixed(2) + "ms");
            if (window.__transitionStartupState) {
              window.__transitionStartupState('INTRO_RUNNING');
            } else {
              window.__pendingStartupState = 'INTRO_RUNNING';
            }
            try {
              if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.AppInstaller) {
                window.Capacitor.Plugins.AppInstaller.notifyAppReady();
              }
            } catch (e) {
              console.warn("Failed to notify app ready:", e);
            }
          }

          // Track startup animation freeze points (dt > 50ms)
          if (dt > 50 && t > 100) {
            window.__startupAnimationFreezes = window.__startupAnimationFreezes || [];
            window.__startupAnimationFreezes.push({ t: t.toFixed(0), dt: dt.toFixed(0) });
            console.warn("[Perf] Startup animation freeze point: t=" + t.toFixed(0) + "ms, duration=" + dt.toFixed(0) + "ms");
          }

          // Decide whether to start settling (throttling layout queries)
          if (settleStartTime < 0 && t >= MIN_SPIN_TIME) {
            if (now - lastMeasureTime > 150) {
              lastMeasureTime = now;
              var measured = measureTargets();
              if (measured) {
                targets = measured;
                logoOffY = getLogoOffsetY(); // Compute once on transition start
                settleStartTime = now;
                if (window.__transitionStartupState) {
                  window.__transitionStartupState('LAYOUT_READY');
                  window.__transitionStartupState('ANIMATION_READY');
                } else {
                  window.__pendingStartupState = 'ANIMATION_READY';
                }
              } else if (t >= MAX_WAIT_TIME) {
                targets = fallbackTargets();
                logoOffY = getLogoOffsetY(); // Compute once on transition start
                settleStartTime = now;
                if (window.__transitionStartupState) {
                  window.__transitionStartupState('LAYOUT_READY');
                  window.__transitionStartupState('ANIMATION_READY');
                } else {
                  window.__pendingStartupState = 'ANIMATION_READY';
                }
              }
            }
          }

          // Settle progress (0 → 1)
          var sP = 0;
          if (settleStartTime > 0) {
            sP = (now - settleStartTime) / SETTLE_DURATION;
            if (sP < 0) sP = 0; else if (sP > 1) sP = 1;
          }
          var sE = easeInOutCubic(sP);

          // Premium visual expansion drift for the first 800ms
          var drift = 1.0;
          if (t < 800) {
            drift = easeInOutCubic(t / 800) * 0.6 + 0.4;
          }

          for (var k = 0; k < orbiters.length; k++) {
            var el = orbiters[k].el;
            var a = (angle + k * STEP) % 360;
            if (a < 0) a += 360;
            var rad = a * Math.PI / 180;
            var x0 = RX * drift * Math.cos(rad);
            var y0 = RY * drift * Math.sin(rad);
            var xT = x0 * COS_T - y0 * SIN_T;
            var yT = x0 * SIN_T + y0 * COS_T;

            var front      = a < 180;
            var orbitScale = front ? 1.10 : 0.85;
            var z          = front ? 3 : 0;

            var fx, fy, fs;
            if (targets) {
              var tgt = targets.orbiters[k];
              fx = xT + (tgt.x - xT) * sE;
              fy = yT + (tgt.y - yT) * sE;
              fs = orbitScale + (tgt.scale - orbitScale) * sE;
            } else {
              fx = xT; fy = yT; fs = orbitScale;
            }
            el.style.zIndex    = sE > 0.5 ? 1 : z;
            el.style.transform = 'translate(' + fx.toFixed(2) + 'px,' + fy.toFixed(2) + 'px) scale(' + fs.toFixed(3) + ')';
          }

          // Center logo follows — compensate for logo offset within the
          // container so the LOGO (not the container) lands on the hub target.
          if (targets) {
            var ct = targets.center;
            var ccs = 1 + (ct.scale - 1) * sE;
            var ccx = ct.x * sE;
            var ccy = (ct.y - logoOffY * ccs) * sE;
            center.style.transform = 'translate(-50%, -50%) translate(' + ccx.toFixed(2) + 'px,' + ccy.toFixed(2) + 'px) scale(' + ccs.toFixed(3) + ')';
            // Fade out title/sub during settle so only the logo "lands"
            if (titleEl) titleEl.style.opacity = String(1 - sE);
            if (subEl)   subEl.style.opacity   = String(1 - sE);
          }

          // Start crossfade slightly before settle completes so the intro
          // icons appear to BECOME the hub icons rather than swap.
          if (!fadeStarted && settleStartTime > 0 && (now - settleStartTime) >= (SETTLE_DURATION - FADE_OVERLAP)) {
            fadeStarted = true;
            // Only start the fade when React is mounted (so the hub is there
            // to crossfade INTO). Otherwise wait briefly.
            startFade();
          }

          if (sP >= 1 && fadeStarted) {
            // Settle done; rAF loop ends after fade dismisses
            stopped = true;
            return;
          }
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);

        function startFade() {
          if (dismissed) return;
          // Signal React the intro is finishing — StudioTitleReveal can now
          // start its sweep animation so the title appears as the hub reveals.
          window.dispatchEvent(new Event('studio-intro-done'));
          if (window.__transitionStartupState) {
            window.__transitionStartupState('INTRO_FINISHED');
          } else {
            window.__pendingStartupState = 'INTRO_FINISHED';
          }
          if (!reactMounted()) {
            // Wait for React then fade
            var startedAt = performance.now();
            var iv = setInterval(function () {
              if (reactMounted() || performance.now() - startedAt > 3000) {
                clearInterval(iv);
                doFade();
              }
            }, 80);
            return;
          }
          doFade();
        }
        function doFade() {
          if (dismissed) return;
          dismissed = true;
          if (window.__transitionStartupState) {
            window.__transitionStartupState('HUB_VISIBLE');
          } else {
            window.__pendingStartupState = 'HUB_VISIBLE';
          }
          if (window.__bootTimings) {
            window.__bootTimings.hubVisible = performance.now();
            console.log("[LivexBoot] Hub fully visible to user at: " + window.__bootTimings.hubVisible.toFixed(2) + "ms");
            console.log("[LivexBoot] TIMINGS SUMMARY:", JSON.stringify({
              native: window.__nativeBootTimings || null,
              web: window.__bootTimings
            }));
          }
          try {
            sessionStorage.setItem('studio-intro-shown', 'true');
          } catch (e) {}
          // Apply a long, smooth ease-out transition for the crossfade into the hub.
          // cubic-bezier(0.22,1,0.36,1) starts quickly then eases very gently at the
          // end — this makes the hub "breathe in" rather than snap into view.
          intro.style.transition = 'opacity ' + FADE_DURATION + 'ms cubic-bezier(0.22,1,0.36,1)';
          intro.style.opacity = '0';
          setTimeout(function () {
            intro.classList.add('dismissed');
            if (intro.parentNode) intro.parentNode.removeChild(intro);
            if (window.__transitionStartupState) {
              window.__transitionStartupState('READY');
            } else {
              window.__pendingStartupState = 'READY';
            }
          }, FADE_DURATION + 50);
        }
        // Hard safety
        setTimeout(doFade, 10000);
      })();
    </script>
    <script>
      // ── Web Auto-Updater ────────────────────────────────────────────────
      // On web (non-Capacitor), silently reload if the server has a newer
      // version than what this HTML was built with. This fixes browsers
      // that aggressively cache index.html and serve a stale bundle.
      // The script runs once per page load, is a no-op on native, and
      // uses sessionStorage to prevent infinite reload loops.
      (function() {
        try {
          // Skip on native (Capacitor)
          if (window.Capacitor && typeof window.Capacitor.isNativePlatform === 'function' && window.Capacitor.isNativePlatform()) return;

          // Prevent infinite reload loops — only attempt once per session
          var RELOAD_KEY = 'studio:web-auto-reload-done';
          if (sessionStorage.getItem(RELOAD_KEY)) return;

          fetch('/version.json?t=' + Date.now(), { cache: 'no-store' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (!data || !data.version) return;

              // Compare with a script tag attribute that Vite will NOT hash-bust.
              // We use the inline APP_VERSION from the app's JS module. If the
              // app hasn't loaded yet, we can't compare — but that's fine because
              // the module will load the correct version. The issue is when the
              // HTML itself is cached, causing Vite to reference OLD hashed
              // filenames that may return 404. In that case the <script> module
              // tag below will fail, and this fetch succeeds, so we can reload.
              //
              // Simpler approach: just check if the assets this HTML references
              // are actually available on the server. If this HTML is stale, the
              // hashed JS bundles it references won't exist anymore.
              var scripts = document.querySelectorAll('script[src*="/assets/"]');
              if (scripts.length === 0) return; // dev mode, nothing to check

              // Check if the main entry JS asset exists
              var mainScript = scripts[scripts.length - 1];
              var src = mainScript.getAttribute('src');
              if (!src) return;

              fetch(src, { method: 'HEAD', cache: 'no-store' })
                .then(function(r) {
                  if (r.ok) return; // assets exist, HTML is current
                  // Assets are missing — this HTML is stale. Reload.
                  console.log('[Studio Web Updater] Stale HTML detected, reloading for v' + data.version);
                  sessionStorage.setItem(RELOAD_KEY, '1');
                  window.location.reload();
                })
                .catch(function() { /* network error, don't reload */ });
            })
            .catch(function() { /* swallow */ });
        } catch(e) { /* never block app startup */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
